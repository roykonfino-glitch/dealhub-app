<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;font-size:14px}
:root{--bg:#0a1628;--card:#0f1f38;--border:#1e3a5f;--primary:#3de8b0;--text:#e8f0fe;--muted:#7a9bc4;--accent:#1a3d2e}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#0a1628}
.logo-text{font-size:16px;font-weight:800}
.logo-text span{color:var(--primary)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-co{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.hdr-co input{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;outline:none;width:170px}
.hdr-co input:focus{border-color:var(--primary)}
.prog{background:#080f1e;border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.prog::-webkit-scrollbar{height:0}
.ps{display:flex;align-items:center;gap:8px;padding:10px 14px 10px 0;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ps+.ps{padding-left:14px}
.ps.active .pl{color:var(--primary)}.ps.active{border-bottom-color:var(--primary)}
.ps.done .pl{color:#34d399}.ps.done{border-bottom-color:#34d399}
.pn{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ps.active .pn{background:var(--primary);color:#0a1628}
.ps.done .pn{background:#34d399;color:#0a1628}
.pl{font-size:12px;font-weight:600;color:var(--muted)}
.pa{color:var(--border);font-size:11px;margin-left:8px}
.page{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 98px)}
.content{padding:28px;max-width:740px}
.aside{background:#080f1e;border-left:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.ptitle{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2}
.ptitle em{color:var(--primary);font-style:normal}
.psub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px;max-width:580px}
.slbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px;margin-top:18px}
.slbl:first-child{margin-top:0}
.shint{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.inp{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:var(--primary)}
.inp::placeholder{color:var(--muted)}
.sel{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px;width:100%;outline:none;cursor:pointer}
.ta{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;width:100%;resize:vertical;outline:none;font-family:inherit;line-height:1.6}
.ta:focus{border-color:var(--primary)}
.ta::placeholder{color:var(--muted)}
.lbl{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.btn{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:.4;cursor:default}
.btn-p{background:var(--primary);border-color:var(--primary);color:#0a1628;font-weight:700}
.btn-p:hover{opacity:.9;color:#0a1628}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-d{color:#f87171;border-color:#3a1f1f;padding:5px 10px;font-size:11px}
.btn-d:hover{background:#1a0a0a;border-color:#f87171}
.btn-ai{background:linear-gradient(135deg,#0f2a1e,#0d2137);border:1px solid var(--primary);color:var(--primary);font-weight:600}
.btn-ai:hover{background:var(--accent)}
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uc{background:#0a1628;border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;user-select:none}
.uc:hover{border-color:var(--muted)}
.uc.on{border-color:var(--primary);background:rgba(61,232,176,.04)}
.uc-top{display:flex;align-items:flex-start;gap:10px}
.uc-ico{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.uc-inf{flex:1}
.uc-n{font-size:13px;font-weight:600;margin-bottom:3px}
.uc-d{font-size:11px;color:var(--muted);line-height:1.4}
.uc-ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all .18s;margin-top:1px}
.uc.on .uc-ck{background:var(--primary);border-color:var(--primary);color:#0a1628}
.uc-det{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.uc-det-lbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sw{position:relative;width:38px;height:21px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-t{position:absolute;cursor:pointer;inset:0;background:#1a2d4a;border-radius:21px;transition:.2s;border:1px solid var(--border)}
.sw-t:before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:.2s}
input:checked+.sw-t{background:var(--accent);border-color:var(--primary)}
input:checked+.sw-t:before{transform:translateX(17px);background:var(--primary)}
.dz{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.ov{border-color:var(--primary);background:rgba(61,232,176,.03)}
.fok{background:rgba(61,232,176,.06);border:1.5px solid rgba(61,232,176,.4);border-radius:10px;padding:13px;display:flex;align-items:center;justify-content:space-between}
.insight{background:var(--accent);border:1px solid rgba(61,232,176,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text);line-height:1.6;margin-top:12px}
.insight strong{color:var(--primary)}
.etbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
.etbl th{background:#080f1e;color:var(--muted);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border)}
.etbl td{padding:5px 7px;border-bottom:1px solid rgba(30,58,95,.4)}
.etbl input{background:transparent;border:none;color:var(--text);font-size:11px;width:100%;outline:none;padding:2px 3px}
.etbl input:focus{background:#0a1628;border-radius:4px}
.ai-wrap{display:flex;flex-direction:column;height:100%;min-height:calc(100vh - 130px)}
.ai-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-shrink:0}
.ai-ttl{font-size:12px;font-weight:700;color:var(--primary)}
.ai-stag{font-size:10px;color:var(--muted);background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:auto}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.ai-msgs::-webkit-scrollbar{width:3px}
.ai-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.ai-b{background:var(--accent);border:1px solid rgba(61,232,176,.12);border-radius:8px 8px 8px 2px;padding:9px 11px;font-size:11px;line-height:1.65}
.ai-b strong{color:var(--primary)}
.usr-b{background:#1a2d4a;border-radius:8px 8px 2px 8px;padding:9px 11px;font-size:11px;align-self:flex-end;text-align:right;max-width:90%}
.ai-typ{display:flex;gap:4px;padding:9px 11px;background:var(--accent);border-radius:8px 8px 8px 2px;width:fit-content}
.dot{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(61,232,176,.3);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.spin-dk{border-color:rgba(0,0,0,.15);border-top-color:#0a1628}
.ai-row{display:flex;gap:6px;flex-shrink:0}
.ai-in{flex:1;background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:11px;outline:none;font-family:inherit}
.ai-in:focus{border-color:var(--primary)}
.ai-snd{background:var(--primary);border:none;border-radius:6px;padding:7px 11px;color:#0a1628;font-size:11px;font-weight:700;cursor:pointer}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rev-c{background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.rev-n{font-size:26px;font-weight:800;color:var(--primary)}
.rev-l{font-size:11px;color:var(--muted);margin-top:3px}
.gen-c{border-radius:12px;padding:18px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;background:var(--accent);color:var(--primary);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600}
.footer{border-top:1px solid var(--border);background:var(--card);padding:11px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:15}
.done-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;min-height:360px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="logo">
    <div class="logo-mark">D</div>
    <div><div class="logo-text">DealHub <span>Discovery</span></div><div class="logo-sub">Post-overview configuration questionnaire</div></div>
  </div>
  <div class="hdr-co">Company: <input id="coInp" placeholder="Your company name" oninput="st.co=this.value"></div>
</div>
<div class="prog" id="prog"></div>
<div class="page">
  <div class="content" id="content"></div>
  <div class="aside">
    <div class="ai-wrap">
      <div class="ai-hdr"><span style="font-size:16px">🤖</span><span class="ai-ttl">DealHub AI Advisor</span><span class="ai-stag" id="aiTag">Step 1</span></div>
      <div class="ai-msgs" id="aiMsgs"></div>
      <div class="ai-row"><input class="ai-in" id="aiIn" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendAI()"><button class="ai-snd" onclick="sendAI()">↗</button></div>
    </div>
  </div>
</div>
<div class="footer" id="footer"></div>
</div>

<script>
const PX='https://dealhub-proxy.vercel.app/api/chat';
const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const STEPS=[{id:'about',label:'About You',e:'🏢'},{id:'products',label:'Your Products',e:'📦'},{id:'selling',label:'How You Sell',e:'💡'},{id:'rules',label:'Quoting Rules',e:'📋'},{id:'review',label:'Review & Generate',e:'🚀'}];

const UCS=[
  {k:'multiyear',i:'📅',n:'Multi-Year Contracts',d:'You sell deals spanning 2+ years, sometimes with different pricing each year.',q:'How does pricing change year-over-year? Same rate with annual uplift (CPI %), or fully custom pricing per year?'},
  {k:'ramp',i:'📈',n:'Ramp-Up Pricing',d:'Customers start small and scale up — the price follows the ramp schedule.',q:'What does a typical ramp look like? e.g. 50 users Yr1, 100 Yr2. Is total commitment (TCV) locked at signing?'},
  {k:'partners',i:'🤝',n:'Partner & Reseller Deals',d:'You sell through partners or resellers who receive different pricing.',q:'Do partners get a flat discount tier or deal-by-deal? Should their discount pull automatically from your CRM?'},
  {k:'trials',i:'🧪',n:'Trials & Pilots',d:'You offer free or discounted pilots before the paid contract begins.',q:'How long do trials typically run? Do they auto-convert to paid, or does the rep create a new quote?'},
  {k:'overage',i:'📊',n:'Usage & Overages',d:'Customers have a usage limit — exceeding it triggers an overage charge.',q:'Is overage billed monthly in arrears or at contract end? Any grace buffer before overage kicks in?'},
  {k:'optional',i:'➕',n:'Optional Add-Ons',d:'Quotes include optional products the customer chooses to include or skip.',q:'Are optional add-ons visible to the buyer in DealRoom, or only visible to the rep building the quote?'},
  {k:'cpi',i:'📆',n:'Annual Price Increases',d:'Contracts include an automatic annual uplift — fixed % or tied to CPI.',q:'What is your default uplift rate? Can reps waive it, or does that require approval?'},
  {k:'redline',i:'⚖️',n:'Contract Redlining',d:'Customers negotiate changes to your standard contract or MSA terms.',q:'Which documents get redlined most — MSA, Order Form, or both? Handled in DealHub or outside?'},
  {k:'integrations',i:'🔌',n:'Integrations',d:'DealHub connects with other tools — CRM is always required plus any others.',q:'Which are must-haves for go-live? DocuSign for e-signature, Slack for approval notifications, SSO?'},
  {k:'custom',i:'🍒',n:'Custom Deal Structures',d:'Some deals need a hand-built product selection by RevOps or Deal Desk.',q:'How often does this happen? Who has permission — only RevOps, or can AEs request it too?'},
];

function freshSt(){return{step:0,submitted:false,co:'',industry:'',crm:'Salesforce',dealVolume:'',dealSize:'',goLive:'',addCtx:'',skuFile:'',skuCount:0,skus:[],multiCurrency:false,currencies:'',productInsight:'',productInsightLoading:false,useCases:UCS.map(u=>({...u,id:uid(),on:false,detail:''})),sellingFlow:'',approvalText:'',approvalRows:[],ruleRows:[],extractLoading:false,extractErr:'',payTerms:'',netDays:'',autoRenew:'',msa:'',otherTerms:'',docGenerating:false,docError:'',mmGenerating:false,mmError:''};}
let st=freshSt();

let aiMs=[{r:'ai',h:'👋 Hi! I\'m your <strong>DealHub AI Advisor</strong>. I\'m built with deep DealHub platform knowledge — I\'ll guide you through each step and help translate your answers into a configuration design document. Start with <strong>About You</strong> when ready.'}];
let aiLoading=false,aiSeen=new Set();

const INTROS=[null,'You\'re on <strong>Your Products</strong>. Upload your catalog and I\'ll instantly analyse the structure — product families, pricing models, billing types — so your design document is as accurate as possible.','Now for <strong>How You Sell</strong>. Select every scenario that fits. When you enable one, a question appears about how it specifically works at your company — those answers directly shape the DealHub playbook configuration.','For <strong>Quoting Rules</strong> — just describe your approval process naturally. Something like <em>"deals over $50K need VP approval"</em> is perfect. I\'ll extract the discount matrix and rule-based workflows automatically.','You\'re at the <strong>Review</strong> step! Click <strong>Generate Design Document</strong> — I\'ll produce a full DealHub configuration spec including question groups, approval matrices, playbook structure, and a recommended build sequence. Takes about 20 seconds.'];

function triggerIntro(s){if(aiSeen.has(s)||!INTROS[s])return;aiSeen.add(s);setTimeout(()=>pushAI(INTROS[s]),500);}
function pushAI(h){aiMs.push({r:'ai',h});drawAI();}
function drawAI(){
  const el=document.getElementById('aiMsgs');if(!el)return;
  el.innerHTML=aiMs.map(m=>m.r==='ai'?`<div class="ai-b">${m.h}</div>`:`<div class="usr-b">${esc(m.text||'')}</div>`).join('');
  if(aiLoading)el.innerHTML+=`<div class="ai-typ"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  el.scrollTop=el.scrollHeight;
  const t=document.getElementById('aiTag');if(t)t.textContent=`Step ${st.step+1} — ${STEPS[st.step]?.label}`;
}
function aiSys(){
  const en=st.useCases.filter(u=>u.on).map(u=>u.n);
  return `You are a friendly, expert DealHub CPQ onboarding advisor. The client has already had a DealHub overview session.
Context: Company: ${st.co||'unknown'} | Industry: ${st.industry||'unknown'} | CRM: ${st.crm} | Products: ${st.skuCount} SKUs | Use cases: ${en.join(', ')||'none yet'} | Step: ${STEPS[st.step]?.label}
Be warm, concise — 2-3 sentences max. Ask ONE focused question. Light DealHub terminology is fine. Reassure them their answers feed directly into the configuration design document.`;
}
async function sendAI(){
  const inp=document.getElementById('aiIn');const txt=(inp?.value||'').trim();if(!txt||aiLoading)return;
  inp.value='';aiMs.push({r:'user',text:txt});aiLoading=true;drawAI();
  const msgs=aiMs.map(m=>({role:m.r==='ai'?'assistant':'user',content:m.h?m.h.replace(/<[^>]+>/g,''):m.text||''}));
  try{const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:aiSys(),messages:msgs})});const d=await res.json();pushAI(d.error?`⚠️ ${d.error.message}`:(d.content?.[0]?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'));}catch(e){pushAI('⚠️ Could not reach advisor.');}
  aiLoading=false;drawAI();
}

function render(){
  drawProg();
  if(st.submitted){renderDone();drawFooter();return;}
  const fns=[S1,S2,S3,S4,S5];
  document.getElementById('content').innerHTML=`<div>${(fns[st.step]||S1)()}</div>`;
  drawFooter();drawAI();setTimeout(()=>triggerIntro(st.step),400);
}

function drawProg(){
  document.getElementById('prog').innerHTML=STEPS.map((s,i)=>{
    const cls=i===st.step?'active':i<st.step?'done':'';
    return `<div class="ps ${cls}" onclick="goStep(${i})"><span class="pn">${i<st.step?'✓':i+1}</span><span class="pl">${s.e} ${s.label}</span>${i<STEPS.length-1?'<span class="pa">›</span>':''}</div>`;
  }).join('');
}
function drawFooter(){
  const last=st.step===STEPS.length-1;
  document.getElementById('footer').innerHTML=`<button class="btn" onclick="prevStep()" ${st.step===0?'disabled':''}>← Back</button><span style="font-size:11px;color:var(--muted)">${st.step+1} / ${STEPS.length}</span>${last?`<button class="btn btn-p" onclick="submitForm()">Submit ✓</button>`:`<button class="btn btn-p" onclick="nextStep()">Continue →</button>`}`;
}
function goStep(i){st.step=i;render();window.scrollTo(0,0);}
function nextStep(){if(st.step<STEPS.length-1){st.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(st.step>0){st.step--;render();}}
function submitForm(){st.submitted=true;render();}

function S1(){return `<div class="card"><div class="ptitle">Tell us about <em>your business</em></div><div class="psub">A few quick questions to set the context for your DealHub configuration. These feed directly into the design document your team will use to build.</div><div class="g2" style="margin-bottom:12px"><div><label class="lbl">What industry are you in?</label><input class="inp" placeholder="e.g. SaaS, InsurTech, Cybersecurity…" value="${esc(st.industry)}" oninput="st.industry=this.value"></div><div><label class="lbl">What CRM do you use?</label><select class="sel" onchange="st.crm=this.value">${['Salesforce','HubSpot','Microsoft Dynamics','Other'].map(v=>`<option${st.crm===v?' selected':''}>${v}</option>`).join('')}</select></div></div><div class="g2" style="margin-bottom:12px"><div><label class="lbl">How many deals per month?</label><select class="sel" onchange="st.dealVolume=this.value">${['','Under 10','10–50','50–200','200+'].map(v=>`<option value="${v}"${st.dealVolume===v?' selected':''}>${v||'Select…'}</option>`).join('')}</select></div><div><label class="lbl">Typical deal size?</label><select class="sel" onchange="st.dealSize=this.value">${['','Under $10K','$10K–$50K','$50K–$200K','$200K+'].map(v=>`<option value="${v}"${st.dealSize===v?' selected':''}>${v||'Select…'}</option>`).join('')}</select></div></div><div style="margin-bottom:12px"><label class="lbl">Target go-live date for DealHub</label><input class="inp" placeholder="e.g. Q3 2026 or July 2026" value="${esc(st.goLive)}" oninput="st.goLive=this.value"></div><div class="hr"></div><label class="lbl">Anything else to help us understand your business?</label><div class="shint" style="margin-bottom:8px">Team size, current quoting process, pain points, or goals — whatever feels relevant.</div><textarea class="ta" rows="3" placeholder="e.g. 150-person SaaS company. Reps build quotes manually in Google Sheets. Goal: same-day quoting for standard deals…" oninput="st.addCtx=this.value">${esc(st.addCtx)}</textarea></div>`;}

function S2(){
  const up=st.skuFile?`<div class="fok" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">✅</span><div><div style="font-size:13px;font-weight:600">${esc(st.skuFile)}</div><div style="font-size:11px;color:var(--muted);margin-top:1px">${st.skuCount} products loaded</div></div></div><button class="btn btn-d" onclick="clearSku()">Remove</button></div>`:

For rules: condition phrased as DealHub would configure it. steps are approver names/roles.`;
  try{

async function genMM(){
  st.mmGenerating=true;st.mmError='';render();
  const en=st.useCases.filter(u=>u.on);
  const ctx=`Company: ${st.co||'DealHub Client'} | Industry: ${st.industry||'unknown'} | CRM: ${st.crm} | Use cases: ${en.map(u=>u.n).join(', ')||'none'} | Approval tiers: ${st.approvalRows.length} | Rule workflows: ${st.ruleRows.length} | Products: ${st.skuCount} SKUs | Multi-currency: ${st.multiCurrency?'Yes':'No'} | Context: ${st.sellingFlow||'not provided'}`;
  const sys=`Generate a DealHub configuration mind map. Return ONLY valid JSON, no markdown.
{"center":"string","branches":[{"label":"string","color":"one of #3de8b0 #7ab8f5 #f59e42 #f87171 #c084fc #34d399 #fb923c","nodes":["string"]}]}
Create 5-8 branches. Always include: Products & Pricing, Question Groups, Approval Workflows, Commercial Terms, Implementation Phases. Add use-case branches if data exists. Nodes must be specific to the data — not generic placeholders.`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:900,system:sys,messages:[{role:'user',content:ctx}]})});
    const d=await res.json();
    if(d.error){st.mmError=d.error.message;st.mmGenerating=false;render();return;}
    const p=JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    st.mmGenerating=false;render();openMM(p);
  }catch(e){st.mmError='Could not generate.';st.mmGenerating=false;render();}
}

function openMM(data){
  const co=data.center||st.co||'DealHub',dt=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const br=data.branches||[],W=1200,H=800,CX=W/2,CY=H/2,bR=200,nR=315;
  const aStep=360/Math.max(br.length,1);let svg='';
  br.forEach((b,i)=>{
    const a=(aStep*i-90)*(Math.PI/180),bx=CX+bR*Math.cos(a),by=CY+bR*Math.sin(a),c=b.color||'#3de8b0';
    svg+=`<line x1="${CX}" y1="${CY}" x2="${bx}" y2="${by}" stroke="${c}" stroke-width="2" stroke-opacity="0.5"/>`;
    const bl=String(b.label||''),bw=Math.max(100,bl.length*7+24);
    svg+=`<rect x="${bx-bw/2}" y="${by-15}" width="${bw}" height="30" rx="15" fill="${c}" fill-opacity="0.12" stroke="${c}" stroke-width="1.5"/><text x="${bx}" y="${by+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${c}" font-family="system-ui,sans-serif">${bl.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
    (b.nodes||[]).forEach((n,j)=>{
      const nodes=b.nodes,sp=nodes.length>1?55*(nodes.length-1)/2:0,na=a+((-sp+j*(nodes.length>1?55:0))*(Math.PI/180)),nx=CX+nR*Math.cos(na),ny=CY+nR*Math.sin(na),nl=String(n||'').slice(0,32),nw=Math.max(70,nl.length*6+16);
      svg+=`<line x1="${bx}" y1="${by}" x2="${nx}" y2="${ny}" stroke="${c}" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/><rect x="${nx-nw/2}" y="${ny-11}" width="${nw}" height="22" rx="11" fill="#0f1f38" stroke="${c}" stroke-width="1" stroke-opacity="0.4"/><text x="${nx}" y="${ny+4}" text-anchor="middle" font-size="9.5" fill="#c8d8f0" font-family="system-ui,sans-serif">${nl.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
    });
  });
  const pg=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DealHub Mind Map — ${co}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a1628;color:#e8f0fe;font-family:system-ui,sans-serif}.bar{background:#0f1f38;border-bottom:1px solid #1e3a5f;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}.bt{font-size:13px;font-weight:700;color:#3de8b0}.bs{font-size:11px;color:#7a9bc4;margin-top:1px}.leg{display:flex;flex-wrap:wrap;gap:8px;padding:8px 24px 0}.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#7a9bc4}.dot{width:9px;height:9px;border-radius:50%}.wrap{display:flex;align-items:center;justify-content:center;padding:12px;overflow:auto;min-height:calc(100vh - 80px)}@media print{.np{display:none!important}}</style></head><body>
<div class="bar np"><div><div class="bt">🗺️ DealHub Configuration Mind Map — ${co}</div><div class="bs">${dt}</div></div><button onclick="window.print()" style="background:#1e3a5f;color:#3de8b0;border:1px solid #3de8b0;border-radius:6px;padding:6px 14px;font-size:11px;cursor:pointer">🖨️ Save PDF</button></div>
<div class="leg np">${br.map(b=>`<div class="li"><div class="dot" style="background:${b.color}"></div><span>${(b.label||'').replace(/&/g,'&amp;')}</span></div>`).join('')}</div>
<div class="wrap"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto"><rect width="${W}" height="${H}" fill="#0a1628"/>${Array.from({length:20},(_,i)=>Array.from({length:14},(_,j)=>`<circle cx="${i*65}" cy="${j*65}" r="1" fill="#1e3a5f" opacity="0.3"/>`).join('')).join('')}${svg}<circle cx="${CX}" cy="${CY}" r="58" fill="#0f2a1e" stroke="#3de8b0" stroke-width="2.5"/><circle cx="${CX}" cy="${CY}" r="50" fill="none" stroke="#3de8b0" stroke-width=".5" stroke-opacity=".25"/><text x="${CX}" y="${CY-9}" text-anchor="middle" font-size="12" font-weight="800" fill="#3de8b0" font-family="system-ui,sans-serif">${(co.length>13?co.slice(0,13)+'…':co).replace(/&/g,'&amp;')}</text><text x="${CX}" y="${CY+9}" text-anchor="middle" font-size="9" fill="#7a9bc4" font-family="system-ui,sans-serif">DealHub</text><text x="${CX}" y="${CY+21}" text-anchor="middle" font-size="9" fill="#7a9bc4" font-family="system-ui,sans-serif">Configuration</text></svg></div></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(pg);w.document.close();}else{const b=new Blob([pg],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`DealHub_MindMap_${co.replace(/\s+/g,'_')}.html`;a.click();}
}

function renderDone(){
  document.getElementById('content').innerHTML=`<div class="card"><div class="done-sc"><div style="width:68px;height:68px;border-radius:50%;background:var(--accent);border:1px solid rgba(61,232,176,.3);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:16px">🎉</div><div style="font-size:24px;font-weight:800;margin-bottom:8px">Discovery complete!</div><p style="font-size:13px;color:var(--muted);max-width:400px;line-height:1.7;margin-bottom:24px">Thank you. Your DealHub team has everything they need to begin configuration. Expect a follow-up within <strong style="color:var(--text)">2 business days</strong>.</p><button class="btn btn-p" onclick="startOver()">Start New Discovery</button></div></div>`;
  document.getElementById('footer').innerHTML='';document.getElementById('prog').innerHTML='';

function startOver(){st=freshSt();aiMs=[{r:'ai',h:'👋 Ready for a new discovery! Fill in the company name above and let\'s get started.'}];aiSeen=new Set();document.getElementById('coInp').value='';render();}

function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFile(inp){const f=inp.files[0];if(f)processFile(f);inp.value='';}
function clearSku(){st.skuFile='';st.skuCount=0;st.skus=[];st.productInsight='';render();}

function processFile(file){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg('skuMsg','⚠️ File appears empty',1);return;}
      st.skus=json.map(row=>({id:uid(),...row}));st.skuFile=file.name;st.skuCount=json.length;
      render();analyseProducts();
    }catch(err){showMsg('skuMsg','⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}

async function analyseProducts(){
  st.productInsightLoading=true;render();
  const sample=st.skus.slice(0,30).map(s=>Object.values(s).filter(v=>v&&v!=='id').slice(0,5).join(' | ')).join('\n');
  const sys=`You are a DealHub CPQ architect. Analyse this product catalog and write a 2-3 sentence plain-English summary for the client. Describe: number of product families, pricing models (per-user/per-seat/per-transaction/flat/tiered), billing types (one-time vs recurring), and any notable structural patterns. End with one sentence about what this means for DealHub configuration. Plain prose only — no markdown.`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:180,system:sys,messages:[{role:'user',content:`Product catalog (${st.skuCount} SKUs):\n${sample}`}]})});
    const d=await res.json();
    if(!d.error){st.productInsight=d.content?.[0]?.text||'';pushAI(`I've analysed your product catalog. ${st.productInsight} Click <strong>Continue</strong> when you're happy with what's uploaded.`);}
  }catch(e){}
  st.productInsightLoading=false;render();
}

function showMsg(id,msg,e){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.style.color=e?'#f87171':'var(--primary)';if(!e)setTimeout(()=>{if(el)el.textContent='';},5000);}

render();
</script>
