<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;font-size:14px}
:root{--bg:#0a1628;--card:#0f1f38;--border:#1e3a5f;--primary:#3de8b0;--text:#e8f0fe;--muted:#7a9bc4;--accent:#1a3d2e}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#0a1628}
.logo-text{font-size:16px;font-weight:800}
.logo-text span{color:var(--primary)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-co{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.hdr-co input{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;outline:none;width:170px}
.hdr-co input:focus{border-color:var(--primary)}
.prog{background:#080f1e;border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.prog::-webkit-scrollbar{height:0}
.ps{display:flex;align-items:center;gap:8px;padding:10px 14px 10px 0;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ps+.ps{padding-left:14px}
.ps.active .pl{color:var(--primary)}.ps.active{border-bottom-color:var(--primary)}
.ps.done .pl{color:#34d399}.ps.done{border-bottom-color:#34d399}
.pn{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ps.active .pn{background:var(--primary);color:#0a1628}
.ps.done .pn{background:#34d399;color:#0a1628}
.pl{font-size:12px;font-weight:600;color:var(--muted)}
.pa{color:var(--border);font-size:11px;margin-left:8px}
.page{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 98px)}
.content{padding:28px;max-width:740px}
.aside{background:#080f1e;border-left:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.ptitle{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2}
.ptitle em{color:var(--primary);font-style:normal}
.psub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px;max-width:580px}
.slbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px;margin-top:18px}
.slbl:first-child{margin-top:0}
.shint{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.inp{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:var(--primary)}
.inp::placeholder{color:var(--muted)}
.sel{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px;width:100%;outline:none;cursor:pointer}
.ta{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;width:100%;resize:vertical;outline:none;font-family:inherit;line-height:1.6}
.ta:focus{border-color:var(--primary)}
.ta::placeholder{color:var(--muted)}
.lbl{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.btn{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:.4;cursor:default}
.btn-p{background:var(--primary);border-color:var(--primary);color:#0a1628;font-weight:700}
.btn-p:hover{opacity:.9;color:#0a1628}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-d{color:#f87171;border-color:#3a1f1f;padding:5px 10px;font-size:11px}
.btn-d:hover{background:#1a0a0a;border-color:#f87171}
.btn-ai{background:linear-gradient(135deg,#0f2a1e,#0d2137);border:1px solid var(--primary);color:var(--primary);font-weight:600}
.btn-ai:hover{background:var(--accent)}
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uc{background:#0a1628;border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;user-select:none}
.uc:hover{border-color:var(--muted)}
.uc.on{border-color:var(--primary);background:rgba(61,232,176,.04)}
.uc-top{display:flex;align-items:flex-start;gap:10px}
.uc-ico{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.uc-inf{flex:1}
.uc-n{font-size:13px;font-weight:600;margin-bottom:3px}
.uc-d{font-size:11px;color:var(--muted);line-height:1.4}
.uc-ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all .18s;margin-top:1px}
.uc.on .uc-ck{background:var(--primary);border-color:var(--primary);color:#0a1628}
.uc-det{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.uc-det-lbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sw{position:relative;width:38px;height:21px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-t{position:absolute;cursor:pointer;inset:0;background:#1a2d4a;border-radius:21px;transition:.2s;border:1px solid var(--border)}
.sw-t:before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:.2s}
input:checked+.sw-t{background:var(--accent);border-color:var(--primary)}
input:checked+.sw-t:before{transform:translateX(17px);background:var(--primary)}
.dz{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.ov{border-color:var(--primary);background:rgba(61,232,176,.03)}
.fok{background:rgba(61,232,176,.06);border:1.5px solid rgba(61,232,176,.4);border-radius:10px;padding:13px;display:flex;align-items:center;justify-content:space-between}
.insight{background:var(--accent);border:1px solid rgba(61,232,176,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text);line-height:1.6;margin-top:12px}
.insight strong{color:var(--primary)}
.etbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
.etbl th{background:#080f1e;color:var(--muted);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border)}
.etbl td{padding:5px 7px;border-bottom:1px solid rgba(30,58,95,.4)}
.etbl input{background:transparent;border:none;color:var(--text);font-size:11px;width:100%;outline:none;padding:2px 3px}
.etbl input:focus{background:#0a1628;border-radius:4px}
.ai-wrap{display:flex;flex-direction:column;height:100%;min-height:calc(100vh - 130px)}
.ai-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-shrink:0}
.ai-ttl{font-size:12px;font-weight:700;color:var(--primary)}
.ai-stag{font-size:10px;color:var(--muted);background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:auto}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.ai-msgs::-webkit-scrollbar{width:3px}
.ai-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.ai-b{background:var(--accent);border:1px solid rgba(61,232,176,.12);border-radius:8px 8px 8px 2px;padding:9px 11px;font-size:11px;line-height:1.65}
.ai-b strong{color:var(--primary)}
.usr-b{background:#1a2d4a;border-radius:8px 8px 2px 8px;padding:9px 11px;font-size:11px;align-self:flex-end;text-align:right;max-width:90%}
.ai-typ{display:flex;gap:4px;padding:9px 11px;background:var(--accent);border-radius:8px 8px 8px 2px;width:fit-content}
.dot{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(61,232,176,.3);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.spin-dk{border-color:rgba(0,0,0,.15);border-top-color:#0a1628}
.ai-row{display:flex;gap:6px;flex-shrink:0}
.ai-in{flex:1;background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:11px;outline:none;font-family:inherit}
.ai-in:focus{border-color:var(--primary)}
.ai-snd{background:var(--primary);border:none;border-radius:6px;padding:7px 11px;color:#0a1628;font-size:11px;font-weight:700;cursor:pointer}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rev-c{background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.rev-n{font-size:26px;font-weight:800;color:var(--primary)}
.rev-l{font-size:11px;color:var(--muted);margin-top:3px}
.gen-c{border-radius:12px;padding:18px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;background:var(--accent);color:var(--primary);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600}
.footer{border-top:1px solid var(--border);background:var(--card);padding:11px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:15}
.done-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;min-height:360px}
.section-hdr-inline{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px;margin-top:0}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="logo">
    <div class="logo-mark">D</div>
    <div><div class="logo-text">DealHub <span>Discovery</span></div><div class="logo-sub">Post-overview configuration questionnaire</div></div>
  </div>
  <div class="hdr-co">Company: <input id="coInp" placeholder="Your company name" oninput="st.co=this.value"></div>
</div>
<div class="prog" id="prog"></div>
<div class="page">
  <div class="content" id="content"></div>
  <div class="aside">
    <div class="ai-wrap">
      <div class="ai-hdr"><span style="font-size:16px">🤖</span><span class="ai-ttl">DealHub AI Advisor</span><span class="ai-stag" id="aiTag">Step 1</span></div>
      <div class="ai-msgs" id="aiMsgs"></div>
      <div class="ai-row"><input class="ai-in" id="aiIn" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendAI()"><button class="ai-snd" onclick="sendAI()">↗</button></div>
    </div>
  </div>
</div>
<div class="footer" id="footer"></div>
</div>

<script>
const PX='https://dealhub-proxy.vercel.app/api/chat';
const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const SAVE_KEY='dh_discovery_v3';

const STEPS=[
  {id:'about',     label:'About You',         e:'🏢'},
  {id:'products',  label:'Your Products',     e:'📦'},
  {id:'selling',   label:'How You Sell',      e:'💡'},
  {id:'decisions', label:'Decision Tree',     e:'🌿'},
  {id:'rules',     label:'Approvals & Terms', e:'📋'},
  {id:'review',    label:'Review & Generate', e:'🚀'},
];

// Core use cases shown upfront
const UCS_CORE=[
  {k:'multiyear',  i:'📅',n:'Multi-Year Contracts',   d:'Deals spanning 2+ years, sometimes with different pricing each year.',         q:'How does pricing change year-over-year? Same rate with annual uplift (CPI %), or custom pricing per year?'},
  {k:'ramp',       i:'📈',n:'Ramp-Up Pricing',        d:'Customers start small and scale up — the price follows the ramp schedule.',    q:'Typical ramp? e.g. 50 users Yr1, 100 Yr2. Is the total TCV locked at signing even as quantities ramp?'},
  {k:'partners',   i:'🤝',n:'Partner & Reseller Deals',d:'You sell through partners or resellers who receive different pricing.',        q:'Do partners get a flat tier or deal-by-deal? Should their discount pull automatically from your CRM?'},
  {k:'trials',     i:'🧪',n:'Trials & Pilots',        d:'Free or discounted pilots before the paid contract begins.',                   q:'How long do trials run? Do they auto-convert to paid, or does the rep create a new quote?'},
  {k:'overage',    i:'📊',n:'Usage & Overages',       d:'Customers have a usage limit — exceeding it triggers an overage charge.',      q:'Billed monthly in arrears or at contract end? Any grace buffer before overage kicks in?'},
  {k:'optional',   i:'➕',n:'Optional Add-Ons',       d:'Quotes include optional products the customer can choose to include or skip.',  q:'Are add-ons visible to the buyer in DealRoom, or only to the rep building the quote?'},
];
// Advanced use cases — shown after "Show more"
const UCS_ADV=[
  {k:'cpi',        i:'📆',n:'Annual Price Increases',  d:'Automatic annual uplift — fixed % or tied to CPI.',                           q:'Default uplift rate? Can reps waive it or does that require approval?'},
  {k:'redline',    i:'⚖️',n:'Contract Redlining',      d:'Customers negotiate changes to your standard contract or MSA terms.',          q:'Which docs get redlined most — MSA, Order Form, or both? Handled in DealHub or outside?'},
  {k:'docusign',   i:'✍️',n:'DocuSign / e-Signature',  d:'Quotes are sent for electronic signature via DocuSign or similar.',            q:'Do you currently use DocuSign? Or would you use DealHub\'s native signature? Any other e-sign tools?'},
  {k:'marketplace',i:'🛒',n:'Marketplace Sales',       d:'You sell through AWS, GCP, Azure Marketplace or similar platforms.',           q:'Which marketplace(s)? Does pricing differ from direct, and is billing handled by the marketplace?'},
  {k:'custom',     i:'🍒',n:'Custom Deal Structures',  d:'Some deals need a hand-built product selection by RevOps or Deal Desk.',       q:'How often? Who has permission — only RevOps, or can AEs request it too?'},
  {k:'integrations',i:'🔌',n:'Other Integrations',    d:'DealHub connects with ERP, SSO, Slack, or other tools beyond the CRM.',        q:'Any must-haves for go-live beyond CRM and DocuSign? Slack for approval notifications, SSO, ERP?'},
];
const ALL_UCS=[...UCS_CORE,...UCS_ADV];

function freshSt(){return{
  step:0,submitted:false,
  // S1
  co:'',industry:'',crm:'Salesforce',crmEdition:'',sfObject:'Quote',
  adminName:'',adminEmail:'',
  dealVolume:'',dealSize:'',contractLength:'12',goLive:'',addCtx:'',
  // S2
  skuFile:'',skuCount:0,skus:[],colMap:{},showColMapper:false,
  pricingModels:[],pricingModel:'',productFamilies:'',currencyMode:'',
  multiCurrency:false,currencies:'',
  productInsight:'',productInsightLoading:false,
  // S3
  useCases:ALL_UCS.map(u=>({...u,id:uid(),on:false,detail:''})),
  showAdvUC:false,decisionNodes:[],diagramUrl:'',dtAiLoading:false,
  quoteCreators:'',currentQuote:'',sellingFlow:'',
  // S4
  approvalText:'',approvalFile:'',approvalRows:[],ruleRows:[],
  extractLoading:false,extractErr:'',
  approvalEdge:'',
  payTerms:'',netDays:'',autoRenew:'',msa:'',otherTerms:'',
  // S5
  csm:'',
  docGenerating:false,docError:'',
  mmGenerating:false,mmError:'',
};}
let st=freshSt();
let showAdvUC=false;

// ── SAVE & RESTORE ──────────────────────────────────────────────────────────
function saveState(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({st,aiMs:aiMs.slice(-20),ts:Date.now()}));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const saved=JSON.parse(raw);
    // Only restore if saved in last 7 days
    if(Date.now()-saved.ts>7*24*60*60*1000){localStorage.removeItem(SAVE_KEY);return false;}
    st={...freshSt(),...saved.st};
    if(saved.aiMs)aiMs=[...saved.aiMs];
    return true;
  }catch(e){return false;}
}
function clearSave(){localStorage.removeItem(SAVE_KEY);}
// Auto-save on any state change
function save(){saveState();}

// ── AI ─────────────────────────────────────────────────────────────────────
let aiMs=[{r:'ai',h:'👋 Hi! I\'m your <strong>DealHub AI Advisor</strong>. I have deep DealHub platform knowledge and I\'ll help translate your answers into a configuration design document. Start with <strong>About You</strong> when ready — any questions as you go, just ask.'}];
let aiLoading=false,aiSeen=new Set();

const INTROS=[
  null,
  'You\'re on <strong>Your Products</strong>. Upload your catalog and I\'ll analyse it instantly — product families, pricing models, billing types. The more accurate this is, the better the question group structure in your design doc.',
  'Now for <strong>How You Sell</strong>. Select every scenario that applies. The detail boxes that appear are the most important part — don\'t skip them. The more you write there, the less your CSM has to chase you for later.',
  'For <strong>Quoting Rules</strong> — just describe it naturally, like explaining to a new colleague. I\'ll extract the approval hierarchy and rule-based workflows automatically. Then tell me about any edge cases like OOO escalation.',
  'Almost there! Before generating, check the completion score below. A higher score means a more complete design document — worth spending an extra few minutes on any gaps.',
];

function triggerIntro(s){
  if(aiSeen.has(s)||!INTROS[s])return;
  aiSeen.add(s);setTimeout(()=>pushAI(INTROS[s]),500);
}
function pushAI(h){aiMs.push({r:'ai',h});drawAI();save();}
function drawAI(){
  const el=document.getElementById('aiMsgs');if(!el)return;
  el.innerHTML=aiMs.map(m=>m.r==='ai'
    ?`<div class="ai-b">${m.h}</div>`
    :`<div class="usr-b">${esc(m.text||'')}</div>`
  ).join('');
  if(aiLoading)el.innerHTML+=`<div class="ai-typ"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  el.scrollTop=el.scrollHeight;
  const t=document.getElementById('aiTag');if(t)t.textContent=`Step ${st.step+1} — ${STEPS[st.step]?.label}`;
}
function aiSys(){
  const en=st.useCases.filter(u=>u.on).map(u=>u.n);
  return `You are a friendly DealHub CPQ onboarding advisor. The client has already had a DealHub overview.
Context: Company: ${st.co||'unknown'} | Industry: ${st.industry||'unknown'} | CRM: ${st.crm} | Products: ${st.skuCount} SKUs | Pricing model: ${st.pricingModel||'unknown'} | Use cases: ${en.join(', ')||'none yet'} | Contract length: ${st.contractLength}mo | Step: ${STEPS[st.step]?.label}
Rules: warm, concise (2-3 sentences), ask ONE question, light DealHub terminology is fine. Their answers feed directly into the design doc.`;
}
async function sendAI(){
  const inp=document.getElementById('aiIn');const txt=(inp?.value||'').trim();if(!txt||aiLoading)return;
  inp.value='';aiMs.push({r:'user',text:txt});aiLoading=true;drawAI();
  const msgs=aiMs.map(m=>({role:m.r==='ai'?'assistant':'user',content:m.h?m.h.replace(/<[^>]+>/g,''):m.text||''}));
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:aiSys(),messages:msgs})});
    const d=await res.json();
    pushAI(d.error?`⚠️ ${d.error.message}`:(d.content?.[0]?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'));
  }catch(e){pushAI('⚠️ Could not reach advisor.');}
  aiLoading=false;drawAI();
}

// Nudge when use case detail is too short
function checkUCDetail(id){
  const u=st.useCases.find(u=>u.id===id);
  if(u&&u.detail&&u.detail.length<25&&u.detail.length>3){
    setTimeout(()=>{
      pushAI(`For <strong>${u.n}</strong> — can you add a bit more detail? Specifically: ${u.q}`);
    },1500);
  }
}

// ── COMPLETION SCORE ────────────────────────────────────────────────────────
function scoreCompletion(){
  let score=0,max=0,gaps=[];
  const check=(val,label,w=10)=>{max+=w;if(val&&String(val).trim().length>1){score+=w;}else{gaps.push(label);}};
  check(st.co,'Company name',15);
  check(st.industry,'Industry',5);
  check(st.crm,'CRM',5);
  check(st.contractLength,'Contract length',5);
  check(st.goLive,'Go-live target',5);
  check(st.adminName,'DealHub admin name',10);
  if(st.skuCount>0){score+=10;max+=10;}else{max+=10;gaps.push('Product catalog');}
  check(st.pricingModel,'Pricing model',10);
  const enUC=st.useCases.filter(u=>u.on);
  if(enUC.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Use cases');}
  const ucDetails=enUC.filter(u=>u.detail&&u.detail.length>20);
  if(ucDetails.length===enUC.length&&enUC.length>0){score+=10;max+=10;}
  else if(enUC.length>0){max+=10;gaps.push('Use case details (some too short)');}
  check(st.sellingFlow,'Quoting flow description',10);
  if(st.decisionNodes&&st.decisionNodes.length>1){score+=10;max+=10;}else{max+=10;gaps.push('Decision tree nodes');}
  if(st.approvalRows.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Approval rules');}
  check(st.payTerms,'Payment terms',5);
  check(st.netDays,'Net days',5);
  const pct=Math.round(score/max*100);
  return{pct,gaps,score,max};
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  drawProg();
  if(st.submitted){renderDone();drawFooter();return;}
  const fns=[S1,S2,S3,S4_Decisions,S5,S6];
  document.getElementById('content').innerHTML=`<div>${(fns[st.step]||S1)()}</div>`;
  drawFooter();drawAI();
  setTimeout(()=>triggerIntro(st.step),400);
  save();
}

function drawProg(){
  document.getElementById('prog').innerHTML=STEPS.map((s,i)=>{
    const cls=i===st.step?'active':i<st.step?'done':'';
    return `<div class="ps ${cls}" onclick="goStep(${i})">
      <span class="pn">${i<st.step?'✓':i+1}</span>
      <span class="pl">${s.e} ${s.label}</span>
      ${i<STEPS.length-1?'<span class="pa">›</span>':''}
    </div>`;
  }).join('');
}
function drawFooter(){
  const last=st.step===STEPS.length-1;
  document.getElementById('footer').innerHTML=`
<button class="btn" onclick="prevStep()" ${st.step===0?'disabled':''}>← Back</button>
<span style="font-size:11px;color:var(--muted)">${st.step+1} / ${STEPS.length}</span>
${last
  ?`<button class="btn btn-p" onclick="submitForm()">Submit ✓</button>`
  :`<button class="btn btn-p" onclick="nextStep()">Continue →</button>`
}`;
}
function goStep(i){st.step=i;render();window.scrollTo(0,0);}
function nextStep(){if(st.step<STEPS.length-1){st.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(st.step>0){st.step--;render();}}
function submitForm(){st.submitted=true;render();}

Matrix: lowest to highest authority. max is discount ceiling as % string.
Rules: condition phrased as DealHub would. Include real names mentioned if any.`;
  try{

// ── FILE HANDLING ───────────────────────────────────────────────────────────
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFile(inp){const f=inp.files[0];if(f)processFile(f);inp.value='';}
function clearSku(){st.skuFile='';st.skuCount=0;st.skus=[];st.productInsight='';st.colMap={};st.productFamilies='';save();render();}

function processFile(file){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg('skuMsg','⚠️ File appears empty',1);return;}
      st.skus=json.map(row=>({id:uid(),...row}));
      st.skuFile=file.name;st.skuCount=json.length;
      // Auto-detect column mappings
      const keys=Object.keys(json[0]||{});
      const findCol=(patterns)=>keys.find(k=>patterns.some(p=>k.toLowerCase().includes(p)))||'';
      st.colMap={
        sku:findCol(['sku','code','id','product code']),
        name:findCol(['name','product name','description']),
        price:findCol(['price','list','msrp','rate']),
        uom:findCol(['uom','unit','measure']),
        family:findCol(['family','category','group','type']),
        type:findCol(['type','kind','class']),
      };
      save();render();
      analyseProducts();
    }catch(err){showMsg('skuMsg','⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}

async function analyseProducts(){
  st.productInsightLoading=true;render();
  const familyCol=st.colMap.family||st.colMap.type||'';
  const families=familyCol?[...new Set(st.skus.map(s=>s[familyCol]).filter(Boolean))].slice(0,8):[];
  const sample=st.skus.slice(0,30).map(s=>Object.values(s).filter(v=>v&&v!=='id').slice(0,5).join(' | ')).join('\n');
  const sys=`You are a DealHub CPQ architect. Analyse this product catalog. Write 2-3 sentences: number of product families (list them by name if detectable), primary pricing model(s), billing types (one-time vs recurring). End with one specific sentence about what question group structure this suggests for DealHub. Plain prose only.`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:sys,messages:[{role:'user',content:`${st.skuCount} SKUs. Detected families: ${families.join(', ')||'unclear'}.\n${sample}`}]})});
    const d=await res.json();
    if(!d.error){
      st.productInsight=d.content?.[0]?.text||'';

function renderDTChart(nodes){
  if(!nodes||nodes.length===0)return`<div style="display:flex;align-items:center;justify-content:center;height:240px;color:var(--muted);font-size:12px;text-align:center;padding:20px">No nodes yet — add some on the left or click Generate.</div>`;

  // Layout: place nodes in rows by type sequence
  // ENTRY → DECISION (center) → YES (left) / NO (right) → next DECISION → OUTPUT
  const W=560,BW=160,BH=38,GAP_Y=52,PAD_X=20;
  const CX=W/2;

  // Build rows: group nodes into rows based on type pattern
  const rows=[];
  let i=0;
  while(i<nodes.length){
    const n=nodes[i];
    if(n.type==='decision'){
      // Look ahead for yes/no branches
      const yes=nodes[i+1]&&nodes[i+1].type==='yes'?nodes[i+1]:null;
      const no=nodes[i+2]&&nodes[i+2].type==='no'?nodes[i+2]:yes?nodes[i+2]:null;
      const noIdx=yes?i+2:i+1;
      const noNode=nodes[noIdx]&&nodes[noIdx].type==='no'?nodes[noIdx]:null;
      if(yes||noNode){
        rows.push({type:'decision',node:n});
        rows.push({type:'branches',yes:yes,no:noNode});
        i+=1+(yes?1:0)+(noNode?1:0);
        continue;
      }
    }
    rows.push({type:'single',node:n});
    i++;
  }

  const totalH=PAD_X+rows.length*(BH+GAP_Y)+GAP_Y;
  let svg=`<svg width="${W}" height="${totalH}" viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
<rect width="${W}" height="${totalH}" fill="#0a1628"/>`;

  const typeCol={'entry':'#2563eb','decision':'#1d2d6b','yes':'#065f46','no':'#7f1d1d','output':'#14532d','single':'#1a2d4a'};
  const typeBorder={'entry':'#3b82f6','decision':'#4b5563','yes':'#059669','no':'#dc2626','output':'#16a34a','single':'#374151'};

  function box(x,y,w,h,type,label,sublabel){
    const col=typeCol[type]||typeCol.single;
    const bdr=typeBorder[type]||typeBorder.single;
    const lbl=(label||'').slice(0,22).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const tag={'entry':'ENTRY','decision':'DECISION','yes':'YES','no':'NO','output':'OUTPUT'}[type]||'NODE';
    const tagCol={'entry':'#93c5fd','decision':'#9ca3af','yes':'#6ee7b7','no':'#fca5a5','output':'#86efac'}[type]||'#9ca3af';
    let s='';
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${col}" stroke="${bdr}" stroke-width="1.2"/>`;
    s+=`<text x="${x+7}" y="${y+10}" font-size="7" font-weight="800" fill="${tagCol}" font-family="system-ui,sans-serif" opacity="0.9">${tag}</text>`;
    s+=`<text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" font-family="system-ui,sans-serif">${lbl||'…'}</text>`;
    return s;
  }

  function arrow(x1,y1,x2,y2,col='#3de8b0'){
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    return `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" fill="none" stroke="${col}" stroke-width="1.5" stroke-opacity="0.6"/>
<polygon points="${x2},${y2} ${x2-4},${y2-7} ${x2+4},${y2-7}" fill="${col}" fill-opacity="0.6"/>`;
  }

  let prevCX=CX, prevBotY=PAD_X;

  rows.forEach((row,ri)=>{
    const topY=PAD_X+ri*(BH+GAP_Y);
    const botY=topY+BH;

    if(row.type==='single'){
      const x=CX-BW/2;
      svg+=box(x,topY,BW,BH,row.node.type,row.node.label);
      if(ri>0)svg+=arrow(prevCX,prevBotY,CX,topY);
      prevCX=CX;prevBotY=botY;
    }
    else if(row.type==='decision'){
      const x=CX-BW/2;
      svg+=box(x,topY,BW,BH,'decision',row.node.label);
      if(ri>0)svg+=arrow(prevCX,prevBotY,CX,topY);
      prevCX=CX;prevBotY=botY;
    }
    else if(row.type==='branches'){
      const {yes,no}=row;
      const branchBW=BW*0.88;
      // Yes left, No right
      const yesX=PAD_X+20;
      const noX=W-PAD_X-20-branchBW;
      const yesCX=yesX+branchBW/2;
      const noCX=noX+branchBW/2;

      if(yes){
        svg+=box(yesX,topY,branchBW,BH,'yes',yes.label);
        svg+=arrow(prevCX,prevBotY,yesCX,topY,'#059669');
        // YES label on line
        const lx=(prevCX+yesCX)/2,ly=(prevBotY+topY)/2;
        svg+=`<text x="${lx-4}" y="${ly}" font-size="9" font-weight="700" fill="#6ee7b7" font-family="system-ui,sans-serif">YES</text>`;
      }
      if(no){
        svg+=box(noX,topY,branchBW,BH,'no',no.label);
        svg+=arrow(prevCX,prevBotY,noCX,topY,'#dc2626');
        const lx=(prevCX+noCX)/2,ly=(prevBotY+topY)/2;
        svg+=`<text x="${lx}" y="${ly}" font-size="9" font-weight="700" fill="#fca5a5" font-family="system-ui,sans-serif">NO</text>`;
      }

      // Reconnect branches to next row — merge point below
      prevCX=yes&&no?CX:yes?yesCX:noCX;
      prevBotY=topY+BH;
      // Draw merge lines if both branches
      if(yes&&no){
        const mergY=topY+BH+GAP_Y*0.4;
        svg+=`<line x1="${yesCX}" y1="${topY+BH}" x2="${CX}" y2="${mergY}" stroke="#3de8b0" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/>`;
        svg+=`<line x1="${noCX}" y1="${topY+BH}" x2="${CX}" y2="${mergY}" stroke="#3de8b0" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/>`;
      }
    }
  });

  return svg+`</svg>`;
}

function applyAutoNodes(){
  const en=st.useCases.filter(u=>u.on);
  const nodes=[];
  const cl=st.contractLength||'12';
  nodes.push({id:uid(),type:'entry',label:'Opportunity Type (CRM)',value:`Read from CRM — drives which motion loads\nEntry trigger: Opportunity.Type\nNew Business → this playbook`,children:[]});
  if(en.some(u=>u.k==='partners')){
    nodes.push({id:uid(),type:'decision',label:'Direct or Partner?',value:'Field: Deal_Type__c — read from CRM',children:[]});
    nodes.push({id:uid(),type:'yes',label:'Partner path',value:'→ Load [Partner] QG\n→ Query partner record from CRM\n→ Auto-pull partner discount tier',children:[]});
    nodes.push({id:uid(),type:'no',label:'Direct path',value:'→ Standard pricing\n→ No partner fields shown',children:[]});
  }
  if(en.some(u=>['multiyear','ramp'].includes(u.k))){
    nodes.push({id:uid(),type:'decision',label:'Multi-year contract?',value:`Duration > ${cl} months = multi-year`,children:[]});
    nodes.push({id:uid(),type:'yes',label:'Multi-year path',value:`→ Load [Multi_System_Settings] QG\n→ Year-by-year pricing sections\n→ Ordinal date calculations`,children:[]});
    nodes.push({id:uid(),type:'no',label:'Standard annual',value:`→ Single term — ${cl} months\n→ End Date = ADD_MONTHS(Start, ${cl})`,children:[]});
  }
  if(st.productFamilies){
    st.productFamilies.split(/[,;]/).map(f=>f.trim()).filter(Boolean).slice(0,2).forEach(fam=>{
      nodes.push({id:uid(),type:'decision',label:`${fam.slice(0,18)} included?`,value:`Playbook filter: Product_Family = "${fam}"`,children:[]});
      nodes.push({id:uid(),type:'yes',label:`${fam.slice(0,16)} config`,value:`→ Show ${fam} product group\n→ Require seat/quantity input\n→ Auto-add child SKUs`,children:[]});
      nodes.push({id:uid(),type:'no',label:'Skip '+fam.slice(0,14),value:`→ Hide ${fam} QG entirely`,children:[]});
    });
  }
  if(en.some(u=>u.k==='trials')){
    nodes.push({id:uid(),type:'decision',label:'Trial / Pilot?',value:'Field: Is_Trial__c — CRM or rep selects',children:[]});
    nodes.push({id:uid(),type:'yes',label:'Trial path',value:'→ Complementary period flag\n→ No line items, $0 quote',children:[]});
    nodes.push({id:uid(),type:'no',label:'Paid contract',value:'→ Standard products + pricing',children:[]});
  }
  nodes.push({id:uid(),type:'output',label:'Generate quote',value:`→ Order Form populated\n→ Push to ${st.crm}\n→ Send via ${en.some(u=>u.k==='docusign')?'DocuSign':'DealHub signature'}`,children:[]});
  st.decisionNodes=nodes;
  save();render();
  pushAI(`Generated <strong>${nodes.length} nodes</strong> with Yes/No branches. The flowchart shows the branching structure — Decision nodes fork into Yes (green) and No (red) paths. Edit any label or logic to match how your reps actually quote.`);
}

async function aiExpandDecisionTree(){
  if(!st.decisionNodes||st.decisionNodes.length===0){alert('Generate nodes first using the "Generate nodes" button.');return;}
  st.dtAiLoading=true;render();
  const en=st.useCases.filter(u=>u.on);
  const existing=st.decisionNodes.map(n=>`[${n.type.toUpperCase()}] ${n.label}: ${n.value}`).join('\n');
  const sys=`You are a DealHub Solution Architect. Given a partial decision tree, suggest 2-3 additional nodes that are missing.
Return ONLY a JSON array, no markdown: [{"type":"decision","label":"short label","value":"If X → do Y\\nElse → do Z"}]
Types: entry (first decision only), decision (branching logic), output (what the quote produces).
Keep labels under 30 chars. Value should be If/Then/Else format referencing real DealHub concepts (QG, SKU, CRM field, approval, price book).`;
  const ctx=`Company: ${st.co||'unknown'} | Industry: ${st.industry} | CRM: ${st.crm} | Products: ${st.productFamilies||'unknown'} | Pricing: ${st.pricingModel||'unknown'} | Use cases: ${en.map(u=>u.n).join(', ')||'none'}
Existing tree:\n${existing}\nSelling flow: ${st.sellingFlow||'not provided'}`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:sys,messages:[{role:'user',content:ctx}]})});
    const d=await res.json();
    if(!d.error){
      const parsed=JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim());
      parsed.forEach(n=>st.decisionNodes.push({id:uid(),type:n.type||'decision',label:n.label||'',value:n.value||'',children:[]}));
      pushAI(`Added <strong>${parsed.length} new node${parsed.length!==1?'s':''}</strong> to your decision tree. Review the If/Then logic carefully — I've suggested based on your use cases but you know your quoting flow best.`);
      save();
    }
  }catch(e){pushAI('⚠️ Could not reach AI for suggestions.');}
  st.dtAiLoading=false;render();
}

  st.mmGenerating=true;st.mmError='';render();
  try{

function buildTreeSVG(){
  const co=st.co||'Company';
  const en=st.useCases.filter(u=>u.on).map(u=>u.n);
  const families=st.productFamilies?st.productFamilies.split(/[,;]/).map(f=>f.trim()).filter(Boolean).slice(0,5)
    :[...new Set(st.skus.map(s=>{const v=Object.values(s).filter(v=>v&&v!=='id');return v[2]||v[1]||'';}).filter(Boolean))].slice(0,4);
  const tree={label:co,children:[
    {label:'New Business',color:'#1d2d6b',children:[
      ...(families.length?families.map(f=>({label:f.slice(0,18),color:'#2563eb',children:[]})):[{label:'Products',color:'#2563eb',children:[]}]),
      ...en.filter(u=>['Multi-Year Contracts','Ramp-Up Pricing','Trials & Pilots'].includes(u)).slice(0,2).map(u=>({label:u.replace(' Contracts','').replace(' Pricing',''),color:'#3b82f6',children:[]})),
    ]},
    {label:'Existing Business',color:'#1d2d6b',children:[
      {label:'Renewals',color:'#374151',children:[]},{label:'Expansions',color:'#374151',children:[]},{label:'Amendments',color:'#374151',children:[]},
    ]},
    {label:'Approvals',color:'#1d2d6b',children:[
      {label:st.approvalRows.length?`${st.approvalRows.length} Tiers`:'Discount Matrix',color:'#374151',children:[]},
      {label:st.ruleRows.length?`${st.ruleRows.length} Rules`:'Rule Workflows',color:'#374151',children:[]},
    ]},
    {label:'Configuration',color:'#1d2d6b',children:[
      {label:'Question Groups',color:'#374151',children:[]},{label:'Billing & Terms',color:'#374151',children:[]},
      ...(st.multiCurrency?[{label:'Multi-Currency',color:'#374151',children:[]}]:[]),
    ]},
  ]};
  return renderTreeSVG(tree);
}

function renderTreeSVG(tree){
  const W=1100,PH=38,CH=32,HGAP=28,rootH=46;
  const co=tree.label;
  const rootW=Math.max(180,co.length*11+40);
  function nodeWidth(n){
    if(!n.children||!n.children.length)return Math.max(100,n.label.length*8+24);
    const tw=n.children.reduce((s,c)=>s+nodeWidth(c),0)+(n.children.length-1)*HGAP;
    return Math.max(Math.max(130,n.label.length*9+28),tw);
  }
  function assignX(node,startX){
    if(!node.children||!node.children.length){node.w=nodeWidth(node);node.cx=startX+node.w/2;return node.w;}
    let x=startX,tw=0;
    node.children.forEach(c=>{const cw=assignX(c,x);x+=cw+HGAP;tw+=cw+HGAP;});
    tw-=HGAP;node.w=Math.max(nodeWidth(node),tw);
    node.cx=(node.children[0].cx+node.children[node.children.length-1].cx)/2;
    return node.w;
  }
  const dY=[60,60+rootH+50,60+rootH+50+PH+55,60+rootH+50+PH+55+CH+45];
  function assignY(node,d){node.cy=dY[Math.min(d,dY.length-1)];if(node.children)node.children.forEach(c=>assignY(c,d+1));}
  assignX(tree,80);tree.cx=W/2;assignY(tree,0);
  let nodes=[],conns=[];
  function collect(node,parent,d){
    nodes.push({...node,depth:d});
    if(parent)conns.push({x1:parent.cx,y1:parent.cy+(d===1?rootH:PH)/2,x2:node.cx,y2:node.cy-CH/2,d});
    if(node.children)node.children.forEach(c=>collect(c,node,d+1));
  }
  collect(tree,null,0);
  const maxY=Math.max(...nodes.map(n=>n.cy))+50;
  let svg=`<svg width="${W}" height="${maxY+40}" viewBox="0 0 ${W} ${maxY+40}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block"><rect width="${W}" height="${maxY+40}" fill="#fafbff"/>`;
  conns.forEach(c=>{const my=(c.y1+c.y2)/2;svg+=`<path d="M${c.x1},${c.y1} C${c.x1},${my} ${c.x2},${my} ${c.x2},${c.y2}" fill="none" stroke="${c.d===1?'#1d4ed8':'#93c5fd'}" stroke-width="${c.d===1?2:1.5}" stroke-opacity="${c.d===1?0.8:0.6}"/>`;});
  nodes.forEach(n=>{
    const lbl=(n.label||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(n.depth===0){svg+=`<rect x="${n.cx-rootW/2}" y="${n.cy-rootH/2}" width="${rootW}" height="${rootH}" rx="10" fill="#2563eb"/><text x="${n.cx}" y="${n.cy+5}" text-anchor="middle" font-size="16" font-weight="800" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,22)}</text>`;}
    else if(n.depth===1){const nw=Math.max(130,n.label.length*9+28);svg+=`<rect x="${n.cx-nw/2}" y="${n.cy-PH/2}" width="${nw}" height="${PH}" rx="7" fill="#1d2d6b"/><text x="${n.cx}" y="${n.cy+5}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,20)}</text>`;}
    else if(n.depth===2){const nw=Math.max(90,n.label.length*8+20);svg+=`<rect x="${n.cx-nw/2}" y="${n.cy-CH/2}" width="${nw}" height="${CH}" rx="5" fill="${n.color||'#2563eb'}"/><text x="${n.cx}" y="${n.cy+4}" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,18)}</text>`;}
    else{svg+=`<circle cx="${n.cx}" cy="${n.cy}" r="3" fill="#93c5fd"/><text x="${n.cx}" y="${n.cy+14}" text-anchor="middle" font-size="10" fill="#374151" font-family="system-ui,sans-serif">${lbl.slice(0,16)}</text>`;}
  });
  return svg+`</svg>`;
}
