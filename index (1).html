<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;font-size:14px}
:root{--bg:#0a1628;--card:#0f1f38;--border:#1e3a5f;--primary:#3de8b0;--text:#e8f0fe;--muted:#7a9bc4;--accent:#1a3d2e}
.app{background:var(--bg);min-height:100vh}
.header{border-bottom:1px solid var(--border);background:var(--card);padding:14px 24px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:var(--primary);color:#0a1628;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px}
.logo-title{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.logo-title span{color:var(--primary)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.client-row{display:flex;align-items:center;gap:8px}
.client-row label{font-size:12px;color:var(--muted)}
.steps{display:flex;gap:0;overflow-x:auto;padding-bottom:2px}
.steps::-webkit-scrollbar{height:3px}
.steps::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.step-item{display:flex;align-items:center;gap:0;flex-shrink:0}
.step-pill{display:flex;align-items:center;gap:7px;padding:6px 14px 6px 10px;border-radius:20px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;transition:all 0.2s;white-space:nowrap}
.step-pill:hover{color:var(--text)}
.step-pill.active{background:var(--primary);color:#0a1628;font-weight:700}
.step-pill.done{background:var(--accent);color:var(--primary)}
.step-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.step-pill.active .step-num{background:rgba(0,0,0,0.2);color:#0a1628}
.step-pill.done .step-num{background:rgba(61,232,176,0.3)}
.step-arrow{color:var(--border);font-size:12px;margin:0 2px}
.main{padding:24px;max-width:900px;margin:0 auto;padding-bottom:100px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px}
.step-heading{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2}
.step-heading span{color:var(--primary)}
.step-subheading{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;max-width:600px}
.section-label{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.section-hint{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.inp{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:border 0.15s}
.inp:focus{border-color:var(--primary)}
.inp::placeholder{color:var(--muted)}
.sel{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px;width:100%;outline:none;cursor:pointer}
.textarea{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;width:100%;resize:vertical;min-height:80px;outline:none;font-family:inherit;line-height:1.6;transition:border 0.15s}
.textarea:focus{border-color:var(--primary)}
.textarea::placeholder{color:var(--muted)}
.btn{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;font-weight:500}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:0.4;cursor:default}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#0a1628;font-weight:700}
.btn-primary:hover{opacity:0.9;color:#0a1628}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#f87171;border-color:#3a1f1f;padding:5px 10px;font-size:12px}
.btn-danger:hover{background:#1a0f0f;border-color:#ef4444;color:#ef4444}
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uc-card{background:#0a1628;border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;user-select:none}
.uc-card:hover{border-color:var(--muted)}
.uc-card.active{border-color:var(--primary);background:rgba(61,232,176,0.04)}
.uc-card-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.uc-icon{font-size:18px;width:32px;text-align:center;flex-shrink:0}
.uc-name{font-size:13px;font-weight:600;flex:1}
.uc-desc{font-size:11px;color:var(--muted);line-height:1.5;padding-left:42px}
.uc-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all 0.2s}
.uc-card.active .uc-check{background:var(--primary);border-color:var(--primary);color:#0a1628;font-weight:700}
.uc-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.uc-detail-label{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.upload-zone:hover,.upload-zone.active{border-color:var(--primary);background:rgba(61,232,176,0.03)}
.upload-success{background:rgba(61,232,176,0.06);border:1.5px solid rgba(61,232,176,0.4);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.switch{position:relative;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#1a2d4a;border-radius:22px;transition:0.2s;border:1px solid var(--border)}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:0.2s}
input:checked+.slider{background:var(--accent);border-color:var(--primary)}
input:checked+.slider:before{transform:translateX(18px);background:var(--primary)}
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.review-card{background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:14px}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:var(--primary);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.footer{border-top:1px solid var(--border);background:var(--card);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:9}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;min-height:360px}
.fc-wrap{background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:16px;overflow-y:auto;max-height:520px}
#aiBtn{position:fixed;bottom:84px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(61,232,176,0.35);z-index:100;transition:transform 0.2s}
#aiBtn:hover{transform:scale(1.08)}
.notif{position:absolute;top:2px;right:2px;width:12px;height:12px;background:#f87171;border-radius:50%;border:2px solid var(--bg);display:none}
#aiPanel{position:fixed;bottom:150px;right:24px;width:340px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);z-index:100;display:none;flex-direction:column;overflow:hidden}
#aiPanel.open{display:flex}
#aiPanelHeader{background:#0a1e35;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#aiPanelHeader span{font-size:13px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px}
#aiCloseBtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
#aiCloseBtn:hover{color:var(--text)}
#aiMessages{height:280px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
#aiMessages::-webkit-scrollbar{width:3px}
#aiMessages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ai-bubble{background:var(--accent);border:1px solid rgba(61,232,176,0.15);border-radius:10px 10px 10px 3px;padding:9px 12px;font-size:12px;line-height:1.6;max-width:94%}
.ai-bubble strong{color:var(--primary)}
.user-bubble{background:#1a2d4a;border-radius:10px 10px 3px 10px;padding:9px 12px;font-size:12px;line-height:1.5;max-width:88%;align-self:flex-end;text-align:right}
.dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
.ai-typing{background:var(--accent);border-radius:10px;padding:9px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
#aiInputRow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:#0a1e35}
#aiInput{flex:1;background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
#aiInput:focus{border-color:var(--primary)}
#aiStepLabel{padding:5px 12px;font-size:10px;color:var(--muted);background:#0a1628;text-align:center;border-bottom:1px solid var(--border)}
#aiSendBtn{background:var(--primary);border:none;border-radius:6px;padding:7px 12px;color:#0a1628;font-size:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">D</div>
      <div>
        <div class="logo-title">DealHub <span>Discovery</span></div>
        <div class="logo-sub">Tell us about your business — we'll handle the rest</div>
      </div>
    </div>
    <div class="client-row">
      <label>Company:</label>
      <input class="inp" id="clientNameInp" placeholder="Your company name" style="width:180px" oninput="state.clientName=this.value">
    </div>
  </div>
  <div class="steps" id="stepsBar"></div>
</div>
<div class="main" id="mainContent"></div>
<div class="footer" id="footer"></div>
</div>

<button id="aiBtn" onclick="toggleAI()" title="DealHub AI Advisor">🤖<div class="notif" id="aiNotif"></div></button>
<div id="aiPanel">
  <div id="aiPanelHeader">
    <span>🤖 DealHub AI Advisor</span>
    <button id="aiCloseBtn" onclick="toggleAI()">✕</button>
  </div>
  <div id="aiStepLabel">Here to help</div>
  <div id="aiMessages"></div>
  <div id="aiInputRow">
    <input id="aiInput" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendAI()">
    <button id="aiSendBtn" onclick="sendAI()">↗</button>
  </div>
</div>

<script>
const PROXY_URL='https://dealhub-proxy.vercel.app/api/chat';

const STEPS=[
  {label:'Welcome',e:'👋'},
  {label:'Your Business',e:'🏢'},
  {label:'How You Sell',e:'💡'},
  {label:'Quoting Rules',e:'📋'},
  {label:'Your DealRoom',e:'✨'},
  {label:'Review',e:'🚀'},
];

const STEP_INTROS=[
  null,
  'Welcome! I\'m here to help. Tell me — what does your company sell, and roughly how many deals do you close per month?',
  'Now let\'s talk about <strong>how you sell</strong>. Looking at the options on this page — which ones feel most familiar? Just pick what sounds like your business.',
  'For quoting rules — just describe it naturally, like explaining to a new colleague. Something like <em>"deals over $50K need VP approval"</em> is perfect.',
  null,
  'You\'re almost done! Is there anything you\'d like to add or clarify before we generate your DealHub configuration documents?',
];

const uid=()=>Math.random().toString(36).slice(2,9);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const UC_DEFS=[
  {key:'multi_year',icon:'📅',name:'Multi-Year Deals',desc:'You sell contracts that span 2+ years, sometimes with different pricing each year.'},
  {key:'ramp',icon:'📈',name:'Ramp-Up Pricing',desc:'Customers start with a lower quantity and scale up over time.'},
  {key:'partner',icon:'🤝',name:'Partner & Reseller Deals',desc:'You sell through partners or resellers who get different pricing.'},
  {key:'trial',icon:'🧪',name:'Trials & Proof of Concept',desc:'You offer free or discounted trials that convert to paid contracts.'},
  {key:'overage',icon:'📊',name:'Usage Overages',desc:'Customers have a usage limit — if they exceed it, they pay an overage rate.'},
  {key:'payg',icon:'💳',name:'Pay As You Go',desc:'Customers pay based on actual usage each month, with an optional minimum.'},
  {key:'optional',icon:'➕',name:'Optional Add-Ons',desc:'You include optional products on quotes that customers can choose to add.'},
  {key:'discount',icon:'🏷️',name:'One-Time Discounts',desc:'You occasionally offer special one-time discounts as a line item on a quote.'},
  {key:'cpi',icon:'📆',name:'Annual Price Increase (CPI)',desc:'Your contracts include an automatic annual price increase.'},
  {key:'redline',icon:'⚖️',name:'Contract Negotiations',desc:'Customers sometimes negotiate changes to your standard contract terms.'},
  {key:'integrations',icon:'🔌',name:'Integrations',desc:'You need DealHub connected to other tools — CRM, e-signature, ERP.'},
  {key:'cherry',icon:'🍒',name:'Custom Product Selection',desc:'Some deals need a manually curated product list by your RevOps or Deal Desk.'},
];

const DEFAULT_TERMS=[
  {id:uid(),q:'How do customers typically pay?',ph:'e.g. Annual upfront, monthly, quarterly…',value:''},
  {id:uid(),q:'What are your standard payment terms?',ph:'e.g. Net 30, Net 45…',value:''},
  {id:uid(),q:'Do contracts auto-renew?',ph:'e.g. Yes, with 30 days notice to cancel…',value:''},
  {id:uid(),q:'Do you use a Master Service Agreement (MSA)?',ph:'e.g. Yes, for enterprise deals only…',value:''},
  {id:uid(),q:'What payment methods do you accept?',ph:'e.g. Credit card, bank transfer, AWS Marketplace…',value:''},
];

function freshState(){return{
  step:0,submitted:false,clientName:'',
  industry:'',dealVolume:'',dealSize:'',crmSystem:'',
  skuFileName:'',skuCount:0,skus:[],
  multiCurrency:false,currencies:[],
  useCases:UC_DEFS.map(u=>({...u,id:uid(),enabled:false,details:''})),
  sellingContext:'',
  quotingFlow:'',dtGenerating:false,dtError:'',decisionTree:[],
  approvalsExtracting:false,approvalsExtractError:'',approvalRules:[],
  commercialTerms:DEFAULT_TERMS.map(t=>({...t,id:uid()})),
  dealRoomAssets:[],dealRoomNotes:'',
  docGenerating:false,docError:'',
  mmGenerating:false,mmError:'',
};}
let state=freshState();

// ── AI ─────────────────────────────────────────────────────────────────────
let aiOpen=false,aiLoading=false;
let aiMessages=[{role:'ai',html:'👋 Hi! I\'m your <strong>DealHub AI Advisor</strong>. I\'ll guide you through this discovery and answer any questions. Click through the steps when you\'re ready!'}];
let aiStepSeen=new Set();

function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('aiPanel').classList.toggle('open',aiOpen);
  document.getElementById('aiNotif').style.display='none';
  if(aiOpen)renderAI();
}
function renderAI(){
  const el=document.getElementById('aiMessages');if(!el)return;
  el.innerHTML=aiMessages.map(m=>m.role==='ai'?`<div class="ai-bubble">${m.html}</div>`:`<div class="user-bubble">${esc(m.text)}</div>`).join('');
  if(aiLoading)el.innerHTML+=`<div class="ai-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  el.scrollTop=el.scrollHeight;
  const sl=document.getElementById('aiStepLabel');
  if(sl)sl.textContent=`Step ${state.step+1} — ${STEPS[state.step].label}`;
}
function showNotif(){if(!aiOpen)document.getElementById('aiNotif').style.display='block';}
function pushAI(html){aiMessages.push({role:'ai',html});showNotif();if(aiOpen)renderAI();}

function triggerStepIntro(step){
  if(aiStepSeen.has(step))return;
  const msg=STEP_INTROS[step];if(!msg)return;
  aiStepSeen.add(step);
  setTimeout(()=>pushAI(msg),500);
}

function buildSysPrompt(){
  const en=state.useCases.filter(u=>u.enabled).map(u=>u.name);
  return `You are a friendly DealHub onboarding advisor helping a client after their DealHub overview session.
Client: ${state.clientName||'(not set)'} | Industry: ${state.industry||'unknown'} | CRM: ${state.crmSystem||'unknown'} | Use cases: ${en.join(', ')||'none yet'} | Step: ${STEPS[state.step]?.label}
Be warm, concise (2-3 sentences), ask ONE question at a time. Plain business language — no tech jargon. Reassure them this is just a starting point.`;
}

async function sendAI(){
  const inp=document.getElementById('aiInput');
  const text=(inp?.value||'').trim();if(!text||aiLoading)return;
  inp.value='';aiMessages.push({role:'user',text});aiLoading=true;renderAI();
  const msgs=aiMessages.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.html?m.html.replace(/<[^>]+>/g,''):m.text}));
  try{
    const r=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:buildSysPrompt(),messages:msgs})});
    const d=await r.json();
    pushAI(d.error?`⚠️ ${d.error.message}`:(d.content?.[0]?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'));
  }catch(e){pushAI('⚠️ Could not reach the advisor.');}
  aiLoading=false;renderAI();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  renderSteps();
  if(state.submitted){renderSuccess();return;}
  const fns=[S0,S1,S2,S3,S4,S5];
  document.getElementById('mainContent').innerHTML=`<div class="card">${(fns[state.step]||S0)()}</div>`;
  renderFooter();
  setTimeout(()=>triggerStepIntro(state.step),400);
}

function renderSteps(){
  document.getElementById('stepsBar').innerHTML=STEPS.map((s,i)=>{
    const cls=i===state.step?'active':i<state.step?'done':'';
    const lbl=i<state.step?'✓':s.e;
    const arrow=i<STEPS.length-1?`<span class="step-arrow">›</span>`:'';
    return `<div class="step-item"><button class="step-pill ${cls}" onclick="goStep(${i})"><span class="step-num">${lbl}</span>${s.label}</button>${arrow}</div>`;
  }).join('');
}
function goStep(i){state.step=i;render();window.scrollTo(0,0);}
function nextStep(){if(state.step<STEPS.length-1){state.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(state.step>0){state.step--;render();}}
function renderFooter(){
  const last=state.step===STEPS.length-1;
  document.getElementById('footer').innerHTML=`
<button class="btn" onclick="prevStep()" ${state.step===0?'disabled':''}>← Back</button>
<span style="font-size:12px;color:var(--muted)">${state.step+1} of ${STEPS.length}</span>
${last?`<button class="btn btn-primary" onclick="submitForm()">Submit Discovery ✓</button>`:`<button class="btn btn-primary" onclick="nextStep()">Continue →</button>`}`;
}

// ══ S0 Welcome ══════════════════════════════════════════════════════════════
function S0(){return `
<div style="text-align:center;max-width:560px;margin:0 auto;padding:10px 0">
  <div style="width:64px;height:64px;border-radius:16px;background:var(--accent);border:1px solid rgba(61,232,176,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">🚀</div>
  <div class="step-heading">Welcome to your <span>DealHub Discovery</span></div>
  <p style="font-size:14px;color:var(--muted);line-height:1.7;margin:10px 0 28px">You've seen what DealHub can do. Now help us understand your business so we can configure it exactly the way you sell. This takes about <strong style="color:var(--text)">10–15 minutes</strong>.</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;text-align:left">
    ${[{i:'🏢',t:'Your Business',d:'Tell us about your products and how you operate.'},{i:'💡',t:'How You Sell',d:'Pick the scenarios that match your sales process.'},{i:'🤖',t:'AI-Powered',d:'Our advisor helps along the way and builds your design doc.'}].map(c=>`<div style="background:#0a1628;border:1px solid var(--border);border-radius:10px;padding:14px"><div style="font-size:20px;margin-bottom:6px">${c.i}</div><div style="font-size:12px;font-weight:600;margin-bottom:4px">${c.t}</div><div style="font-size:11px;color:var(--muted);line-height:1.5">${c.d}</div></div>`).join('')}
  </div>
  <div style="background:var(--accent);border-radius:10px;padding:14px 18px;margin-bottom:24px;text-align:left;border:1px solid rgba(61,232,176,0.15)">
    <div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:6px">💬 A note before you start</div>
    <p style="font-size:12px;color:var(--muted);line-height:1.7">Don't worry about getting everything perfect — this is a starting point. Your DealHub team will review everything and follow up before configuration begins.</p>
  </div>

async function extractAll(){
  const text=(state.quotingFlow||'').trim();
  if(!text){alert('Please describe your quoting process first.');return;}
  state.approvalsExtracting=true;state.dtGenerating=true;
  state.approvalsExtractError='';state.dtError='';render();
  const en=state.useCases.filter(u=>u.enabled).map(u=>u.name);
  const [rR,dR]=await Promise.allSettled([fetchApprovalRules(text),fetchDecisionTree(text,en)]);
  if(rR.status==='fulfilled'&&rR.value)state.approvalRules=rR.value;
  else state.approvalsExtractError='Could not extract rules. Try adding more detail.';
  if(dR.status==='fulfilled'&&dR.value)state.decisionTree=dR.value;
  else state.dtError='Could not build flowchart. Try describing more decision points.';
  state.approvalsExtracting=false;state.dtGenerating=false;
  const nr=state.approvalRules.filter(r=>r.reason).length;
  const nd=state.decisionTree.filter(n=>n.condition).length;
  if(nr>0||nd>0)pushAI(`I found <strong>${nr} approval rule${nr!==1?'s':''}</strong> and built a <strong>${nd}-node flowchart</strong>. Review them below — anything missing?`);
  render();
}

async function fetchApprovalRules(text){
  const sys=`Extract approval rules from a quoting description. Return ONLY a JSON array, no markdown.
Each: {reason, criteria, threshold, approver, additionalApprover, allAny}`;
  const r=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:sys,messages:[{role:'user',content:text}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim()).map(p=>({id:uid(),reason:p.reason||'',criteria:p.criteria||'',threshold:p.threshold||'',approver:p.approver||'',additionalApprover:p.additionalApprover||'',allAny:p.allAny||'Any'}));
}

async function fetchDecisionTree(text,useCases){
  const sys=`Extract decision tree nodes from a quoting flow. Return ONLY JSON array, no markdown.
Each: {condition, trueOutcome, falseOutcome} — keep each field under 8 words. Context: use cases: ${useCases.join(', ')||'none'}.`;
  const r=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:sys,messages:[{role:'user',content:text}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim()).map(p=>({id:uid(),condition:p.condition||'',trueOutcome:p.trueOutcome||'',falseOutcome:p.falseOutcome||'',notes:''}));
}

function buildFlowchart(nodes){
  if(!nodes.length)return`<p style="font-size:12px;color:var(--muted);text-align:center;padding:20px">No nodes yet.</p>`;
  let h=`<div style="display:flex;flex-direction:column;align-items:center;min-width:260px">`;
  h+=`<div style="background:var(--primary);color:#0a1628;border-radius:20px;padding:5px 18px;font-size:11px;font-weight:700">START</div>`;
  nodes.forEach((n,i)=>{
    const cond=n.condition||'Condition?',yes=n.trueOutcome||'Yes',no=n.falseOutcome||'No';
    h+=`<div style="width:2px;height:16px;background:var(--primary);margin:0 auto"></div>`;
    h+=`<div style="position:relative;width:140px;height:68px;margin:0 auto"><div style="position:absolute;top:50%;left:50%;width:88px;height:88px;transform:translate(-50%,-50%) rotate(45deg);background:#0d2137;border:2px solid var(--primary)"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center"><span style="font-size:9px;font-weight:600;color:var(--text);line-height:1.3;z-index:1">${esc(cond.length>38?cond.slice(0,38)+'…':cond)}</span></div></div>`;
    h+=`<div style="display:flex;width:280px;align-items:flex-start">`;
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:2px;height:18px;background:var(--primary);margin:0 auto"></div><span style="font-size:9px;font-weight:700;color:#3de8b0;background:rgba(61,232,176,0.1);border:1px solid rgba(61,232,176,0.3);border-radius:8px;padding:1px 6px;margin-bottom:5px">YES</span><div style="background:#0a1628;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--muted);text-align:center;max-width:120px;line-height:1.4">${esc(yes.length>40?yes.slice(0,40)+'…':yes)}</div></div>`;
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:2px;height:18px;background:#f87171;margin:0 auto"></div><span style="font-size:9px;font-weight:700;color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:1px 6px;margin-bottom:5px">NO</span><div style="background:#0a1628;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--muted);text-align:center;max-width:120px;line-height:1.4">${esc(no.length>40?no.slice(0,40)+'…':no)}</div></div>`;
    h+=`</div>`;
    if(i<nodes.length-1)h+=`<div style="width:2px;height:12px;background:var(--border);margin:5px auto 0"></div>`;
  });
  h+=`<div style="width:2px;height:12px;background:var(--primary);margin:5px auto 0"></div><div style="background:#1a2d4a;color:var(--muted);border-radius:20px;padding:5px 18px;font-size:11px;font-weight:700">END</div></div>`;
  return `<div class="fc-wrap">${h}</div>`;
}

<div class="np"><button onclick="window.print()" style="background:#1e3a5f;color:#3de8b0;border:1px solid #3de8b0;border-radius:6px;padding:6px 14px;font-size:11px;cursor:pointer">🖨️ Save PDF</button></div></div>

// ── Export ─────────────────────────────────────────────────────────────────
function exportData(){
  if(typeof XLSX==='undefined')return;
  const wb=XLSX.utils.book_new();
  const add=(n,d)=>{if(d?.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d),n);};
  add('Business',[{client:state.clientName,industry:state.industry,crm:state.crmSystem,dealVolume:state.dealVolume,dealSize:state.dealSize}]);
  if(state.skus.length)add('Products',state.skus.map(({id,...r})=>r));
  else if(state.skuFileName)add('Products',[{note:`${state.skuFileName} — ${state.skuCount} rows`}]);
  add('Use Cases',state.useCases.filter(u=>u.enabled).map(u=>({name:u.name,details:u.details})));
  add('Selling Context',[{context:state.sellingContext}]);
  add('Quoting Flow',[{description:state.quotingFlow}]);
  add('Approval Rules',state.approvalRules.filter(r=>r.reason).map(({id,...r})=>r));
  add('Decision Tree',state.decisionTree.filter(n=>n.condition).map(({id,...r})=>r));
  add('Commercial Terms',state.commercialTerms.filter(t=>t.value).map(t=>({question:t.q,answer:t.value})));
  add('DealRoom',state.dealRoomAssets.filter(a=>a.name).map(({id,...r})=>r));
  if(!wb.SheetNames.length)add('Summary',[{note:'No data entered'}]);
  XLSX.writeFile(wb,`DealHub_Discovery_${state.clientName||'Unnamed'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function handleDrop(e,type){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f,type);}
function handleInput(inp,type){const f=inp.files[0];if(f)processFile(f,type);inp.value='';}
function processFile(file,type){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  if(type==='sku'){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        const rows=json.map(row=>({id:uid(),...row}));
        state.skus=rows;state.skuFileName=file.name;state.skuCount=json.length;
        render();
      }catch(err){alert('Could not parse file: '+err.message);}
    };
    r.readAsArrayBuffer(file);
  }
}

render();
</script>
