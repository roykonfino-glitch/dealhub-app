<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery Wizard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;font-size:14px}
:root{--dh-bg:#0a1628;--dh-card:#0f1f38;--dh-border:#1e3a5f;--dh-primary:#3de8b0;--dh-text:#e8f0fe;--dh-muted:#7a9bc4;--dh-accent:#1a3d2e}
.app{background:var(--dh-bg);min-height:100vh}
.header{border-bottom:1px solid var(--dh-border);background:var(--dh-card);padding:12px 20px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:var(--dh-primary);color:#0a1628;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.logo-text h1{font-size:16px;font-weight:700}
.logo-text h1 span{color:var(--dh-primary)}
.logo-text p{font-size:11px;color:var(--dh-muted)}
.client-row{display:flex;align-items:center;gap:8px}
.client-row label{font-size:12px;color:var(--dh-muted)}
.steps-scroll{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;align-items:center}
.steps-scroll::-webkit-scrollbar{height:3px}
.steps-scroll::-webkit-scrollbar-thumb{background:var(--dh-border);border-radius:2px}
.step-item{display:flex;align-items:center;gap:4px;flex-shrink:0}
.step-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s}
.step-active{background:var(--dh-primary);color:#0a1628}
.step-done{background:var(--dh-accent);color:var(--dh-primary);border:1px solid var(--dh-primary)}
.step-inactive{background:#1a2d4a;color:var(--dh-muted)}
.step-label{font-size:10px;color:var(--dh-muted);display:none}
@media(min-width:900px){.step-label{display:block}}
.step-label.active{color:var(--dh-text)}
.step-connector{width:16px;height:1px;background:var(--dh-border)}
.step-connector.done{background:var(--dh-primary)}
.main{padding:16px 20px;max-width:960px;margin:0 auto;padding-bottom:100px}
.card{background:var(--dh-card);border:1px solid var(--dh-border);border-radius:10px;padding:20px}
.section-title{font-size:15px;font-weight:600;margin-bottom:4px}
.section-desc{font-size:12px;color:var(--dh-muted);margin-bottom:14px;line-height:1.5}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:8px}
.field-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.inp{background:#0a1628;border:1px solid var(--dh-border);color:var(--dh-text);border-radius:6px;padding:6px 10px;font-size:12px;width:100%;outline:none}
.inp:focus{border-color:var(--dh-primary)}
.inp::placeholder{color:var(--dh-muted)}
.sel{background:#0a1628;border:1px solid var(--dh-border);color:var(--dh-text);border-radius:6px;padding:6px 8px;font-size:12px;width:100%;outline:none;cursor:pointer}
.textarea{background:#0a1628;border:1px solid var(--dh-border);color:var(--dh-text);border-radius:6px;padding:8px 10px;font-size:12px;width:100%;resize:vertical;min-height:60px;outline:none;font-family:inherit}
.btn{border:1px solid var(--dh-border);background:transparent;color:var(--dh-text);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn:hover{border-color:var(--dh-primary);color:var(--dh-primary)}
.btn:disabled{opacity:0.4;cursor:default}
.btn-primary{background:var(--dh-primary);border-color:var(--dh-primary);color:#0a1628;font-weight:600}
.btn-primary:hover{opacity:0.9;color:#0a1628}
.btn-danger{color:#f87171;border-color:#3a1f1f}
.btn-danger:hover{color:#ef4444;border-color:#ef4444;background:#1a0f0f}
.row-item{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:10px;margin-bottom:8px}
.row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--dh-accent);color:var(--dh-primary);border-radius:12px;padding:2px 8px;font-size:11px;font-weight:500}
.tag{display:inline-flex;align-items:center;background:#1e3a5f;color:#7ab8f5;border-radius:8px;padding:2px 7px;font-size:10px;margin-right:3px}
.switch-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--dh-border)}
.switch-row:last-child{border-bottom:none}
.switch{position:relative;width:36px;height:20px;flex-shrink:0;margin-top:2px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#1a2d4a;border-radius:20px;transition:0.2s;border:1px solid var(--dh-border)}
.slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;background:var(--dh-muted);border-radius:50%;transition:0.2s}
input:checked+.slider{background:var(--dh-accent);border-color:var(--dh-primary)}
input:checked+.slider:before{transform:translateX(16px);background:var(--dh-primary)}
.uc-name{font-size:13px;font-weight:500}
.uc-desc{font-size:11px;color:var(--dh-muted);margin-top:2px;line-height:1.5}
.footer{border-top:1px solid var(--dh-border);background:var(--dh-card);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:9}
.review-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.review-card{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:12px;display:flex;align-items:flex-start;gap:10px}
.upload-zone{border:2px dashed var(--dh-border);border-radius:8px;padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all 0.2s}
.upload-zone:hover{border-color:var(--dh-primary);background:var(--dh-accent)}
.welcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.welcome-card{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:12px;text-align:center}
.calc-card{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:opacity 0.2s}
.calc-card.skipped{opacity:0.4}
.calc-toggle{width:22px;height:22px;border-radius:5px;border:1px solid var(--dh-border);background:#0a1628;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s;flex-shrink:0}
.calc-toggle.yes{background:var(--dh-accent);border-color:var(--dh-primary);color:var(--dh-primary)}
.calc-toggle.no{background:#2a1010;border-color:#ef4444;color:#ef4444}
.billing-row{display:grid;grid-template-columns:130px 1fr 100px 1fr;gap:6px;align-items:center;margin-bottom:6px}
.term-row{display:grid;grid-template-columns:140px 120px 1fr 34px;gap:6px;align-items:center;margin-bottom:6px}
.asset-card{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:10px;margin-bottom:8px}
.quick-add{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.quick-btn{background:var(--dh-accent);border:1px solid rgba(61,232,176,0.2);border-radius:8px;padding:10px;cursor:pointer;transition:all 0.15s}
.quick-btn:hover{border-color:var(--dh-primary)}
.example-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.example-card{background:#0a1628;border:1px solid var(--dh-border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s}
.example-card:hover{border-color:var(--dh-primary);background:var(--dh-accent)}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;min-height:400px}

/* ── Flowchart ── */
.flowchart{overflow-x:auto;padding:10px 0 20px}
.fc-node{display:flex;flex-direction:column;align-items:center;margin-bottom:0}
.fc-box{background:#0d2137;border:1.5px solid var(--dh-primary);border-radius:8px;padding:10px 16px;min-width:200px;max-width:280px;text-align:center;position:relative;cursor:pointer;transition:all 0.15s}
.fc-box:hover{background:var(--dh-accent)}
.fc-box-label{font-size:11px;color:var(--dh-muted);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.fc-box-text{font-size:12px;color:var(--dh-text);font-weight:500;line-height:1.4}
.fc-diamond{width:0;height:0;border-left:70px solid transparent;border-right:70px solid transparent;border-bottom:40px solid var(--dh-primary);position:relative;margin:0 auto}
.fc-diamond:after{content:'';width:0;height:0;border-left:66px solid transparent;border-right:66px solid transparent;border-bottom:38px solid #0d2137;position:absolute;top:3px;left:-66px}
.fc-diamond-text{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dh-text);white-space:nowrap;font-weight:600;z-index:1}
.fc-arrow{width:2px;height:20px;background:var(--dh-primary);margin:0 auto}
.fc-arrow-h{height:2px;background:var(--dh-primary);flex:1}
.fc-branches{display:flex;gap:0;align-items:flex-start;position:relative;margin-top:0}
.fc-branch{display:flex;flex-direction:column;align-items:center;flex:1}
.fc-branch-label{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.fc-yes{color:#3de8b0;background:rgba(61,232,176,0.1);border:1px solid rgba(61,232,176,0.3)}
.fc-no{color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3)}
.fc-outcome{background:#0a1628;border:1px solid var(--dh-border);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--dh-muted);max-width:180px;text-align:center;line-height:1.4}
.fc-hline{display:flex;align-items:center;width:100%}

/* ── Floating AI Chat ── */
#aiBtn{position:fixed;bottom:80px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--dh-primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(61,232,176,0.4);z-index:100;transition:all 0.2s}
#aiBtn:hover{transform:scale(1.08)}
#aiBtn .notif{position:absolute;top:2px;right:2px;width:12px;height:12px;background:#f87171;border-radius:50%;border:2px solid var(--dh-bg);display:none}
#aiPanel{position:fixed;bottom:150px;right:24px;width:340px;background:var(--dh-card);border:1px solid var(--dh-border);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);z-index:100;display:none;flex-direction:column;overflow:hidden}
#aiPanel.open{display:flex}
#aiPanelHeader{background:#0a1e35;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dh-border)}
#aiPanelHeader span{font-size:13px;font-weight:600;color:var(--dh-primary);display:flex;align-items:center;gap:6px}
#aiCloseBtn{background:none;border:none;color:var(--dh-muted);cursor:pointer;font-size:16px;line-height:1}
#aiCloseBtn:hover{color:var(--dh-text)}
#aiMessages{height:300px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
#aiMessages::-webkit-scrollbar{width:3px}
#aiMessages::-webkit-scrollbar-thumb{background:var(--dh-border);border-radius:2px}
.ai-bubble{background:var(--dh-accent);border:1px solid rgba(61,232,176,0.15);border-radius:10px 10px 10px 3px;padding:9px 12px;font-size:12px;line-height:1.6;max-width:94%}
.ai-bubble strong{color:var(--dh-primary)}
.user-bubble{background:#1a2d4a;border-radius:10px 10px 3px 10px;padding:9px 12px;font-size:12px;line-height:1.5;max-width:88%;align-self:flex-end;text-align:right}
.ai-typing{background:var(--dh-accent);border-radius:10px;padding:9px 14px;font-size:12px;color:var(--dh-muted);display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dh-primary);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#aiInputRow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--dh-border);background:#0a1e35}
#aiInput{flex:1;background:#0a1628;border:1px solid var(--dh-border);color:var(--dh-text);border-radius:6px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
#aiInput:focus{border-color:var(--dh-primary)}
#aiSendBtn{background:var(--dh-primary);border:none;border-radius:6px;padding:7px 12px;color:#0a1628;font-size:12px;font-weight:600;cursor:pointer}
#aiSendBtn:hover{opacity:0.9}
#aiStepLabel{padding:6px 12px;font-size:10px;color:var(--dh-muted);background:#0a1628;text-align:center;border-bottom:1px solid var(--dh-border)}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">D</div>
      <div class="logo-text">
        <h1>dealhub <span>discovery</span></h1>
        <p>Complete your project configuration details</p>
      </div>
    </div>
    <div class="client-row">
      <label>Client:</label>
      <input class="inp" id="clientNameInp" placeholder="Company name" style="width:160px" oninput="state.clientName=this.value">
    </div>
  </div>
  <div class="steps-scroll" id="stepsBar"></div>
</div>
<div class="main" id="mainContent"></div>
<div class="footer" id="footer"></div>
</div>

<!-- Floating AI Advisor -->
<button id="aiBtn" onclick="toggleAI()" title="CPQ Advisor">🤖<div class="notif" id="aiNotif"></div></button>
<div id="aiPanel">
  <div id="aiPanelHeader">
    <span>🤖 CPQ Configuration Advisor</span>
    <button id="aiCloseBtn" onclick="toggleAI()">✕</button>
  </div>
  <div id="aiStepLabel">Step 1 — Welcome</div>
  <div id="aiMessages"></div>
  <div id="aiInputRow">
    <input id="aiInput" placeholder="Ask or answer…" onkeydown="if(event.key==='Enter')sendAI()">
    <button id="aiSendBtn" onclick="sendAI()">↗</button>
  </div>
</div>

<script>
const PROXY_URL = 'https://dealhub-proxy.vercel.app/api/chat';

const STEPS=[
  {label:'Welcome'},{label:'Products'},{label:'Use Cases'},
  {label:'Decisions'},{label:'Approvals'},{label:'Calculations'},
  {label:'Terms'},{label:'Billing'},{label:'DealRoom'},{label:'Review'}
];

// Per-step auto-trigger messages
const STEP_INTROS=[
  null, // Welcome — no auto message
  'I see you\'re on the <strong>Products</strong> step. Once you upload your catalog, I can help you think through pricing structures, bundle logic, or product types. Anything specific about your product catalog I should know?',
  'You\'re on <strong>Use Cases</strong>. Toggle on every scenario that applies to your business — I\'ll ask targeted follow-up questions as you enable them. Which use cases are most critical for your go-live?',
  null, // Decisions — no AI, just flowchart
  'Now let\'s talk <strong>Approvals</strong>. The examples above are common starting points. What kinds of deals in your business typically need manual approval before sending to a customer?',
  'On to <strong>Calculations</strong>. Check ✓ for every metric your team actually tracks. Do you currently calculate these in your CRM, or would DealHub be the source of truth?',
  'For <strong>Commercial Terms</strong> — what are the most common payment terms your sales team offers? Are there any non-standard terms that come up frequently in negotiations?',
  'On <strong>Billing Fields</strong> — does your team pull billing info from the CRM, or do reps fill it in manually on each quote? Are there any fields that are frequently missing or incorrect?',
  'Great progress! For your <strong>DealRoom</strong> — do you have existing proposal templates or brand guidelines we should match? What does your current customer-facing quote or proposal look like?',
  'You\'re at the <strong>Review</strong> step — almost done! Looking at what you\'ve entered, is there anything you\'re unsure about or want me to clarify before you submit?',
];

const uid=()=>Math.random().toString(36).slice(2,9);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const DEFAULT_USE_CASES=[
  {id:uid(),name:'Multi Year',desc:'Sell products spanning more than one year in a single quote.',enabled:false},
  {id:uid(),name:'Ramp Up',desc:'Clients start with a lower quantity and scale up each term.',enabled:false},
  {id:uid(),name:'Cherry Picking',desc:'Manual product selection by RevOps on specific deals.',enabled:false},
  {id:uid(),name:'Trials / PoC',desc:'Sell at reduced price or free for a limited trial period.',enabled:false},
  {id:uid(),name:'Partner Deals',desc:'Quotes for resellers/distributors with specific discounts.',enabled:false},
  {id:uid(),name:'Optional Products',desc:'Products clients commit to a rate for future consumption.',enabled:false},
  {id:uid(),name:'Overage',desc:'Agreed rates when a client exceeds usage on their contract.',enabled:false},
  {id:uid(),name:'Pay As You Go',desc:'Unit-rate contract with tariff table and minimum commit.',enabled:false},
  {id:uid(),name:'One-time Discount',desc:'One-time discount as a standalone line item.',enabled:false},
  {id:uid(),name:'Integrations',desc:'Gong, DocuSign, Slack, SSO, and other integrations.',enabled:false},
  {id:uid(),name:'Redline',desc:'Legal redlining on Order Forms, Contracts, or Quotes.',enabled:false},
  {id:uid(),name:'CPI',desc:'Annual price increase with configurable rate and waiver options.',enabled:false},
];

const CALC_DEFS=[
  {key:'ARR',desc:'Annual Recurring Revenue — annualized value of recurring subscriptions.'},
  {key:'MRR',desc:'Monthly Recurring Revenue — ARR ÷ 12.'},
  {key:'ACV',desc:'Annual Contract Value — average annual value over the contract term.'},
  {key:'TCV',desc:'Total Contract Value — total revenue across the full contract length.'},
  {key:'Margins',desc:'Gross margin based on list price vs. cost.'},
  {key:'Total One-time',desc:'Sum of all non-recurring charges on the quote.'},
  {key:'Total Recurring',desc:'Sum of all recurring charges (license, support, etc.).'},
  {key:'VAT',desc:'Value Added Tax applied based on region or country.'},
  {key:'Tax',desc:'Sales tax or withholding tax applicable to the deal.'},
  {key:'Total Cost',desc:'Grand total including all line items, taxes, and discounts.'},
];

const DEFAULT_TERMS=[
  {id:uid(),field:'Payment Terms',example:'Monthly, Quarterly, Yearly, In Advance',values:''},
  {id:uid(),field:'Net Days',example:'30, 45, 60, 90 days',values:''},
  {id:uid(),field:'Auto Renewal',example:'Yes, No',values:''},
  {id:uid(),field:'Cancellation Notice',example:'30, 60, 90 days',values:''},
  {id:uid(),field:'Add MSA',example:'Yes, No',values:''},
  {id:uid(),field:'Payment Method',example:'Credit Card, ACH, AWS',values:''},
  {id:uid(),field:'CPI',example:'0.03',values:''},
  {id:uid(),field:'CPI Waiver',example:'Yes, No',values:''},
];

const DEFAULT_SELLER=[
  {id:uid(),field:'Seller Entity',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Seller Company ID',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Seller Address',options:'',readWrite:'Read',crmField:''},
];
const DEFAULT_BUYER=[
  {id:uid(),field:'Billing Entity',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Billing Address',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Billing Contact Name',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Billing Contact Email',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Billing Contact Phone',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Shipping Address',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Payment Method',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Billing Frequency',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'PO Required',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'PO Number',options:'',readWrite:'Read',crmField:''},
  {id:uid(),field:'Bank Details',options:'',readWrite:'Read',crmField:''},
];

function freshState(){
  return {
    step:0,submitted:false,clientName:'',
    skuFileName:'',skuCount:0,skus:[],
    currencies:[],multiCurrency:false,exchangeRateSource:'manual',
    useCases:DEFAULT_USE_CASES.map(u=>({...u,id:uid()})),
    approvalRules:[],approvers:[],
    decisionTree:[],dtGenerated:false,
    calculations:CALC_DEFS.map(d=>({id:uid(),name:d.key,needed:null,crmField:''})),
    commercialTerms:DEFAULT_TERMS.map(t=>({...t,id:uid()})),
    sellerBillingFields:DEFAULT_SELLER.map(f=>({...f,id:uid()})),
    buyerBillingFields:DEFAULT_BUYER.map(f=>({...f,id:uid()})),
    dealRoomAssets:[],followUpAnswers:{},
    useCasesContext:'',
    approvalsFreeText:'',approvalsExtracting:false,approvalsExtractError:'',
    docGenerating:false,docError:''
  };
}
let state=freshState();

// ── AI Chat State ─────────────────────────────────────────────────────────
let aiOpen=false;
let aiLoading=false;
let aiMessages=[{role:'ai',html:'👋 Hi! I\'m your <strong>CPQ Configuration Advisor</strong>. I\'ll guide you through each step of this discovery. Click any step to get started, and I\'ll automatically offer advice as you go.'}];
let aiStepSeen=new Set();

function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('aiPanel').classList.toggle('open',aiOpen);
  document.getElementById('aiNotif').style.display='none';
  if(aiOpen)renderAIMessages();
}

function renderAIMessages(){
  const el=document.getElementById('aiMessages');
  if(!el)return;
  el.innerHTML=aiMessages.map(m=>
    m.role==='ai'
      ?`<div class="ai-bubble">${m.html}</div>`
      :`<div class="user-bubble">${esc(m.text)}</div>`
  ).join('');
  if(aiLoading) el.innerHTML+=`<div class="ai-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  el.scrollTop=el.scrollHeight;

function triggerStepIntro(step){
  if(aiStepSeen.has(step)||step===3)return; // skip Decisions step

function buildSysPrompt(){
  const en=state.useCases.filter(u=>u.enabled).map(u=>u.name);
  const prod=state.skuFileName?`Product catalog: ${state.skuFileName} (${state.skuCount} SKUs).`:'No product catalog yet.';
  const stepName=STEPS[state.step]?.label||'Unknown';
  return `You are a senior CPQ implementation advisor specializing in DealHub.
You are helping a client complete a discovery form. They are currently on the "${stepName}" step.

Context:
- Client: ${state.clientName||'(not set)'}
- ${prod}
- Enabled use cases: ${en.length?en.join(', '):'none yet'}
- Client context: ${state.useCasesContext||'(none provided)'}
- Current step: ${stepName}
- Approval rules defined: ${state.approvalRules.length}
- Calculations confirmed: ${state.calculations.filter(c=>c.needed===true).length}
- Commercial terms filled: ${state.commercialTerms.filter(t=>t.values).length}

Rules:
- Be conversational, warm and professional. Max 2-3 sentences per reply.
- Ask ONE focused question at a time relevant to the current step.
- Acknowledge their answer briefly before moving on.
- Use **bold** for key DealHub configuration terms.
- Advisory only — never claim to be making configuration changes.
- If they ask something outside your scope, say so and redirect to the relevant step.`;
}

async function sendAI(){
  const inp=document.getElementById('aiInput');
  const text=(inp?.value||'').trim();
  if(!text||aiLoading)return;
  inp.value='';
  aiMessages.push({role:'user',text});
  aiLoading=true;
  renderAIMessages();

  const msgs=aiMessages.map(m=>({
    role:m.role==='ai'?'assistant':'user',
    content:m.html?m.html.replace(/<[^>]+>/g,''):m.text
  }));

  try{
    const r=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:buildSysPrompt(),messages:msgs})
    });
    const d=await r.json();
    if(d.error){aiMessages.push({role:'ai',html:`⚠️ ${d.error.message}`});}
    else{
      const reply=d.content?.[0]?.text||'No response.';
      aiMessages.push({role:'ai',html:reply.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')});
    }
  }catch(e){
    aiMessages.push({role:'ai',html:'⚠️ Could not reach the advisor. Check your connection.'});
  }
  aiLoading=false;
  renderAIMessages();
}

  }).join('');
}

function buildFlowchart(nodes){
  if(!nodes.length) return `<p style="font-size:12px;color:var(--dh-muted);text-align:center;padding:20px">No nodes yet — add some on the left.</p>`;

  let html=`<div style="display:flex;flex-direction:column;align-items:center;gap:0;min-width:260px">`;

  // Start node
  html+=`<div style="background:var(--dh-primary);color:#0a1628;border-radius:20px;padding:6px 20px;font-size:11px;font-weight:700;margin-bottom:0">START</div>`;

  nodes.forEach((n,i)=>{
    const cond=n.condition||'Condition?';
    const yes=n.trueOutcome||'Yes outcome';
    const no=n.falseOutcome||'No outcome';

    // Arrow down
    html+=`<div style="width:2px;height:18px;background:var(--dh-primary);margin:0 auto"></div>`;

    // Decision diamond (using a rotated square)
    html+=`<div style="position:relative;width:140px;height:70px;margin:0 auto">
      <div style="position:absolute;top:50%;left:50%;width:90px;height:90px;transform:translate(-50%,-50%) rotate(45deg);background:#0d2137;border:2px solid var(--dh-primary)"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;text-align:center">
        <span style="font-size:9px;font-weight:600;color:var(--dh-text);line-height:1.3;z-index:1">${esc(cond.length>40?cond.slice(0,40)+'…':cond)}</span>
      </div>
    </div>`;

    // Branches
    html+=`<div style="display:flex;width:280px;align-items:flex-start;gap:0;margin-top:0">`;

    // Yes branch (left)
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center">
      <div style="display:flex;align-items:center;gap:0;width:100%">
        <div style="width:2px;height:20px;background:var(--dh-primary);margin:0 auto"></div>
      </div>
      <span style="font-size:9px;font-weight:700;color:#3de8b0;background:rgba(61,232,176,0.1);border:1px solid rgba(61,232,176,0.3);border-radius:8px;padding:1px 6px;margin-bottom:5px">YES</span>
      <div style="background:#0a1628;border:1px solid #1e3a5f;border-radius:6px;padding:7px 10px;font-size:10px;color:var(--dh-muted);text-align:center;max-width:120px;line-height:1.4">${esc(yes.length>45?yes.slice(0,45)+'…':yes)}</div>
    </div>`;

    // No branch (right)
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center">
      <div style="display:flex;align-items:center;gap:0;width:100%">
        <div style="width:2px;height:20px;background:#f87171;margin:0 auto"></div>
      </div>
      <span style="font-size:9px;font-weight:700;color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:1px 6px;margin-bottom:5px">NO</span>
      <div style="background:#0a1628;border:1px solid #1e3a5f;border-radius:6px;padding:7px 10px;font-size:10px;color:var(--dh-muted);text-align:center;max-width:120px;line-height:1.4">${esc(no.length>45?no.slice(0,45)+'…':no)}</div>
    </div>`;

    html+=`</div>`;

    // Connecting line to next node (except last)
    if(i<nodes.length-1){
      html+=`<div style="width:2px;height:14px;background:var(--dh-border);margin:6px auto 0"></div>`;
    }
  });

  // End node
  html+=`<div style="width:2px;height:14px;background:var(--dh-primary);margin:6px auto 0"></div>`;
  html+=`<div style="background:#1a2d4a;color:var(--dh-muted);border-radius:20px;padding:6px 20px;font-size:11px;font-weight:700;margin-top:0">END</div>`;
  html+=`</div>`;
  return html;
}

CALCULATIONS NEEDED: ${calcs.length?calcs.join(', '):'None confirmed'}
COMMERCIAL TERMS: ${terms.length?terms.join(' | '):'None filled'}
BILLING FIELDS WITH DATA: ${billingFilled.length} fields mapped
DEALROOM ASSETS: ${assets.length?assets.join(', '):'None'}
AI ADVISOR NOTES: ${aiMessages.filter(m=>m.role==='ai').slice(1).map(m=>m.html.replace(/<[^>]+>/g,'')).join(' | ')||'None'}
`.trim();

  const sysPrompt=`You are a senior DealHub implementation architect writing a formal Configuration Design Document for a client onboarding.

DealHub is a CPQ (Configure Price Quote) and Revenue Operations platform. Key platform concepts:
- SKUs/Products: items in the product catalog with pricing, UoM, billing frequency
- Use Cases: platform features like Multi Year deals, Ramp Up pricing, Partner Deals, Trials, Overage, Pay As You Go, CPI (annual price increase), Redline (legal editing), Integrations
- Decision Tree: conditional logic that determines deal flow, approval routing, and product eligibility
- Approval Workflows: rules that trigger manual approval based on deal attributes (discount %, deal size, contract changes)
- Calculations: computed fields like ARR, MRR, ACV, TCV, Margins mapped to CRM fields
- Commercial Terms: payment terms, net days, auto-renewal, cancellation notice, MSA, payment method
- Billing Fields: seller and buyer billing information fields with CRM mappings and read/write access
- DealRoom: customer-facing deal portal with forms, templates, brand assets, and documents

Write the document in professional British English. Use clear headings. Be specific and technical where data exists, and flag gaps or recommendations where data is missing. Tone: authoritative, clear, implementation-ready.

Return the document as clean HTML using only these tags: h1, h2, h3, p, table, thead, tbody, tr, th, td, ul, li, strong, em, span, div, hr.
Do not include html/head/body tags — just the content fragment.
Use inline styles sparingly only for: tables (border, padding, width), th backgrounds, status badges.
The document will be injected into a pre-styled page.`;

  try{
    const r=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:3000,
        system:sysPrompt,
        messages:[{role:'user',content:`Please write a full Configuration Design Document for the following discovery data:\n\n${context}`}]
      })
    });
    const d=await r.json();

  }catch(e){
    state.docError='Could not reach the AI. Check your connection.';
    state.docGenerating=false;
    render();
  }
}

async function extractApprovals(){
  const text=(state.approvalsFreeText||'').trim();
  if(!text){alert('Please describe your approval process first.');return;}
  state.approvalsExtracting=true;
  state.approvalsExtractError='';
  render();

  const sysPrompt=`You are a CPQ configuration expert. Extract approval rules from the user's free-text description.
Return ONLY a valid JSON array — no markdown, no explanation, no backticks.
Each object must have exactly these keys: reason, criteria, threshold, approver, additionalApprover, allAny.
- reason: short label (e.g. "Discount", "Deal Size", "Non-standard Terms")
- criteria: what is being measured (e.g. "Total Discount %", "TCV", "Contract edited")
- threshold: the trigger value (e.g. "> 15%", "> $50K", "Any change")
- approver: primary approver name/role
- additionalApprover: secondary approver if mentioned, else empty string
- allAny: "All" if all approvers must approve, "Any" if any one can approve — default to "Any"
Extract every distinct rule mentioned. If a rule is implied (e.g. "manager approves discounts") make reasonable assumptions.`;

  try{
    const r=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        system:sysPrompt,
        messages:[{role:'user',content:text}]
      })
    });
    const d=await r.json();
    if(d.error){state.approvalsExtractError=d.error.message;state.approvalsExtracting=false;render();return;}
    const raw=d.content?.[0]?.text||'[]';
    let parsed;
    try{
      parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    }catch(e){
      state.approvalsExtractError='Could not parse AI response. Try rephrasing your description.';
      state.approvalsExtracting=false;render();return;
    }
    if(!Array.isArray(parsed)||!parsed.length){
      state.approvalsExtractError='No rules found. Try being more specific (e.g. mention thresholds and approver names).';
      state.approvalsExtracting=false;render();return;
    }
    state.approvalRules=parsed.map(p=>({
      id:uid(),
      reason:p.reason||'',
      criteria:p.criteria||'',
      threshold:p.threshold||'',
      approver:p.approver||'',
      additionalApprover:p.additionalApprover||'',
      allAny:p.allAny||'Any'
    }));
    // Also push a follow-up into the AI advisor
    aiMessages.push({role:'ai',html:`I extracted <strong>${state.approvalRules.length} approval rule${state.approvalRules.length!==1?'s':''}</strong> from your description. Review them below — do any need adjusting? Also, are there any edge cases I might have missed, like out-of-office escalations or auto-approval scenarios?`});
    showAINotif();
    if(aiOpen)renderAIMessages();
  }catch(e){
    state.approvalsExtractError='Could not reach the AI. Check your connection.';
  }
  state.approvalsExtracting=false;
  render();
}

function exportData(){
  if(typeof XLSX==='undefined'){alert('XLSX library not loaded.');return;}
  const wb=XLSX.utils.book_new();
  const add=(name,data)=>{if(data&&data.length){XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name);}};
  if(state.skus.length) add('Products',state.skus.map(({id,...r})=>r));
  else if(state.skuFileName) add('Products',[{note:`Uploaded: ${state.skuFileName} (${state.skuCount} rows)`}]);
  add('Use Cases',state.useCases.filter(u=>u.enabled).map(u=>({name:u.name,description:u.desc})));
  add('Decision Tree',state.decisionTree.map(({id,...r})=>r));
  add('Approval Rules',state.approvalRules.map(({id,...r})=>r));
  add('Approvers',state.approvers.map(({id,...r})=>r));
  add('Calculations',state.calculations.filter(c=>c.needed===true).map(c=>({name:c.name,crmField:c.crmField})));
  add('Commercial Terms',state.commercialTerms.filter(t=>t.values).map(({id,...r})=>r));
  const billing=[...state.sellerBillingFields.map(f=>({...f,side:'Seller'})),...state.buyerBillingFields.map(f=>({...f,side:'Buyer'}))].filter(f=>f.options||f.crmField);
  add('Billing Fields',billing.map(({id,...r})=>r));
  add('DealRoom Assets',state.dealRoomAssets.map(({id,...r})=>r));
  // Export AI conversation as notes
  if(aiMessages.length>1) add('AI Advisor Notes',aiMessages.map((m,i)=>({turn:i+1,role:m.role==='ai'?'Advisor':'Client',message:(m.html||m.text||'').replace(/<[^>]+>/g,'')})));

  XLSX.writeFile(wb,`Discovery_${state.clientName||'Unnamed'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Excel import ────────────────────────────────────────────────────────────
const CMAPS={
  sku:{sku:'sku','sku code':'sku',name:'name','product name':'name',description:'description',type:'type',uom:'uom','unit of measure':'uom','base line':'baseline',baseline:'baseline','list price':'listPrice',listprice:'listPrice',price:'listPrice',cost:'cost'},
  approval:{reason:'reason',criteria:'criteria',threshold:'threshold',approver:'approver','additional approver':'additionalApprover','all any':'allAny'},
  approver:{name:'name','full name':'name',email:'email',position:'position',role:'position'},
  term:{field:'field',term:'field',name:'field',example:'example',values:'values',options:'values'},
  dt:{condition:'condition',question:'condition','true outcome':'trueOutcome',yes:'trueOutcome','false outcome':'falseOutcome',no:'falseOutcome',notes:'notes'},
  asset:{name:'name','asset name':'name',type:'type',description:'description','file name':'fileName',filename:'fileName'},
};
function nh(h){return h.trim().toLowerCase().replace(/[^a-z ]/g,'');}
function parseXL(file,type,cb,msgId){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg(msgId,'⚠️ File empty',1);return;}
      const cm=CMAPS[type]||{};
      const map={};Object.keys(json[0]).forEach(h=>{const k=nh(h);if(cm[k])map[h]=cm[k];});
      const rows=json.map(row=>{const item={id:uid()};Object.entries(map).forEach(([h,f])=>{if(row[h]!==undefined)item[f]=String(row[h]);});return item;});
      cb(rows,file,json.length);
      showMsg(msgId,`✓ ${rows.length} rows imported`);
    }catch(err){showMsg(msgId,'⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}
function showMsg(id,msg,err){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.style.color=err?'#f87171':'var(--dh-primary)';if(!err)setTimeout(()=>{if(el)el.textContent='';},5000);}
function handleDrop(e,type){e.preventDefault();e.currentTarget.style.borderColor='';const f=e.dataTransfer.files[0];if(f)processFile(f,type);}
function handleInput(inp,type){const f=inp.files[0];if(f)processFile(f,type);inp.value='';}
function processFile(file,type){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  if(type==='sku'){parseXL(file,'sku',(rows,f,count)=>{state.skus=rows;state.skuFileName=f.name;state.skuCount=count;render();},'skuImportMsg');return;}
  const h={approval:(rows)=>{state.approvalRules=[...state.approvalRules,...rows];render();},approver:(rows)=>{state.approvers=[...state.approvers,...rows];render();},term:(rows)=>{state.commercialTerms=[...state.commercialTerms,...rows];render();},dt:(rows)=>{state.decisionTree=[...state.decisionTree,...rows];render();},asset:(rows)=>{state.dealRoomAssets=[...state.dealRoomAssets,...rows];render();}};
  if(h[type])parseXL(file,type,h[type],type+'ImportMsg');
}
function uploadZoneHtml(type,label,hint,suf){
  return `<div class="upload-zone" onclick="document.getElementById('fi_${suf}').click()" ondragover="event.preventDefault();this.style.borderColor='var(--dh-primary)'" ondragleave="this.style.borderColor=''" ondrop="handleDrop(event,'${type}')">
<input type="file" id="fi_${suf}" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleInput(this,'${type}')">
<div style="font-size:16px;margin-bottom:4px">📊</div>
<p style="font-size:12px;font-weight:500">${label}</p>
<p style="font-size:11px;color:var(--dh-muted)">${hint}</p>
<div id="${suf}ImportMsg" style="margin-top:5px;font-size:11px"></div>
</div>`;
}

render();
</script>
