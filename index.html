<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starterkit</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;
  --bg2:#0a1525;
  --card:#132035;
  --card2:#1a2d47;
  --border:#1f3550;
  --border2:#243d5c;
  --primary:#00d4aa;
  --primary-dim:rgba(0,212,170,.12);
  --primary-glow:rgba(0,212,170,.25);
  --text:#f0f6ff;
  --text2:#c8d8f0;
  --muted:#6b8aaa;
  --muted2:#4d6b8a;
  --danger:#f87171;
  --warn:#fbbf24;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Header ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:56px;position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{height:28px;display:flex;align-items:center;gap:6px}
.logo-icon{width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#0a1525}
.logo-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.logo-name span{color:var(--primary)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.3px}
.hdr-co{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.hdr-co span{color:var(--muted)}
.hdr-co input{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:6px 11px;font-size:12px;outline:none;width:180px;font-family:inherit;transition:border .15s}
.hdr-co input::placeholder{color:var(--muted2)}
.hdr-co input:focus{border-color:var(--primary);background:rgba(0,212,170,.04)}

/* ── Step progress ── */
.prog{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto;position:relative;z-index:10}
.prog::-webkit-scrollbar{height:0}
.ps{display:flex;align-items:center;gap:7px;padding:11px 14px 11px 0;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ps+.ps{padding-left:14px}
.ps.active{border-bottom-color:var(--primary)}
.ps.active .pl{color:var(--primary)}
.ps.done{border-bottom-color:rgba(0,212,170,.35)}
.ps.done .pl{color:rgba(0,212,170,.7)}
.pn{width:20px;height:20px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s}
.ps.active .pn{background:var(--primary);border-color:var(--primary);color:#0a1525;font-weight:800}
.ps.done .pn{background:rgba(0,212,170,.2);border-color:rgba(0,212,170,.4);color:var(--primary)}
.pl{font-size:11px;font-weight:600;color:var(--muted);transition:color .2s}
.pa{color:var(--border2);font-size:10px;margin-left:8px}

/* ── Layout ── */
.page{display:grid;grid-template-columns:1fr;min-height:calc(100vh - 96px)}
.content{padding:28px;overflow-y:auto}
.aside{background:var(--bg2);border-left:1px solid var(--border);padding:18px;display:flex;flex-direction:column}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.ptitle{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2;color:var(--text);letter-spacing:-.4px}
.ptitle em{color:var(--primary);font-style:normal}
.psub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:22px;max-width:580px}
.slbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;margin-top:18px}
.slbl:first-child{margin-top:0}
.shint{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.section-hdr-inline{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;margin-top:0}

/* ── Inputs ── */
.inp{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:all .15s;font-family:inherit}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:rgba(0,212,170,.02)}
.inp::placeholder{color:var(--muted2)}
.sel{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px;width:100%;outline:none;cursor:pointer;font-family:inherit;transition:all .15s}
.sel:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.ta{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;width:100%;resize:vertical;outline:none;font-family:inherit;line-height:1.7;transition:all .15s}
.ta:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.ta::placeholder{color:var(--muted2)}
.lbl{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hr{border:none;border-top:1px solid var(--border);margin:20px 0}

/* ── Buttons ── */
.btn{border:1px solid var(--border2);background:var(--card2);color:var(--text2);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:.35;cursor:default}
.btn-p{background:var(--primary);border-color:var(--primary);color:#0a1525;font-weight:700;box-shadow:0 2px 12px var(--primary-glow)}
.btn-p:hover{background:#00bfa0;border-color:#00bfa0;color:#0a1525}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-d{color:var(--danger);border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06);padding:5px 10px;font-size:11px}
.btn-d:hover{background:rgba(248,113,113,.12);border-color:var(--danger);color:var(--danger)}
.btn-ai{background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(0,212,170,.05));border:1px solid rgba(0,212,170,.3);color:var(--primary);font-weight:600}
.btn-ai:hover{background:linear-gradient(135deg,rgba(0,212,170,.18),rgba(0,212,170,.1));border-color:var(--primary)}

/* ── Use case grid ── */
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uc{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;user-select:none}
.uc:hover{border-color:rgba(0,212,170,.35);background:rgba(0,212,170,.03)}
.uc.on{border-color:var(--primary);background:var(--primary-dim)}
.uc-top{display:flex;align-items:flex-start;gap:10px}
.uc-ico{font-size:18px;flex-shrink:0;width:26px;text-align:center;margin-top:1px}
.uc-inf{flex:1}
.uc-n{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--text)}
.uc-d{font-size:11px;color:var(--muted);line-height:1.45}
.uc-ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;transition:all .18s}
.uc.on .uc-ck{background:var(--primary);border-color:var(--primary);color:#0a1525}
.uc-det{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.uc-det-lbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}

/* ── Toggle switch ── */
.sw{position:relative;width:38px;height:21px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-t{position:absolute;cursor:pointer;inset:0;background:var(--card2);border-radius:21px;transition:.2s;border:1px solid var(--border2)}
.sw-t:before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:.2s}
input:checked+.sw-t{background:rgba(0,212,170,.2);border-color:var(--primary)}
input:checked+.sw-t:before{transform:translateX(17px);background:var(--primary)}

/* ── Upload ── */
.dz{border:2px dashed var(--border2);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.dz:hover,.dz.ov{border-color:var(--primary);background:var(--primary-dim)}
.fok{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.3);border-radius:10px;padding:13px;display:flex;align-items:center;justify-content:space-between}

/* ── Insight box ── */
.insight{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.65;margin-top:12px}
.insight strong{color:var(--primary)}

/* ── Inline table ── */
.etbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
.etbl th{background:var(--bg);color:var(--muted);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border2);letter-spacing:.5px}
.etbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.etbl input{background:transparent;border:none;color:var(--text);font-size:11px;width:100%;outline:none;padding:2px 3px;font-family:inherit}
.etbl input:focus{background:rgba(255,255,255,.04);border-radius:4px}

/* ── Tips sidebar ── */
.tips-wrap{display:flex;flex-direction:column;height:100%;min-height:calc(100vh - 130px)}
.tips-hdr{display:flex;align-items:center;gap:7px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tips-ttl{font-size:12px;font-weight:700;color:var(--text)}
.tips-step{font-size:10px;color:var(--muted);background:var(--card2);border-radius:10px;padding:2px 8px;margin-left:auto;font-weight:600;border:1px solid var(--border)}
.tip-card{border-radius:9px;padding:11px 13px;margin-bottom:8px}
.tip-card.tip-info{border-left:2px solid var(--primary);background:rgba(0,212,170,.06)}
.tip-card.tip-warn{border-left:2px solid var(--warn);background:rgba(251,191,36,.06)}
.tip-icon{font-size:13px;margin-bottom:4px}
.tip-text{font-size:11px;color:var(--text2);line-height:1.65}
.tip-text strong{color:var(--text);font-weight:700}

/* ── Toast ── */
.save-toast{position:fixed;bottom:70px;right:20px;background:var(--primary);color:#0a1525;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px var(--primary-glow)}
.save-toast.show{opacity:1}

/* ── Stats / Review ── */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rev-c{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center}
.rev-n{font-size:24px;font-weight:800;color:var(--primary)}
.rev-l{font-size:11px;color:var(--muted);margin-top:3px}
.badge{display:inline-flex;align-items:center;background:var(--primary-dim);color:var(--primary);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;border:1px solid rgba(0,212,170,.2)}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);background:var(--bg2);padding:11px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:15}

/* ── Animations ── */
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,212,170,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.spin-dk{border-color:rgba(0,0,0,.15);border-top-color:#0a1525}

.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

async function sbUpsert(record){

      body:JSON.stringify(record)

}

function saveState(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({st,ts:Date.now()}));}catch(e){}

function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const saved=JSON.parse(raw);
    if(Date.now()-saved.ts>7*24*60*60*1000){localStorage.removeItem(SAVE_KEY);return false;}
    st={...freshSt(),...saved.st};
    return true;
  }catch(e){return false;}
}
function clearSave(){localStorage.removeItem(SAVE_KEY);}

function save(){
  saveState();

  clearTimeout(save._t);
  save._t=setTimeout(async ()=>{

    showToast(ok?'✓ Saved to database':'✓ Saved locally');

async function syncToDb(submitted){

  delete safe.docGenerating;

    id:st.dbId,
    company:st.co||'Unnamed',
    csm:st.csm||null,
    industry:st.industry||null,
    crm:st.crm||null,
    step:st.step,
    score:pct,
    submitted:submitted||false,
    state:safe,
    updated_at:new Date().toISOString()
  });
}

// ── COMPLETION SCORE ────────────────────────────────────────────────────────
function scoreCompletion(){
  let score=0,max=0,gaps=[];
  const check=(val,label,w=10)=>{max+=w;if(val&&String(val).trim().length>1){score+=w;}else{gaps.push(label);}};
  check(st.co,'Company name',15);
  check(st.industry,'Industry',5);
  check(st.crm,'CRM',5);
  check(st.contractLength,'Contract length',5);
  check(st.goLive,'Go-live target',5);
  check(st.adminName,'DealHub admin name',10);
  if(st.skuCount>0){score+=10;max+=10;}else{max+=10;gaps.push('Product catalog');}
  check(st.pricingModel,'Pricing model',10);
  const enUC=st.useCases.filter(u=>u.on);
  if(enUC.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Use cases');}
  const ucDetails=enUC.filter(u=>u.detail&&u.detail.length>20);
  if(ucDetails.length===enUC.length&&enUC.length>0){score+=10;max+=10;}
  else if(enUC.length>0){max+=10;gaps.push('Use case details (some too short)');}
  check(st.sellingFlow,'Quoting flow description',10);
if(st.approvalRows.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Approval rules');}
  check(st.payTerms,'Payment terms',5);
  check(st.netDays,'Net days',5);
  const pct=Math.round(score/max*100);
  return{pct,gaps,score,max};
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  try{ drawProg(); }catch(e){ console.error('drawProg error:',e); }
  if(st.submitted){try{renderDone();drawFooter();}catch(e){console.error('done error:',e);}return;}
  try{
    const fns=[S1,S2,S3,S_RDS,S5,S_OutputDocs,S_PriceCalc,S6,S7_Plan];
    const stepFn=fns[st.step]||S1;
    const stepHtml=stepFn();
    const el=document.getElementById('content');
    if(el) el.innerHTML='<div>'+stepHtml+'</div>';
  }catch(e){
    console.error('Step render error:',e);
    const el=document.getElementById('content');
    if(el){const msg=String(e.message||'Unknown error');el.innerHTML='<div style="padding:40px;color:#f87171"><b>Error:'+msg+'</b><br><button onclick="st.step=0;render()">Go to Step 1</button></div>';}
  }
  try{ drawFooter(); }catch(e){ console.error('footer:',e); }
  try{ drawTips(); }catch(e){ console.error('tips:',e); }
  try{ save(); }catch(e){ console.error('save error:',e); }
  // Auto-trigger generation on first arrival at Review (step 6) and Plan (step 7)
  if(st.step===7&&!st.submitted&&!st.docGenerating&&!st.lastDocHtml&&!st.autoGenDocTriggered){
    st.autoGenDocTriggered=true;setTimeout(genDoc,800);
  }
  if(st.step===8&&!st.submitted&&!st.planLoading&&!(st.projectPlan&&st.projectPlan.length)&&!st.autoGenPlanTriggered){
    st.autoGenPlanTriggered=true;setTimeout(genProjectPlan,800);
  }
}

function drawProg(){
  document.getElementById('prog').innerHTML=STEPS.map((s,i)=>{
    const cls=i===st.step?'active':i<st.step?'done':'';
    const csmTag=s.csmOnly?` <span style='font-size:9px;background:rgba(0,212,170,.15);color:var(--primary);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700'>CSM</span>`:'';
    return '<div class="ps '+cls+'" onclick="goStep('+i+')">'+'<span class="pn">'+(i<st.step?'\u2713':i+1)+'</span>'+'<span class="pl">'+s.e+' '+s.label+csmTag+'</span>'+(i<STEPS.length-1?'<span class="pa">›</span>':'')+'</div>';
  }).join('');
}
function drawFooter(){
  const last=st.step===STEPS.length-1;
  const btn=last?'<button class="btn btn-p" onclick="submitForm()">Submit ✓</button>':'<button class="btn btn-p" onclick="nextStep()">Continue →</button>';
  const dis=st.step===0?'disabled':'';
  document.getElementById('footer').innerHTML='<button class="btn" onclick="prevStep()" '+dis+'>← Back</button>'
    +'<span style="font-size:11px;color:var(--muted)">'+(st.step+1)+' of '+STEPS.length+'</span>'
    +btn;
}
function goStep(i){st.step=i;render();window.scrollTo(0,0);}
function nextStep(){if(st.step<STEPS.length-1){st.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(st.step>0){st.step--;render();}}
function submitForm(){
  st.submitted=true;
  clearSave();
  syncToDb(true); // mark submitted in DB
  render();
}

async function extractApprovals(){
  const txt=(st.approvalText||'').trim();if(!txt){alert('Describe your approval process first.');return;}
  st.extractLoading=true;st.extractErr='';render();
  const sys=`You are a DealHub CPQ architect. Extract approval workflow configuration. Return ONLY valid JSON, no markdown.
{"matrix":[{"role":"...","max":"e.g. 10%","approver":"..."}],"rules":[{"rule":"DealHub-style condition e.g. If Payment Terms != Net 30","step1":"approver","step2":"optional second approver or empty string"}]}
Matrix: lowest to highest authority. max is discount ceiling as % string.
Rules: condition phrased as DealHub would. Include real names mentioned if any.`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:700,system:sys,messages:[{role:'user',content:txt}]})});
    const d=await res.json();
    if(d.error){st.extractErr=d.error.message;}
    else{
      const p=JSON.parse(((d.content&&d.content[0]?d.content[0].text:'')||'{}').replace(/```json|```/g,'').trim());
      if(p.matrix?.length)st.approvalRows=p.matrix.map(r=>({role:r.role||'',max:r.max||'',approver:r.approver||''}));
      if(p.rules?.length)st.ruleRows=p.rules.map(r=>({rule:r.rule||'',step1:r.step1||'',step2:r.step2||''}));
      pushAI(`Extracted <strong>${st.approvalRows.length} discount tiers</strong> and <strong>${st.ruleRows.length} rule-based workflow${st.ruleRows.length!==1?'s':''}</strong>. Review the tables — check approver names and % thresholds match exactly. Also fill in the edge cases box below for OOO handling and expiry rules.`);
      save();
    }
  }catch(e){st.extractErr='Could not reach AI.';}
  st.extractLoading=false;render();
}

async function analyzePricingCalc(){
  if(st.pricingCalcLoading)return;
  st.pricingCalcLoading=true;st.pricingCalcError='';render();

  const sys=`You are a DealHub CPQ specialist analysing a client's pricing calculator, rate card, or pricing spreadsheet. Extract the following and return plain text (no JSON, no markdown):
- Pricing model type (per-seat/user, tiered/volume, flat fee, usage-based, platform + user, or mixed)
- Product lines or families found, with any price points
- Discount tiers or volume bands (e.g. "1-10 seats: $X, 11-50: $Y")
- Multi-year pricing if present (annual uplifts, multi-year discounts)
- Payment terms mentioned (annual, monthly, net days)
- Currency
- Any special pricing rules, formulas, or conditions (e.g. minimum commits, overage rates, pilot pricing)
- Any fields the sales rep must enter vs. auto-calculated fields
Be specific — include actual numbers from the data. Keep output to 10-15 bullet points.`;

  try{
    const parts=[];

    if(st.pricingCalcUrl.trim()){
      parts.push({type:'text',text:`Pricing calculator / spreadsheet URL provided: ${st.pricingCalcUrl.trim()}\nNote this URL and reference it in the pricing analysis.`});
    }

    for(const file of _pricingFileObjects){
      const ext=(file.name.split('.').pop()||'').toLowerCase();
      if(ext==='pdf'){
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
        parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
        parts.push({type:'text',text:`(above document: ${file.name})`});
      } else if(['xlsx','xls'].includes(ext)){
        const buf=await file.arrayBuffer();
        const text=await extractFileText(file.name,buf);
        if(text) parts.push({type:'text',text:`=== ${file.name} ===\n${text.slice(0,12000)}`});
      } else {
        const text=await file.text();
        parts.push({type:'text',text:`=== ${file.name} ===\n${text.slice(0,12000)}`});
      }
    }

    if(!parts.length){
      st.pricingCalcAnalysis=`Pricing URL noted: ${st.pricingCalcUrl.trim()}\n\nNo files uploaded — pricing analysis will reference the URL only. Upload a spreadsheet or PDF for a full extraction.`;
      st.pricingCalcLoading=false;save();render();return;
    }

    parts.push({type:'text',text:'Analyse the above pricing data and extract the pricing structure notes.'});

    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sys,
      messages:[{role:'user',content:parts}]
    })});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));

async function analyzeOutputDocs(){
  if(st.outputDocLoading)return;
  st.outputDocLoading=true;st.outputDocError='';render();

  const sys=`You are a DealHub implementation specialist analysing brand and document assets. Extract the following and return plain text (no JSON, no markdown headers):
- Brand colors (hex if visible, or descriptions like "navy blue", "teal")
- Logo description / company name if visible
- Font style (serif, sans-serif, bold/clean, etc.)
- Order form sections and column headers found
- Document terminology (e.g. "Subscription Agreement" vs "Order Form", "License" vs "Seat")
- DealRoom content suggestions (sections, tone, imagery style)
Keep the output concise — 8-12 bullet points max.`;

  try{
    const parts=[];

    // Add URL context
    if(st.brandUrl.trim()){
      parts.push({type:'text',text:`Marketing guidelines / DealRoom URL provided: ${st.brandUrl.trim()}\nPlease note this URL and reference it in your brand analysis for DealRoom content guidelines.`});
    }

    // Process uploaded files
    for(const file of _outputFileObjects){
      const ext=(file.name.split('.').pop()||'').toLowerCase();
      if(['png','jpg','jpeg','gif','webp'].includes(ext)){
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
        const mime=file.type||'image/jpeg';
        parts.push({type:'image',source:{type:'base64',media_type:mime,data:b64}});
        parts.push({type:'text',text:`(above image: ${file.name})`});
      } else if(ext==='pdf'){
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
        parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
        parts.push({type:'text',text:`(above document: ${file.name})`});
      } else if(['xlsx','xls'].includes(ext)){
        const buf=await file.arrayBuffer();
        const text=await extractFileText(file.name,buf);
        if(text) parts.push({type:'text',text:`=== ${file.name} ===\n${text.slice(0,8000)}`});
      } else {
        const text=await file.text();
        parts.push({type:'text',text:`=== ${file.name} ===\n${text.slice(0,8000)}`});
      }
    }

    if(!parts.length){
      st.brandAnalysis=`URL noted: ${st.brandUrl.trim()}\n\nNo files uploaded — brand analysis will be based on URL reference only. Add specific design guidelines in the notes above if needed.`;
      st.outputDocLoading=false;save();render();return;
    }

    parts.push({type:'text',text:'Analyse the above assets and extract brand and document structure notes.'});

    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,
      messages:[{role:'user',content:parts}]
    })});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    st.brandAnalysis=((d.content&&d.content[0]?d.content[0].text:'')||'No content extracted').trim();
  }catch(e){
    st.outputDocError='Could not analyse: '+e.message;
  }
  st.outputDocLoading=false;save();render();
}

function detectCtxWarnings(){
  if(!st.addCtx||!st.addCtx.trim())return[];
  const ctx=st.addCtx.toLowerCase();
  const warnings=[];
  const ucOn=new Set(st.useCases.filter(u=>u.on).map(u=>u.k));
  const pm=st.pricingModels||[];

  // Pricing model gaps
  if(/per[\s-]?(seat|user|license|agent|person|head)/.test(ctx)&&!pm.includes('per_user'))
    warnings.push('You mentioned per-seat/user pricing — select it under pricing models (Step 3)');
  if(/tier(ed|s)?[\s-]pricing|volume[\s-]discount|tier[\s-]based/.test(ctx)&&!pm.includes('tiered'))
    warnings.push('You mentioned tiered pricing — select it under pricing models (Step 3)');
  if(/usage[\s-]based|metered|consumption|pay[\s-]as[\s-]you[\s-]go/.test(ctx)&&!pm.includes('per_transaction'))
    warnings.push('You mentioned usage-based pricing — select it under pricing models (Step 3)');
  if(/flat[\s-](fee|rate|price)|fixed[\s-](fee|rate|price)/.test(ctx)&&!pm.includes('flat'))
    warnings.push('You mentioned flat fee pricing — select it under pricing models (Step 3)');
  if(/platform[\s-]plus|platform[\s-]&[\s-]user|platform fee/.test(ctx)&&!pm.includes('platform_plus_user'))
    warnings.push('You mentioned platform + user pricing — select it under pricing models (Step 3)');

  // Use case gaps
  [{p:/multi[\s-]?year|\b[23456][\s-]?year[\s-]?(deal|contract|term)|annual uplift|cpi[\s%]/,k:'multiyear',l:'multi-year contracts'},
   {p:/\bpartner\b|reseller|channel[\s-]partner|distributor|\bvar\b/,k:'partners',l:'partner/reseller deals'},
   {p:/ramp[\s-]?(up|ing|ed)?\b|ramping/,k:'ramp',l:'ramp-up pricing'},
   {p:/docusign|e[\s-]?sign(ature)?|electronic[\s-]sign|esignature/,k:'docusign',l:'DocuSign / e-signature'},
   {p:/\btrial\b|\bpilot\b|\bpoc\b|proof[\s-]of[\s-]concept/,k:'trials',l:'trials & pilots'},
   {p:/marketplace|appexchange|app exchange|aws[\s-]marketplace|azure[\s-]marketplace/,k:'marketplace',l:'marketplace sales'},
   {p:/redlin(e|ing)|contract[\s-]markup|contract[\s-]negotiat/,k:'redline',l:'contract redlining'},
   {p:/overage|usage[\s-]limit|consumption[\s-]cap/,k:'overage',l:'usage & overages'},
   {p:/optional[\s-]add[\s-]?on|add[\s-]on product|optional product/,k:'optional',l:'optional add-ons'},
   {p:/\bslack\b|\berp\b|\bsso\b|single[\s-]sign[\s-]on/,k:'integrations',l:'other integrations'},
  ].forEach(({p,k,l})=>{
    if(p.test(ctx)&&!ucOn.has(k))
      warnings.push(`You mentioned ${l} — enable it in use cases (Step 3)`);
  });

  // Product catalog missing
  if(/\bsku\b|\bskus\b|product[\s-]catalog|product[\s-]list|price[\s-]?book|product line|product famil/.test(ctx)&&st.skuCount===0)
    warnings.push('You mentioned products/SKUs — upload your catalog in Step 2 so the design doc reflects your product structure');

  // Approval thresholds described but none entered
  if(/\d+\s*%|approval threshold|sign[\s-]off|approver|discount limit|approval matrix/.test(ctx)&&st.approvalRows.length===0)
    warnings.push('You described approval thresholds — add them to the approval matrix in Step 5 so they appear in the design doc');

  return warnings;
}

function processFile(file){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg('skuMsg','⚠️ File appears empty',1);return;}
      st.skus=json.map(row=>({id:uid(),...row}));
      st.skuFile=file.name;st.skuCount=json.length;
      // Auto-detect column mappings
      const keys=Object.keys(json[0]||{});
      const findCol=(patterns)=>keys.find(k=>patterns.some(p=>k.toLowerCase().includes(p)))||'';
      st.colMap={
        sku:findCol(['sku','code','id','product code']),
        name:findCol(['name','product name','description']),
        price:findCol(['price','list','msrp','rate']),
        uom:findCol(['uom','unit','measure']),
        family:findCol(['family','category','group','type']),
        type:findCol(['type','kind','class']),
      };
      save();render();
      analyseProducts();
    }catch(err){showMsg('skuMsg','⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}

function readAsBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function extractFileText(name, buf){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(['xlsx','xls','csv'].includes(ext)){
    const wb=XLSX.read(buf,{type:'array'});
    const lines=[];
    wb.SheetNames.forEach(sn=>{
      const ws=wb.Sheets[sn];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      lines.push(`=== ${name} / Sheet: ${sn} ===`);
      rows.forEach(r=>{ if(r.some(c=>String(c).trim())) lines.push(r.map(c=>String(c)).join('\t')); });
    });
    return lines.join('\n');
  }
  if(['txt','md','html','htm','csv'].includes(ext)){
    return new TextDecoder().decode(buf);
  }
  return null;
}

async function startImport(file){
  const MAX=10*1024*1024;
  if(file.size>MAX){st.importError='File too large — please use a file under 10 MB.';render();return;}
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  if(!['pdf','txt','md','html','htm','xlsx','xls','csv','zip'].includes(ext)){
    st.importError='Please use a PDF, Excel/CSV, TXT, Markdown, or ZIP file.';render();return;
  }
  st.importFile=file.name;st.importLoading=true;st.importError='';render();

  const sys=`You are a DealHub CPQ discovery specialist. Analyse the document and extract CPQ configuration information. Return ONLY a valid JSON object — no markdown, no explanation, no trailing text.
Include only fields where you found clear evidence (omit or use "" if unknown):
{"co":"company name","industry":"vertical e.g. SaaS","crm":"Salesforce|HubSpot|Microsoft Dynamics|Other","contractLength":"12|24|36|custom","goLive":"target date or quarter","adminName":"","adminEmail":"","addCtx":"2-3 sentence summary of pain points and goals","pricingModels":["per_user|flat|tiered|platform_plus_user|per_transaction|custom"],"productFamilies":"comma-separated product family names","quoteCreators":"who builds quotes","sellingFlow":"quoting process description","approvalText":"approval workflow description","payTerms":"","netDays":"","autoRenew":"","msa":"","useCases":["multiyear|ramp|partners|trials|overage|optional|cpi|redline|docusign|marketplace|custom|integrations"]}`;

  try{
    let messages;
    if(ext==='zip'){
      const zip=await JSZip.loadAsync(await file.arrayBuffer());
      const parts=[];
      const entries=Object.values(zip.files).filter(f=>!f.dir);
      for(const entry of entries){
        const eName=entry.name.split('/').pop();
        const eExt=(eName.split('.').pop()||'').toLowerCase();
        if(!['pdf','txt','md','html','htm','xlsx','xls','csv'].includes(eExt)) continue;
        if(eExt==='pdf'){
          // PDFs inside ZIP: send as base64 document
          const b64=await entry.async('base64');
          parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
          parts.push({type:'text',text:`(above: ${eName})`});
        } else {
          const buf=await entry.async('arraybuffer');
          const text=await extractFileText(eName,buf);
          if(text) parts.push({type:'text',text:`=== FILE: ${eName} ===\n${text.slice(0,10000)}`});
        }
        if(parts.length>=20) break;
      }
      if(!parts.length){st.importError='No supported files found inside the ZIP (PDF, Excel, CSV, TXT).';st.importLoading=false;render();return;}
      parts.push({type:'text',text:'Extract all CPQ-relevant information from the above files.'});
      messages=[{role:'user',content:parts}];
    } else if(ext==='pdf'){
      const b64=await readAsBase64(file);
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:'Extract all CPQ-relevant information from this document.'}
      ]}];
    } else if(['xlsx','xls','csv'].includes(ext)){
      const buf=await file.arrayBuffer();
      const text=await extractFileText(file.name,buf);
      messages=[{role:'user',content:'Extract all CPQ-relevant information from this spreadsheet.\n\nSPREADSHEET:\n'+text.slice(0,30000)}];
    } else {
      const text=await file.text();
      messages=[{role:'user',content:'Extract all CPQ-relevant information from this document.\n\nDOCUMENT:\n'+text.slice(0,30000)}];
    }
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:1500,system:sys,messages
    })});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    const raw=((d.content&&d.content[0]?d.content[0].text:'')||'').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    applyImportData(parsed);
    st.importDone=true;
  }catch(e){
    st.importError='Could not analyse document: '+e.message;
  }
  st.importLoading=false;
  save();render();
}

function applyImportData(p){
  if(p.co){st.co=p.co;const el=document.getElementById('coInp');if(el)el.value=st.co;}
  if(p.industry)st.industry=p.industry;
  if(p.crm&&['Salesforce','HubSpot','Microsoft Dynamics','Other'].includes(p.crm))st.crm=p.crm;
  if(p.contractLength)st.contractLength=String(p.contractLength);
  if(p.goLive)st.goLive=p.goLive;
  if(p.adminName)st.adminName=p.adminName;
  if(p.adminEmail)st.adminEmail=p.adminEmail;
  if(p.addCtx)st.addCtx=p.addCtx;
  if(p.pricingModels&&p.pricingModels.length){st.pricingModels=p.pricingModels;st.pricingModel=p.pricingModels.join(',');}
  if(p.productFamilies)st.productFamilies=p.productFamilies;
  if(p.quoteCreators)st.quoteCreators=p.quoteCreators;
  if(p.sellingFlow)st.sellingFlow=p.sellingFlow;
  if(p.approvalText)st.approvalText=p.approvalText;
  if(p.payTerms)st.payTerms=p.payTerms;
  if(p.netDays)st.netDays=p.netDays;
  if(p.autoRenew)st.autoRenew=p.autoRenew;
  if(p.msa)st.msa=p.msa;
  if(p.useCases&&Array.isArray(p.useCases)&&p.useCases.length){
    st.useCases=st.useCases.map(u=>p.useCases.includes(u.k)?{...u,on:true}:u);
  }
}

async function analyzeTranscript(){
  if(!st.transcriptRaw.trim())return;
  st.transcriptLoading=true;st.transcriptError='';render();
  const sys=`You are a senior DealHub Solution Architect. Extract structured insights from a B2B SaaS discovery call transcript to inform a DealHub CPQ Configuration Design Document.

Return ONLY valid JSON, no markdown fences, no preamble:
{"observations":[{"currentState":"what they currently do","painPoint":"the problem this causes"}],"quotes":[{"speaker":"name or Client","quote":"verbatim quote max 25 words"}],"implications":[{"observation":"what was said","configImpact":"specific DealHub config response","section":"e.g. S4 Playbook"}],"useCaseSuggestions":["key1"]}

Valid useCaseSuggestions keys: multiyear,ramp,partners,trials,overage,optional,cpi,redline,docusign,marketplace,custom,integrations
Rules: 3-6 observations, 3-6 quotes, 4-8 implications. Be specific — use real numbers/names from the transcript. If irrelevant or empty, return empty arrays.`;

  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:2000,system:sys,
      messages:[{role:'user',content:`Extract insights from this discovery transcript:\n\n${st.transcriptRaw.slice(0,8000)}`}]
    })});
    const text=await res.text();
    if(!res.ok){st.transcriptError=`HTTP ${res.status}`;st.transcriptLoading=false;render();return;}
    const d=JSON.parse(text);
    if(d.error){st.transcriptError=typeof d.error==='string'?d.error:(d.error.message||'API error');st.transcriptLoading=false;render();return;}
    const raw=(d.content&&d.content[0]?d.content[0].text:'')||'';
    const clean=raw.replace(/^```json\n?/,'').replace(/\n?```$/,'').trim();
    const parsed=JSON.parse(clean);
    st.rdsObservations=parsed.observations||[];
    st.rdsQuotes=parsed.quotes||[];
    st.rdsImplications=parsed.implications||[];
    st.rdsUseCaseSuggestions=parsed.useCaseSuggestions||[];
    st.transcriptApplied=false;
  }catch(e){
    st.transcriptError=String(e.message||'Parse error');
  }
  st.transcriptLoading=false;
  save();render();
}

function applyTranscript(){
  if(!st.rdsObservations.length&&!st.rdsQuotes.length)return;
  const obsSummary=st.rdsObservations.map(o=>`${o.currentState} — Pain: ${o.painPoint}`).join('\n');

    st.sellingFlow=(st.sellingFlow?st.sellingFlow+'\n\n':'')+'[From transcript]\n'+obsSummary;
  }
  st.rdsUseCaseSuggestions.forEach(k=>{
    st.useCases=st.useCases.map(u=>u.k===k?{...u,on:true}:u);
  });
  st.transcriptApplied=true;
  save();render();
}

async function genProjectPlan(){
  st.planLoading=true;st.planError='';render();
  const en=st.useCases.filter(u=>u.on);
  const ctx=`Client: ${st.co||'unknown'} | Go-live: ${st.goLive||'TBD'} | CRM: ${st.crm} | Industry: ${st.industry||'unknown'} | Contract: ${st.contractLength||'12'}mo | Products: ${st.productFamilies||'unknown'} | Pricing: ${st.pricingModel||'unknown'} | Use cases: ${en.map(u=>u.n).join(', ')||'none'} | DocuSign: ${en.some(u=>u.k==='docusign')?'Yes':'No'}`;

  const sys=`You are a DealHub CPQ implementation manager. Output a JSON array only — no markdown, no explanation, no text before or after the array. Output compact JSON with NO line breaks or indentation inside the array.
STRICT JSON RULES: use double quotes for ALL keys and string values. Never use single quotes. Never leave keys unquoted. Valid booleans: true/false (no quotes).
Schema: {"phase":"string","task":"string","owner":"DH or Client or Both","start":"Week N","end":"Week N","priority":"High or Medium or Low","milestone":false,"notes":"string"}
notes: key dependency or action required, max 8 words, no apostrophes. Empty string if none.
Generate exactly 22 tasks across these phases (task count): Discovery & Design (4), Integration Setup (3), Product Catalog (3), Approval Workflows (2), DealRoom & Docs (2), UAT (4), Training (2), Go-Live (2).
Set milestone:true for exactly these 9 tasks: Kickoff Meeting, Discovery Complete, Integration Complete, Catalog Config Complete, Approval Workflows Complete, DealRoom & Docs Complete, UAT Start, Training Complete, Go-Live.
DH owns build/config. Client owns sign-offs, data provision, UAT execution. Both for workshops and kickoff.
Tailor task names and notes to the client context provided.`;

  try{
    const reqBody=JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,system:sys,messages:[{role:'user',content:ctx}]});
    let res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:reqBody});
    if(res.status===429){
      st.planError='Rate limit — retrying in 60 seconds…';render();
      await new Promise(r=>setTimeout(r,62000));
      st.planError='';
      res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:reqBody});
    }
    const text=await res.text();
    if(!res.ok){st.planError=`HTTP ${res.status}: ${text.slice(0,200)}`;st.planLoading=false;render();return;}
    let d;
    try{d=JSON.parse(text);}catch(pe){st.planError=`Bad JSON: ${text.slice(0,200)}`;st.planLoading=false;render();return;}
    if(d.error){st.planError=typeof d.error==='string'?d.error:(d.error.message||JSON.stringify(d.error));st.planLoading=false;render();return;}
    const raw=((d.content&&d.content[0]?d.content[0].text:'')||'').replace(/```json|```/g,'').trim();
    if(!raw){st.planError='Empty response — try again';st.planLoading=false;render();return;}
    console.log('genProjectPlan raw response:', raw);
    try {
      const jsonStr = raw.match(/\[[\s\S]*\]/)?.[0] || raw;
      // Try 1: plain parse
      try { st.projectPlan = JSON.parse(jsonStr); }
      catch(e1) {
        // Try 2: fix trailing commas + unquoted keys
        const c2 = jsonStr
          .replace(/,(\s*[}\]])/g,'$1')
          .replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)(\s*):/g,'$1"$2"$3:');
        try { st.projectPlan = JSON.parse(c2); }
        catch(e2) {
          // Try 3: normalise curly quotes
          const c3 = c2.replace(/[""]/g,'"').replace(/['']/g,"'");
          try { st.projectPlan = JSON.parse(c3); }
          catch(e3) {
            // Try 4: swap remaining single-quote string delimiters
            const c4 = c3.replace(/([:,\[{]\s*)'([^']*)'/g,'$1"$2"');
            st.projectPlan = JSON.parse(c4);
          }
        }
      }
    } catch(e) {
      st.planError = 'Parse error: ' + String(e.message).slice(0,80) + ' — raw: ' + raw.slice(0,120);
      st.planLoading = false;
      render();
      return;
    }
    st.planLoading=false;save();render();
  }catch(e){
    st.planError=`${e.message||e}`;
    st.planLoading=false;render();
  }
}

  const rows=(st.projectPlan||[]).map((r,i)=>`<tr style="${r.milestone?'background:rgba(0,212,170,.08);font-weight:700':i%2===0?'':'background:#f9fafb'}">
    <td>${r.milestone?'🏁 ':''}${esc(r.phase)}</td><td><strong>${esc(r.task)}</strong></td><td style="color:#6b7280;font-size:11px">${esc(r.notes||'')}</td><td style="text-align:center;color:${r.status==='Complete'?'#166534':r.status==='In Progress'?'#c2410c':'#6b7280'}">${esc(r.status||'Not Started')}</td><td style="text-align:center">${esc(r.owner)}</td><td>${esc(r.start)}</td><td>${esc(r.end)}</td><td>${esc(r.priority)}</td></tr>`).join('');
  const pg=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Project Plan — ${co}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;font-size:12px;color:var(--text);padding:40px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}.sub{font-size:12px;color:var(--muted);margin-bottom:24px}
table{width:100%;border-collapse:collapse}th{background:#1a2c42;color:#fff;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
td{padding:8px 12px;border-bottom:1px solid #e5e7eb}@media print{body{padding:20px}}</style>
</head><body>
<h1>DealHub CPQ — Implementation Project Plan</h1>
<div class="sub">${esc(co)} · ${dt} · Go-live target: ${esc(st.goLive||'TBD')}</div>
<table><thead><tr><th>Phase</th><th>Task</th><th>Notes</th><th>Status</th><th>Owner</th><th>Start</th><th>End</th><th>Priority</th></tr></thead><tbody>${rows}</tbody></table>
</body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(pg);w.document.close();setTimeout(()=>w.print(),400);}
}

// ── EXPLICIT SAVE / EXPORT / IMPORT ──────────────────────────────────────────
function showToast(msg='✓ Saved'){
  const t=document.getElementById('saveToast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function copyMyLink(){
  // Force an immediate DB sync first so the link always works
  syncToDb(false);
  const base=window.location.origin+window.location.pathname;
  const link=`${base}?id=${st.dbId}`;
  navigator.clipboard.writeText(link).then(()=>{
    showToast('🔗 Link copied!');
  }).catch(()=>{
    prompt('Copy this link:',link);
  });
}

function exportSave(){
  syncToDb(false); // immediate DB save
  const data={st,version:3,ts:Date.now()};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`DealHub_Discovery_${(st.co||'Unnamed').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();showToast('✓ Saved to DB + file downloaded');
}

function importSave(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.st){st={...freshSt(),...data.st};saveState();document.getElementById('coInp').value=st.co||'';render();showToast('✓ Progress loaded');}
      else alert('Invalid save file.');
    }catch(ex){alert('Could not read file: '+ex.message);}
  };
  r.readAsText(f);inp.value='';
}


// ── Init — URL-based resume ──────────────────────────────────────────────────
async function initApp(){
  const params=new URLSearchParams(window.location.search);
  const resumeId=params.get('id');

  if(resumeId){
    // Show loading state first, then fetch
    render(); // renders step 0 of fresh state while loading
    document.getElementById('content').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px">
      <span class="spin" style="width:24px;height:24px;border-width:3px"></span>
      <div style="font-size:13px;color:var(--muted)">Loading your saved progress…</div>
    </div>`;
    try{
      const res=await fetch(`${SB_URL}/rest/v1/discoveries?id=eq.${resumeId}&select=*`,{headers:SB_HEADERS});
      const rows=await res.json();
      if(rows&&rows[0]&&rows[0].state){
        st={...freshSt(),...rows[0].state,dbId:resumeId};
        saveState();
        document.getElementById('coInp').value=st.co||'';
        render();
        showToast('✓ Progress restored from link');
        return;
      }
    }catch(e){console.error('Resume error:',e);}
    showToast('Could not load saved progress');
    render();
    return;
  }

  // Normal load — try localStorage first
  const restored=loadState();
  if(restored){
    document.getElementById('coInp').value=st.co||'';
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--primary);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:12px;font-size:12px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap';
    banner.innerHTML='<span style="color:var(--primary)">💾</span> <span style="color:var(--text2)">Welcome back'+(st.co?' — '+st.co:'')+'!</span>'
      +'<button onclick="this.parentNode.remove()" style="background:var(--primary);border:none;border-radius:5px;padding:3px 10px;color:#0a1525;font-size:11px;font-weight:700;cursor:pointer">✓ Got it</button>'
      +'<button onclick="startOver();this.parentNode.remove()" style="background:transparent;border:1px solid var(--border2);border-radius:5px;padding:3px 10px;color:var(--muted);font-size:11px;cursor:pointer">Start fresh</button>';
    setTimeout(()=>{document.body.appendChild(banner);setTimeout(()=>banner.remove(),8000);},300);
  } else {
    document.getElementById('coInp').value='';
  }
  render();
}


initApp();

</script>
