<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub CPQ Discovery — CSM Tool</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;font-size:13px}
:root{--bg:#0a1628;--card:#0f1f38;--border:#1e3a5f;--primary:#3de8b0;--text:#e8f0fe;--muted:#7a9bc4;--accent:#1a3d2e;--warn:#f59e42;--danger:#f87171}
.app{min-height:100vh}

/* Header */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:32px;height:32px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#0a1628}
.hdr-title{font-size:15px;font-weight:800}
.hdr-title span{color:var(--primary)}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-client{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.hdr-client input{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:12px;outline:none;width:160px}
.hdr-client input:focus{border-color:var(--primary)}

/* Nav */
.nav{background:#080f1e;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 20px}
.nav::-webkit-scrollbar{height:2px}
.nav-item{padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:5px}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--primary);border-bottom-color:var(--primary)}
.nav-item.done{color:#34d399}
.nav-num{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:9px}
.nav-item.active .nav-num{background:var(--primary);color:#0a1628}
.nav-item.done .nav-num{background:#34d399;color:#0a1628}

/* Layout */
.body{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 90px)}
.main{padding:20px;overflow-y:auto;border-right:1px solid var(--border)}
.sidebar{padding:16px;overflow-y:auto;background:#080f1e}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.card-desc{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.section-hdr{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;margin-top:16px}
.section-hdr:first-child{margin-top:0}

/* Inputs */
.inp{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:12px;width:100%;outline:none;transition:border 0.15s}
.inp:focus{border-color:var(--primary)}
.inp::placeholder{color:var(--muted)}
.sel{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 8px;font-size:12px;width:100%;outline:none;cursor:pointer}
.ta{background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-size:12px;width:100%;resize:vertical;outline:none;font-family:inherit;line-height:1.5}
.ta:focus{border-color:var(--primary)}
.ta::placeholder{color:var(--muted)}
label.lbl{font-size:10px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

/* Buttons */
.btn{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;font-weight:500}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:0.4;cursor:default}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#0a1628;font-weight:700}
.btn-primary:hover{opacity:0.9;color:#0a1628}
.btn-ai{background:linear-gradient(135deg,#0f2a1e,#0d2137);border-color:var(--primary);color:var(--primary);font-weight:600}
.btn-ai:hover{background:var(--accent)}
.btn-sm{padding:4px 8px;font-size:10px}
.btn-danger{color:var(--danger);border-color:#3a1f1f}
.btn-danger:hover{background:#1a0a0a;border-color:var(--danger)}

/* Switch */
.sw{position:relative;width:36px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-slider{position:absolute;cursor:pointer;inset:0;background:#1a2d4a;border-radius:20px;transition:0.2s;border:1px solid var(--border)}
.sw-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:0.2s}
input:checked+.sw-slider{background:var(--accent);border-color:var(--primary)}
input:checked+.sw-slider:before{transform:translateX(16px);background:var(--primary)}

/* Badge / Tag */
.badge{display:inline-flex;align-items:center;background:var(--accent);color:var(--primary);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600}
.badge-warn{background:rgba(245,158,66,0.15);color:var(--warn);border:1px solid rgba(245,158,66,0.3)}
.badge-ok{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)}
.tag{display:inline-block;background:#1e3a5f;color:#7ab8f5;border-radius:6px;padding:2px 7px;font-size:10px;margin:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#080f1e;color:var(--muted);padding:7px 10px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.tbl td{padding:6px 8px;border-bottom:1px solid rgba(30,58,95,0.5);vertical-align:top}
.tbl tr:hover td{background:rgba(61,232,176,0.02)}

/* QG builder */
.qg-card{background:#080f1e;border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.qg-header{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.qg-header:hover{background:rgba(61,232,176,0.03)}
.qg-body{padding:0 12px 12px;border-top:1px solid var(--border)}
.q-row{display:grid;grid-template-columns:160px 140px 1fr 80px 28px;gap:6px;align-items:center;margin-top:6px}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-zone:hover{border-color:var(--primary);background:rgba(61,232,176,0.02)}
.upload-ok{background:rgba(61,232,176,0.06);border:1.5px solid rgba(61,232,176,0.4);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between}

/* Sidebar / AI */
.ai-panel{display:flex;flex-direction:column;height:calc(100vh - 110px);position:sticky;top:90px}
.ai-header{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ai-title{font-size:12px;font-weight:700;color:var(--primary)}
.ai-step{font-size:10px;color:var(--muted);margin-left:auto}
.ai-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;padding-right:2px}
.ai-messages::-webkit-scrollbar{width:3px}
.ai-messages::-webkit-scrollbar-thumb{background:var(--border)}
.ai-bubble{background:var(--accent);border:1px solid rgba(61,232,176,0.12);border-radius:8px 8px 8px 2px;padding:8px 10px;font-size:11px;line-height:1.6}
.ai-bubble strong{color:var(--primary)}
.ai-bubble.suggest{border-color:rgba(61,232,176,0.3);cursor:pointer}
.ai-bubble.suggest:hover{background:#1e4d35}
.user-bubble{background:#1a2d4a;border-radius:8px 8px 2px 8px;padding:8px 10px;font-size:11px;align-self:flex-end;max-width:90%;text-align:right}
.ai-typing{display:flex;gap:4px;padding:8px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-input-row{display:flex;gap:6px}
.ai-input{flex:1;background:#0a1628;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 9px;font-size:11px;outline:none;font-family:inherit}
.ai-input:focus{border-color:var(--primary)}
.ai-send{background:var(--primary);border:none;border-radius:6px;padding:6px 10px;color:#0a1628;font-size:11px;font-weight:700;cursor:pointer}

/* Suggest bar */
.suggest-bar{background:linear-gradient(135deg,#0d2137,#0f2a1e);border:1px solid var(--primary);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.suggest-title{font-size:10px;font-weight:700;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.suggest-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(61,232,176,0.08);border:1px solid rgba(61,232,176,0.2);border-radius:5px;padding:4px 8px;font-size:10px;color:var(--primary);cursor:pointer;margin:2px;transition:all 0.15s}
.suggest-btn:hover{background:rgba(61,232,176,0.15);border-color:var(--primary)}

/* Footer */
.footer{border-top:1px solid var(--border);background:var(--card);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:15}

/* Divider */
hr.div{border:none;border-top:1px solid var(--border);margin:16px 0}

/* Spinning loader */
.spin{width:12px;height:12px;border:2px solid rgba(61,232,176,0.3);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
.spin-dark{border-color:rgba(0,0,0,0.2);border-top-color:#0a1628}

.pill-toggle{display:flex;background:#080f1e;border-radius:6px;padding:3px;gap:2px}
.pill-opt{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:transparent}
.pill-opt.on{background:var(--primary);color:#0a1628}

.info-box{background:rgba(61,232,176,0.05);border:1px solid rgba(61,232,176,0.15);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.warn-box{background:rgba(245,158,66,0.06);border:1px solid rgba(245,158,66,0.2);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--warn);line-height:1.6;margin-bottom:12px}

.review-stat{background:#0a1628;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.review-n{font-size:24px;font-weight:800;color:var(--primary)}
.review-lbl{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-icon">D</div>
    <div>
      <div class="hdr-title">DealHub <span>CPQ Discovery</span></div>
      <div class="hdr-sub">CSM Configuration Workbook</div>
    </div>
  </div>
  <div class="hdr-client">
    <span>Client:</span>
    <input id="clientInp" placeholder="Company name" oninput="state.client=this.value">
    <span style="margin-left:6px">CSM:</span>
    <input id="csmInp" placeholder="Your name" style="width:130px" oninput="state.csm=this.value">
  </div>
</div>

<!-- Nav -->
<div class="nav" id="navBar"></div>

<!-- Body -->
<div class="body">
  <div class="main" id="mainContent"></div>
  <div class="sidebar">
    <div class="ai-panel" id="aiPanel">
      <div class="ai-header">
        <span style="font-size:16px">🤖</span>
        <span class="ai-title">DealHub AI Advisor</span>
        <span class="ai-step" id="aiStepLabel">Section 1</span>
      </div>
      <div id="suggestBar"></div>
      <div class="ai-messages" id="aiMessages"></div>
      <div class="ai-input-row">
        <input class="ai-input" id="aiInput" placeholder="Ask or answer…" onkeydown="if(event.key==='Enter')sendAI()">
        <button class="ai-send" onclick="sendAI()">↗</button>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>
</div>

<script>
const PROXY='https://dealhub-proxy.vercel.app/api/chat';
const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const clone=o=>JSON.parse(JSON.stringify(o));

// ── SECTIONS ──────────────────────────────────────────────────────────────
const SECTIONS=[
  {id:'setup',   label:'Project Setup',    icon:'⚙️'},
  {id:'scope',   label:'Opp Scope',        icon:'🎯'},
  {id:'playbook',label:'Playbook / QGs',   icon:'📋'},
  {id:'products',label:'Products & Pricing',icon:'💰'},
  {id:'approvals',label:'Approvals',       icon:'🛡️'},
  {id:'dealroom',label:'DealRoom',         icon:'✨'},
  {id:'generate',label:'Generate Doc',     icon:'📄'},
];

// ── DEFAULT STATE ─────────────────────────────────────────────────────────
function freshState(){return{
  section:0,
  client:'', csm:'',

  // S0 Project Setup
  crm:'Salesforce', crmEdition:'Enterprise', sfObject:'Quote',
  hsEdition:'', sandboxName:'', prodName:'', goLiveDate:'', notes:'',
  decisionMakers:[
    {role:'Approvals & Post-Launch Governance',name:''},
    {role:'Product & Pricing',name:''},
    {role:'Buyer-Facing Docs',name:''},
    {role:'DealRoom Design',name:''},
    {role:'DealHub Administration',name:''},
  ],
  packages:[
    {name:'DealHub Integration',env:'Sandbox',detail:'Standard DealHub package'},
    {name:'DealHub Subscriptions',env:'',detail:'Used for Renewals/Existing Business'},
  ],
  optionalIntegrations:[],
  featureRequests:[],

  // S1 Opp Scope
  oppTypes:[
    {type:'New Business',phase:'V1',inScope:true,detail:''},
    {type:'Renewals',phase:'V1',inScope:false,detail:''},
    {type:'Expansions',phase:'V1',inScope:false,detail:''},
  ],
  multiYear:{enabled:false,detail:''},
  multiOffer:{enabled:false,detail:''},
  pilots:{enabled:false,detail:''},
  partners:{enabled:false,detail:''},

  // S2 Playbook / QGs
  questionGroups:[
    {id:uid(),name:'[GQ] General Questions',locked:true,open:true,questions:[
      {id:uid(),name:'Opportunity Type',type:'CRM',detail:'Read from Opportunity.Type',hidden:false,readOnly:true},
      {id:uid(),name:'Start Date',type:'Date - Proposal Date',detail:'',hidden:false,readOnly:false},
      {id:uid(),name:'Duration',type:'Numeric - Answer',detail:'Min 12, Max null, Default 12, Stepping 12',hidden:false,readOnly:false},
      {id:uid(),name:'End Date',type:'Date - Formula',detail:'Start Date + Duration (months)',hidden:false,readOnly:true},
    ]},
    {id:uid(),name:'[Billing & Terms]',locked:false,open:false,questions:[
      {id:uid(),name:'Payment Terms',type:'Text - List',detail:'Net 30 (default), Net 45, Net 60, Net 90',hidden:false,readOnly:false},
      {id:uid(),name:'Payment Method',type:'Text - List',detail:'Invoice, Auto-Debit (default)',hidden:false,readOnly:false},
      {id:uid(),name:'Auto Renewal',type:'Text - Radio',detail:'Opt Out (default), Opt In',hidden:false,readOnly:false},
    ]},
    {id:uid(),name:'[Billing Contact]',locked:false,open:false,questions:[
      {id:uid(),name:'Billing Contact Name',type:'Text - Answer',detail:'',hidden:false,readOnly:true},
      {id:uid(),name:'Billing Contact Email',type:'Text - Answer',detail:'',hidden:false,readOnly:true},
      {id:uid(),name:'Billing Contact Phone',type:'Text - Answer',detail:'',hidden:false,readOnly:true},
    ]},
  ],
  qgAiLoading:false,

  // S3 Products
  skuFile:'', skuCount:0, skus:[],
  pricingNotes:'',
  productAiLoading:false,
  playbookFilters:[],

  // S4 Approvals
  discountMatrix:[
    {role:'AE',maxDiscount:'10%',approver:'Direct Manager (Director)'},
    {role:'Director',maxDiscount:'25%',approver:'Direct Manager (VP)'},
    {role:'VP',maxDiscount:'50%',approver:'CRO'},
    {role:'CRO',maxDiscount:'75%',approver:'CEO'},
    {role:'CEO',maxDiscount:'100%',approver:'n/a'},
  ],
  ruleWorkflows:[
    {id:uid(),rule:'If Payment Terms ≠ Net 30',step1:'Head of Finance',step2:'',step3:'',notes:''},
  ],
  approvalFreeText:'',
  approvalAiLoading:false,
  approvalExtractError:'',

  // S5 DealRoom
  docuSign:false, dealRoomEnabled:true,
  orderFormFields:[
    {id:uid(),field:'Billing Entity',source:'CRM Account',readOnly:true},
    {id:uid(),field:'Billing Address',source:'CRM Account',readOnly:true},
    {id:uid(),field:'Billing Contact',source:'Query',readOnly:true},
    {id:uid(),field:'Payment Terms',source:'[Billing & Terms]',readOnly:false},
  ],
  dealRoomAssets:[],
  brandingNotes:'',

  // Doc gen
  docGenerating:false, docError:'',
};}

let state=freshState();

// ── QUESTION TYPE OPTIONS ──────────────────────────────────────────────────
const Q_TYPES=['CRM','Text - List','Text - Radio','Text - Answer','Date - Proposal Date','Date - Formula','Date - Selected Date','Numeric - Answer','Numeric - Calculated','Numeric - Read Only'];

// ── AI STATE ──────────────────────────────────────────────────────────────
let aiMsgs=[{role:'ai',html:'👋 Hi! I\'m your <strong>DealHub AI Advisor</strong>. I\'ll help you fill in this design document. Start with Project Setup and I\'ll guide you through every section.'}];
let aiLoading=false;
let aiStepSeen=new Set();

const STEP_INTROS=[
  'You\'re on <strong>Project Setup</strong>. What CRM is the client using — Salesforce or HubSpot? And do you have the sandbox environment name yet?',
  'For <strong>Opportunity Scope</strong> — which opportunity types are in scope for V1? New Business is almost always first, but confirm Renewals and Expansions timing.',
  'Now for the <strong>Playbook / Question Groups</strong> — this is where the real DealHub architecture happens. I can suggest a full question group structure based on the products and features you\'ve entered. Click the AI button when ready.',
  'On <strong>Products & Pricing</strong> — once you upload the SKU file, I can suggest the playbook filter structure and product assignment rules.',
  'For <strong>Approvals</strong> — describe the client\'s approval process in plain English and I\'ll populate both the discount matrix and rule-based workflows automatically.',
  'For the <strong>DealRoom</strong> section — does the client use DocuSign, or will they use DealHub\'s native signature? And what documents need to appear on the order form?',
  'Everything looks good! Click <strong>Generate Design Document</strong> to produce the full DealHub configuration spec. I\'ll write all sections including the boilerplate, tables, and recommendations.',
];

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  renderNav();
  renderSection();
  renderFooter();
  renderAI();
  setTimeout(()=>triggerIntro(state.section),500);
}

function renderNav(){
  document.getElementById('navBar').innerHTML=SECTIONS.map((s,i)=>`
<div class="nav-item${i===state.section?' active':''}" onclick="goSection(${i})">
  <span class="nav-num">${i<state.section?'✓':i+1}</span>
  ${s.icon} ${s.label}
</div>`).join('');
}

function goSection(i){state.section=i;render();window.scrollTo(0,0);}

function renderSection(){
  const fns=[S0,S1,S2,S3,S4,S5,S6];
  document.getElementById('mainContent').innerHTML=(fns[state.section]||S0)();
}

function renderFooter(){
  const last=state.section===SECTIONS.length-1;
  document.getElementById('footer').innerHTML=`
<button class="btn" onclick="prevSec()" ${state.section===0?'disabled':''}>← Back</button>
<span style="font-size:11px;color:var(--muted)">${SECTIONS[state.section].icon} ${SECTIONS[state.section].label}</span>
${last?`<button class="btn btn-primary" onclick="exportExcel()">⬇️ Export Data</button>`:`<button class="btn btn-primary" onclick="nextSec()">Next →</button>`}`;
}

function nextSec(){if(state.section<SECTIONS.length-1){state.section++;render();window.scrollTo(0,0);}}
function prevSec(){if(state.section>0){state.section--;render();}}

// ══ S0 — PROJECT SETUP ════════════════════════════════════════════════════
function S0(){
  const dmRows=state.decisionMakers.map((d,i)=>`
<div class="g2" style="margin-bottom:7px;align-items:center">
  <div style="font-size:11px;color:var(--muted)">${esc(d.role)}</div>
  <input class="inp" placeholder="Name / email" value="${esc(d.name)}" oninput="state.decisionMakers[${i}].name=this.value">
</div>`).join('');

  const pkgRows=state.packages.map((p,i)=>`
<tr>
  <td><input class="inp" value="${esc(p.name)}" oninput="state.packages[${i}].name=this.value"></td>
  <td><input class="inp" value="${esc(p.env)}" oninput="state.packages[${i}].env=this.value" placeholder="Sandbox / Prod"></td>
  <td><input class="inp" value="${esc(p.detail)}" oninput="state.packages[${i}].detail=this.value"></td>
  <td><button class="btn btn-danger btn-sm" onclick="state.packages.splice(${i},1);render()">✕</button></td>
</tr>`).join('');

  const optRows=state.optionalIntegrations.map((o,i)=>`
<div style="display:flex;gap:6px;margin-bottom:5px">
  <input class="inp" placeholder="Integration name" value="${esc(o.name)}" oninput="state.optionalIntegrations[${i}].name=this.value">
  <input class="inp" placeholder="Details" value="${esc(o.detail)}" oninput="state.optionalIntegrations[${i}].detail=this.value">

async function aiSuggestQGs(){
  state.qgAiLoading=true;render();
  const en=state.pilots.enabled||state.multiYear.enabled||state.partners.enabled;
  const context=`
Client: ${state.client||'unknown'} | CRM: ${state.crm} | Industry: inferred from products
Products uploaded: ${state.skuFile?`${state.skuFile} (${state.skuCount} SKUs)`:'none yet'}
SKU names: ${state.skus.slice(0,20).map(s=>s.name||s.productName||Object.values(s)[1]).join(', ')||'not uploaded'}
Opp types in scope: ${state.oppTypes.filter(o=>o.inScope).map(o=>o.type).join(', ')}
Multi Year: ${state.multiYear.enabled?'Yes — '+state.multiYear.detail:'No'}
Multi Offer: ${state.multiOffer.enabled?'Yes':'No'}
Pilots: ${state.pilots.enabled?'Yes — '+state.pilots.detail:'No'}
Partners: ${state.partners.enabled?'Yes — '+state.partners.detail:'No'}
Existing question groups: ${state.questionGroups.map(q=>q.name).join(', ')}`;

  const sys=`You are a senior DealHub Solution Architect. Suggest additional question groups for a DealHub playbook beyond the standard ones (GQ, Billing & Terms, Billing Contact) which are already configured.
Return ONLY a JSON array, no markdown.
Each object: {"name": "[GroupID] Display Name", "questions": [{"name": "...", "type": "...", "detail": "...", "hidden": false, "readOnly": false}]}
Question types must be one of: CRM, Text - List, Text - Radio, Text - Answer, Date - Proposal Date, Date - Formula, Date - Selected Date, Numeric - Answer, Numeric - Calculated, Numeric - Read Only
For each question include realistic DealHub details: for Text-List include options; for Numeric-Answer include Min/Max/Default/Stepping; for Date-Formula include the formula.
Suggest groups for: product-specific selections based on the SKU list, multi-year settings if enabled, pilot/complementary period if enabled, partner settings if enabled.
Maximum 4-5 additional groups. Keep questions concise and practical.`;

  try{
    const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:sys,messages:[{role:'user',content:context}]})});
    const d=await r.json();
    if(!d.error){
      const raw=(d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(raw);
      const newQGs=parsed.map(g=>({id:uid(),name:g.name,locked:false,open:true,questions:(g.questions||[]).map(q=>({id:uid(),name:q.name||'',type:q.type||'Text - List',detail:q.detail||'',hidden:!!q.hidden,readOnly:!!q.readOnly}))}));
      state.questionGroups=[...state.questionGroups,...newQGs];
      pushAI(`I added <strong>${newQGs.length} question group${newQGs.length!==1?'s':''}</strong> based on your products and features. Review each group and adjust question types, options, or defaults as needed for your client.`);
    }
  }catch(e){console.error(e);}
  state.qgAiLoading=false;render();
}

Return ONLY a JSON array, no markdown.
Each object: {"name": "Filter group name (e.g. Messaging_Add_Ons)", "logic": "Filter logic string e.g. Parent Product = Messaging, Product Grouping = Messaging, Add On = Add On"}
Suggest 3-6 logical groupings based on product families, types, and categories visible in the data.`;
  try{
    const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:[{role:'user',content:`Products:\n${skuSample}\n\nPricing notes: ${state.pricingNotes||'none'}`}]})});

      state.playbookFilters=[...state.playbookFilters,...parsed.map(f=>({name:f.name||'',logic:f.logic||''}))];

  }catch(e){console.error(e);}

async function aiExtractApprovals(){
  const text=(state.approvalFreeText||'').trim();
  if(!text){alert('Describe the approval process first.');return;}
  state.approvalAiLoading=true;state.approvalExtractError='';render();
  const sys=`You are a DealHub Solution Architect extracting approval workflow configuration from a description.
Return ONLY valid JSON with two keys: "matrix" and "rules". No markdown.
"matrix": array of {role, maxDiscount, approver} — the discount hierarchy from lowest to highest
"rules": array of {rule, step1, step2, step3, notes} — condition-based workflows
For matrix: maxDiscount should be a % string e.g. "10%", "25%". approver should describe who approves at that level.
For rules: rule is the trigger condition as a DealHub-style statement. steps are approver names/roles, empty string if not needed.`;
  try{
    const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:[{role:'user',content:text}]})});
    const d=await r.json();
    if(d.error){state.approvalExtractError=d.error.message;}
    else{
      const parsed=JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      if(parsed.matrix?.length) state.discountMatrix=parsed.matrix;
      if(parsed.rules?.length) state.ruleWorkflows=parsed.rules.map(r=>({id:uid(),...r}));
      pushAI(`Extracted <strong>${(parsed.matrix||[]).length} discount tiers</strong> and <strong>${(parsed.rules||[]).length} rule-based workflows</strong>. Review the tables below — check that approver names and % thresholds match your client exactly.`);
    }
  }catch(e){state.approvalExtractError='Could not reach AI.';}
  state.approvalAiLoading=false;render();
}

function buildSysPromptAI(){
  const en=state.oppTypes.filter(o=>o.inScope).map(o=>o.type);
  const features=[state.multiYear.enabled&&'Multi Year',state.multiOffer.enabled&&'Multi Offer',state.pilots.enabled&&'Pilots',state.partners.enabled&&'Partners'].filter(Boolean);
  return `You are a senior DealHub CPQ implementation advisor helping a CSM complete a configuration design document.
Context: Client: ${state.client||'unknown'} | CRM: ${state.crm} | Opp types: ${en.join(', ')||'TBD'} | Features: ${features.join(', ')||'none yet'} | QGs: ${state.questionGroups.length} | Products: ${state.skuCount} SKUs | Current section: ${SECTIONS[state.section]?.label}
Be concise (2-3 sentences), technically precise about DealHub. Ask ONE focused question per reply. Use DealHub terminology.`;
}

async function sendAI(){
  const inp=document.getElementById('aiInput');
  const text=(inp?.value||'').trim();if(!text||aiLoading)return;
  inp.value='';
  aiMsgs.push({role:'user',text});aiLoading=true;renderAIMessages();
  const msgs=aiMsgs.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.html?m.html.replace(/<[^>]+>/g,''):m.text}));
  try{
    const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:buildSysPromptAI(),messages:msgs})});
    const d=await r.json();
    pushAI(d.error?`⚠️ ${d.error.message}`:(d.content?.[0]?.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'));
  }catch(e){pushAI('⚠️ Could not reach the advisor.');}
  aiLoading=false;renderAIMessages();
}

// ── FILE HANDLING ─────────────────────────────────────────────────────────
function handleDrop(e,type){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f,type);}
function handleInput(inp,type){const f=inp.files[0];if(f)processFile(f,type);inp.value='';}
function processFile(file,type){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg('skuMsg','⚠️ File appears empty',1);return;}
      state.skus=json.map(row=>({id:uid(),...row}));
      state.skuFile=file.name;state.skuCount=json.length;
      render();
      pushAI(`Product catalog loaded: <strong>${json.length} SKUs</strong> from ${file.name}. I can now suggest playbook filter groups — click "Suggest Playbook Filters" on this step, or move to Approvals and I'll reference these products there too.`);
    }catch(err){showMsg('skuMsg','⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}
function showMsg(id,msg,err){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.style.color=err?'var(--danger)':'var(--primary)';if(!err)setTimeout(()=>{if(el)el.textContent='';},5000);}

// ── EXPORT ────────────────────────────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX==='undefined')return;
  const wb=XLSX.utils.book_new();
  const add=(n,d)=>{if(d?.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d),n);};
  add('Project Setup',[{client:state.client,csm:state.csm,crm:state.crm,sfObject:state.sfObject,sandbox:state.sandboxName,prod:state.prodName,goLive:state.goLiveDate}]);
  add('Decision Makers',state.decisionMakers.filter(d=>d.name));
  add('Opp Types',state.oppTypes.filter(o=>o.inScope).map(({inScope,...r})=>r));
  const allQs=state.questionGroups.flatMap(qg=>qg.questions.map(q=>({questionGroup:qg.name,...q})));
  add('Question Groups',allQs.map(({id,...r})=>r));
  if(state.skus.length)add('Products',state.skus.map(({id,...r})=>r));
  add('Discount Matrix',state.discountMatrix);
  add('Rule Workflows',state.ruleWorkflows.filter(r=>r.rule).map(({id,...r})=>r));
  add('Order Form',state.orderFormFields.map(({id,...r})=>r));
  if(!wb.SheetNames.length)add('Summary',[{note:'No data'}]);
  XLSX.writeFile(wb,`DealHub_Discovery_${state.client||'Unnamed'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

render();
</script>
