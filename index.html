<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#0d1b2e;
  --bg2:#0a1525;
  --card:#132035;
  --card2:#1a2d47;
  --border:#1f3550;
  --border2:#243d5c;
  --primary:#00d4aa;
  --primary-dim:rgba(0,212,170,.12);
  --primary-glow:rgba(0,212,170,.25);
  --text:#f0f6ff;
  --text2:#c8d8f0;
  --muted:#6b8aaa;
  --muted2:#4d6b8a;
  --danger:#f87171;
  --warn:#fbbf24;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Header ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:56px;position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{height:28px;display:flex;align-items:center;gap:6px}
.logo-icon{width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#0a1525}
.logo-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.logo-name span{color:var(--primary)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.3px}
.hdr-co{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.hdr-co span{color:var(--muted)}
.hdr-co input{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:6px 11px;font-size:12px;outline:none;width:180px;font-family:inherit;transition:border .15s}
.hdr-co input::placeholder{color:var(--muted2)}
.hdr-co input:focus{border-color:var(--primary);background:rgba(0,212,170,.04)}

/* ── Step progress ── */
.prog{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.prog::-webkit-scrollbar{height:0}
.ps{display:flex;align-items:center;gap:7px;padding:11px 14px 11px 0;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ps+.ps{padding-left:14px}
.ps.active{border-bottom-color:var(--primary)}
.ps.active .pl{color:var(--primary)}
.ps.done{border-bottom-color:rgba(0,212,170,.35)}
.ps.done .pl{color:rgba(0,212,170,.7)}
.pn{width:20px;height:20px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s}
.ps.active .pn{background:var(--primary);border-color:var(--primary);color:#0a1525;font-weight:800}
.ps.done .pn{background:rgba(0,212,170,.2);border-color:rgba(0,212,170,.4);color:var(--primary)}
.pl{font-size:11px;font-weight:600;color:var(--muted);transition:color .2s}
.pa{color:var(--border2);font-size:10px;margin-left:8px}

/* ── Layout ── */
.page{display:grid;grid-template-columns:1fr 272px;min-height:calc(100vh - 96px)}
.content{padding:28px;overflow-y:auto}
.aside{background:var(--bg2);border-left:1px solid var(--border);padding:18px;display:flex;flex-direction:column}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.ptitle{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2;color:var(--text);letter-spacing:-.4px}
.ptitle em{color:var(--primary);font-style:normal}
.psub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:22px;max-width:580px}
.slbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;margin-top:18px}
.slbl:first-child{margin-top:0}
.shint{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.section-hdr-inline{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;margin-top:0}

/* ── Inputs ── */
.inp{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:all .15s;font-family:inherit}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:rgba(0,212,170,.02)}
.inp::placeholder{color:var(--muted2)}
.sel{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px;width:100%;outline:none;cursor:pointer;font-family:inherit;transition:all .15s}
.sel:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.ta{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;width:100%;resize:vertical;outline:none;font-family:inherit;line-height:1.7;transition:all .15s}
.ta:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.ta::placeholder{color:var(--muted2)}
.lbl{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hr{border:none;border-top:1px solid var(--border);margin:20px 0}

/* ── Buttons ── */
.btn{border:1px solid var(--border2);background:var(--card2);color:var(--text2);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn:disabled{opacity:.35;cursor:default}
.btn-p{background:var(--primary);border-color:var(--primary);color:#0a1525;font-weight:700;box-shadow:0 2px 12px var(--primary-glow)}
.btn-p:hover{background:#00bfa0;border-color:#00bfa0;color:#0a1525}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-d{color:var(--danger);border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06);padding:5px 10px;font-size:11px}
.btn-d:hover{background:rgba(248,113,113,.12);border-color:var(--danger);color:var(--danger)}
.btn-ai{background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(0,212,170,.05));border:1px solid rgba(0,212,170,.3);color:var(--primary);font-weight:600}
.btn-ai:hover{background:linear-gradient(135deg,rgba(0,212,170,.18),rgba(0,212,170,.1));border-color:var(--primary)}

/* ── Use case grid ── */
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uc{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;user-select:none}
.uc:hover{border-color:rgba(0,212,170,.35);background:rgba(0,212,170,.03)}
.uc.on{border-color:var(--primary);background:var(--primary-dim)}
.uc-top{display:flex;align-items:flex-start;gap:10px}
.uc-ico{font-size:18px;flex-shrink:0;width:26px;text-align:center;margin-top:1px}
.uc-inf{flex:1}
.uc-n{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--text)}
.uc-d{font-size:11px;color:var(--muted);line-height:1.45}
.uc-ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;transition:all .18s}
.uc.on .uc-ck{background:var(--primary);border-color:var(--primary);color:#0a1525}
.uc-det{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.uc-det-lbl{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}

/* ── Toggle switch ── */
.sw{position:relative;width:38px;height:21px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-t{position:absolute;cursor:pointer;inset:0;background:var(--card2);border-radius:21px;transition:.2s;border:1px solid var(--border2)}
.sw-t:before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:.2s}
input:checked+.sw-t{background:rgba(0,212,170,.2);border-color:var(--primary)}
input:checked+.sw-t:before{transform:translateX(17px);background:var(--primary)}

/* ── Upload ── */
.dz{border:2px dashed var(--border2);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.dz:hover,.dz.ov{border-color:var(--primary);background:var(--primary-dim)}
.fok{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.3);border-radius:10px;padding:13px;display:flex;align-items:center;justify-content:space-between}

/* ── Insight box ── */
.insight{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.65;margin-top:12px}
.insight strong{color:var(--primary)}

/* ── Inline table ── */
.etbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
.etbl th{background:var(--bg);color:var(--muted);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border2);letter-spacing:.5px}
.etbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.etbl input{background:transparent;border:none;color:var(--text);font-size:11px;width:100%;outline:none;padding:2px 3px;font-family:inherit}
.etbl input:focus{background:rgba(255,255,255,.04);border-radius:4px}

/* ── Tips sidebar ── */
.tips-wrap{display:flex;flex-direction:column;height:100%;min-height:calc(100vh - 130px)}
.tips-hdr{display:flex;align-items:center;gap:7px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tips-ttl{font-size:12px;font-weight:700;color:var(--text)}
.tips-step{font-size:10px;color:var(--muted);background:var(--card2);border-radius:10px;padding:2px 8px;margin-left:auto;font-weight:600;border:1px solid var(--border)}
.tip-card{border-radius:9px;padding:11px 13px;margin-bottom:8px}
.tip-card.tip-info{border-left:2px solid var(--primary);background:rgba(0,212,170,.06)}
.tip-card.tip-warn{border-left:2px solid var(--warn);background:rgba(251,191,36,.06)}
.tip-icon{font-size:13px;margin-bottom:4px}
.tip-text{font-size:11px;color:var(--text2);line-height:1.65}
.tip-text strong{color:var(--text);font-weight:700}

/* ── Toast ── */
.save-toast{position:fixed;bottom:70px;right:20px;background:var(--primary);color:#0a1525;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px var(--primary-glow)}
.save-toast.show{opacity:1}

/* ── Stats / Review ── */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rev-c{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center}
.rev-n{font-size:24px;font-weight:800;color:var(--primary)}
.rev-l{font-size:11px;color:var(--muted);margin-top:3px}
.badge{display:inline-flex;align-items:center;background:var(--primary-dim);color:var(--primary);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;border:1px solid rgba(0,212,170,.2)}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);background:var(--bg2);padding:11px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:15}

@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

<script>
const PX='https://dealhub-proxy.vercel.app/api/chat';
const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const SAVE_KEY='dh_discovery_v3';

const STEPS=[
  {id:'about',     label:'About You',         e:'🏢'},
  {id:'products',  label:'Your Products',     e:'📦'},
  {id:'selling',   label:'How You Sell',      e:'💡'},
  {id:'decisions', label:'Decision Tree',     e:'🌿'},
  {id:'rules',     label:'Approvals & Terms', e:'📋'},
  {id:'review',    label:'Review & Generate', e:'🚀'},
  {id:'plan',      label:'Project Plan',      e:'📅'},
];

// Core use cases shown upfront
const UCS_CORE=[
  {k:'multiyear',  i:'📅',n:'Multi-Year Contracts',   d:'Deals spanning 2+ years, sometimes with different pricing each year.',         q:'How does pricing change year-over-year? Same rate with annual uplift (CPI %), or custom pricing per year?'},
  {k:'ramp',       i:'📈',n:'Ramp-Up Pricing',        d:'Customers start small and scale up — the price follows the ramp schedule.',    q:'Typical ramp? e.g. 50 users Yr1, 100 Yr2. Is the total TCV locked at signing even as quantities ramp?'},
  {k:'partners',   i:'🤝',n:'Partner & Reseller Deals',d:'You sell through partners or resellers who receive different pricing.',        q:'Do partners get a flat tier or deal-by-deal? Should their discount pull automatically from your CRM?'},
  {k:'trials',     i:'🧪',n:'Trials & Pilots',        d:'Free or discounted pilots before the paid contract begins.',                   q:'How long do trials run? Do they auto-convert to paid, or does the rep create a new quote?'},
  {k:'overage',    i:'📊',n:'Usage & Overages',       d:'Customers have a usage limit — exceeding it triggers an overage charge.',      q:'Billed monthly in arrears or at contract end? Any grace buffer before overage kicks in?'},
  {k:'optional',   i:'➕',n:'Optional Add-Ons',       d:'Quotes include optional products the customer can choose to include or skip.',  q:'Are add-ons visible to the buyer in DealRoom, or only to the rep building the quote?'},
];
// Advanced use cases — shown after "Show more"
const UCS_ADV=[
  {k:'cpi',        i:'📆',n:'Annual Price Increases',  d:'Automatic annual uplift — fixed % or tied to CPI.',                           q:'Default uplift rate? Can reps waive it or does that require approval?'},
  {k:'redline',    i:'⚖️',n:'Contract Redlining',      d:'Customers negotiate changes to your standard contract or MSA terms.',          q:'Which docs get redlined most — MSA, Order Form, or both? Handled in DealHub or outside?'},
  {k:'docusign',   i:'✍️',n:'DocuSign / e-Signature',  d:'Quotes are sent for electronic signature via DocuSign or similar.',            q:'Do you currently use DocuSign? Or would you use DealHub\'s native signature? Any other e-sign tools?'},
  {k:'marketplace',i:'🛒',n:'Marketplace Sales',       d:'You sell through AWS, GCP, Azure Marketplace or similar platforms.',           q:'Which marketplace(s)? Does pricing differ from direct, and is billing handled by the marketplace?'},
  {k:'custom',     i:'🍒',n:'Custom Deal Structures',  d:'Some deals need a hand-built product selection by RevOps or Deal Desk.',       q:'How often? Who has permission — only RevOps, or can AEs request it too?'},
  {k:'integrations',i:'🔌',n:'Other Integrations',    d:'DealHub connects with ERP, SSO, Slack, or other tools beyond the CRM.',        q:'Any must-haves for go-live beyond CRM and DocuSign? Slack for approval notifications, SSO, ERP?'},
];
const ALL_UCS=[...UCS_CORE,...UCS_ADV];

function freshSt(){return{
  step:0,submitted:false,
  // S1
  co:'',industry:'',crm:'Salesforce',crmEdition:'',sfObject:'Quote',
  adminName:'',adminEmail:'',
  dealVolume:'',dealSize:'',contractLength:'12',goLive:'',addCtx:'',
  // S2
  skuFile:'',skuCount:0,skus:[],colMap:{},showColMapper:false,
  pricingModels:[],pricingModel:'',productFamilies:'',currencyMode:'',
  multiCurrency:false,currencies:'',
  productInsight:'',productInsightLoading:false,
  // S3
  useCases:ALL_UCS.map(u=>({...u,id:uid(),on:false,detail:''})),
  showAdvUC:false,decisionNodes:[],diagramUrl:'',dtAiLoading:false,dtFlowText:'',dtAiError:'',
  quoteCreators:'',currentQuote:'',sellingFlow:'',
  // S4
  approvalText:'',approvalFile:'',approvalRows:[],ruleRows:[],
  extractLoading:false,extractErr:'',
  approvalEdge:'',
  payTerms:'',netDays:'',autoRenew:'',msa:'',otherTerms:'',
  // S5
  csm:'',
  docGenerating:false,docError:'',planLoading:false,planError:'',projectPlan:[],
  mmGenerating:false,mmError:'',
};}
let st=freshSt();
let showAdvUC=false;

// ── SAVE & RESTORE ──────────────────────────────────────────────────────────
function saveState(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({st,ts:Date.now()}));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const saved=JSON.parse(raw);
    // Only restore if saved in last 7 days
    if(Date.now()-saved.ts>7*24*60*60*1000){localStorage.removeItem(SAVE_KEY);return false;}
    st={...freshSt(),...saved.st};
    return true;
  }catch(e){return false;}
}
function clearSave(){localStorage.removeItem(SAVE_KEY);}
// Auto-save on any state change
function save(){saveState();}

// ── AI ─────────────────────────────────────────────────────────────────────
// AI stubs — replaced by tips panel
function pushAI(){}
function checkUCDetail(){}

// ── TIPS PANEL ──────────────────────────────────────────────────────────────
const STEP_TIPS=[
  [{type:'info',icon:'🏢',text:'<strong>CRM edition matters.</strong> Salesforce Enterprise supports custom objects that Professional does not — this affects which DealHub features are available.'},
   {type:'info',icon:'📅',text:'<strong>Contract length</strong> sets the default Duration field in every question group. 12 months is standard — only change if most deals are multi-year.'},
   {type:'info',icon:'👤',text:'<strong>DealHub Admin</strong> needs DealHub Academy certification before go-live. Name them now so they can start early.'}],
  [{type:'info',icon:'📊',text:'<strong>Upload your catalog</strong> even if not finalised. AI detects product families and suggests question group structure automatically.'},
   {type:'info',icon:'💰',text:'<strong>Pricing model</strong> determines whether DealHub shows quantity fields, tier selectors, or flat-rate inputs on the quote.'},
   {type:'warn',icon:'⚠️',text:'<strong>Multi-currency:</strong> "Maintain in CRM" means exchange rates must be kept current in your CRM — DealHub reads them at quote time.'}],
  [{type:'info',icon:'💡',text:'<strong>Select every use case that applies</strong> — even edge cases. Easier to descope later than add a missed feature mid-build.'},
   {type:'info',icon:'✍️',text:'<strong>The quoting flow description</strong> is the most valuable thing you can write. Be specific about who does what and what can go wrong.'},
   {type:'warn',icon:'⚠️',text:'<strong>Multi-Year + Multi-Offer</strong> cannot both be enabled in DealHub simultaneously. Discuss with your CSM if you need both.'}],
  [{type:'info',icon:'🌿',text:'<strong>This is the most important step.</strong> The decision tree becomes the guided selling logic — every branch is a DealHub presentation rule.'},
   {type:'info',icon:'✍️',text:'<strong>Plain English works best.</strong> Describe it like explaining to a new hire — AI converts it into a structured branching flowchart.'},
   {type:'info',icon:'📎',text:'You can also <strong>upload an existing diagram</strong> (PDF, image) or paste a Lucidchart / Miro / Figma link.'}],
  [{type:'info',icon:'🛡️',text:'<strong>General Workflows</strong> = threshold-based (discount %). <strong>Rule-Based Workflows</strong> fire on specific conditions regardless of who submitted.'},
   {type:'info',icon:'👤',text:'Use <strong>real names</strong> — "Sarah (VP Sales)" is more useful than just "VP". Your CSM confirms roles on the review call.'},
   {type:'warn',icon:'⚠️',text:'<strong>Edge cases matter:</strong> what happens when the approver is OOO? Does the quote expire after N days without approval?'}],
  [{type:'info',icon:'🚀',text:'A <strong>higher completion score</strong> = a more accurate design document. Go back to fill any red gaps before generating.'},
   {type:'info',icon:'📋',text:'The <strong>design document</strong> uses Claude Sonnet — takes ~20 seconds. Opens as HTML you can print to PDF.'},
   {type:'info',icon:'📅',text:'After generating the doc, continue to <strong>Project Plan</strong> for a phased implementation timeline with owners.'}],
  [{type:'info',icon:'📅',text:'The <strong>project plan</strong> is generated from your go-live date and scope — phases, owners, and priorities.'},
   {type:'info',icon:'👤',text:'Tasks split between <strong>DH</strong> (DealHub) and <strong>Client</strong>. Share with stakeholders to set expectations early.'},
   {type:'info',icon:'⬇️',text:'Export as <strong>Excel</strong> for your PM or <strong>Print to PDF</strong> to share with executives.'}],
];

function drawTips(){
  const el=document.getElementById('tipCards');
  const tag=document.getElementById('tipStepTag');
  if(!el)return;
  if(tag)tag.textContent=`Step ${st.step+1} — ${STEPS[st.step]?.label||''}`;
  const tips=STEP_TIPS[Math.min(st.step,STEP_TIPS.length-1)]||[];
  el.innerHTML=tips.map(t=>`<div class="tip-card tip-${t.type||'info'}"><div class="tip-icon">${t.icon}</div><div class="tip-text">${t.text}</div></div>`).join('');
}

// ── COMPLETION SCORE ────────────────────────────────────────────────────────
function scoreCompletion(){
  let score=0,max=0,gaps=[];
  const check=(val,label,w=10)=>{max+=w;if(val&&String(val).trim().length>1){score+=w;}else{gaps.push(label);}};
  check(st.co,'Company name',15);
  check(st.industry,'Industry',5);
  check(st.crm,'CRM',5);
  check(st.contractLength,'Contract length',5);
  check(st.goLive,'Go-live target',5);
  check(st.adminName,'DealHub admin name',10);
  if(st.skuCount>0){score+=10;max+=10;}else{max+=10;gaps.push('Product catalog');}
  check(st.pricingModel,'Pricing model',10);
  const enUC=st.useCases.filter(u=>u.on);
  if(enUC.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Use cases');}
  const ucDetails=enUC.filter(u=>u.detail&&u.detail.length>20);
  if(ucDetails.length===enUC.length&&enUC.length>0){score+=10;max+=10;}
  else if(enUC.length>0){max+=10;gaps.push('Use case details (some too short)');}
  check(st.sellingFlow,'Quoting flow description',10);
  if(st.decisionNodes&&st.decisionNodes.length>1){score+=10;max+=10;}else{max+=10;gaps.push('Decision tree nodes');}
  if(st.approvalRows.length>0){score+=10;max+=10;}else{max+=10;gaps.push('Approval rules');}
  check(st.payTerms,'Payment terms',5);
  check(st.netDays,'Net days',5);
  const pct=Math.round(score/max*100);
  return{pct,gaps,score,max};
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  drawProg();
  if(st.submitted){renderDone();drawFooter();return;}
  const fns=[S1,S2,S3,S4_Decisions,S5,S6,S7_Plan];
  document.getElementById('content').innerHTML=`<div>${(fns[st.step]||S1)()}</div>`;
  drawFooter();drawTips();
  save();
}

function drawProg(){
  document.getElementById('prog').innerHTML=STEPS.map((s,i)=>{
    const cls=i===st.step?'active':i<st.step?'done':'';
    return `<div class="ps ${cls}" onclick="goStep(${i})">
      <span class="pn">${i<st.step?'✓':i+1}</span>
      <span class="pl">${s.e} ${s.label}</span>
      ${i<STEPS.length-1?'<span class="pa">›</span>':''}
    </div>`;
  }).join('');
}
function drawFooter(){
  const last=st.step===STEPS.length-1;
  document.getElementById('footer').innerHTML=`
<button class="btn" onclick="prevStep()" ${st.step===0?'disabled':''}>← Back</button>
<div style="display:flex;align-items:center;gap:8px">
  <span style="font-size:11px;color:var(--muted)">${st.step+1} of ${STEPS.length}</span>
  <button class="btn btn-sm" onclick="exportSave()" title="Save progress to file" style="padding:4px 10px;font-size:11px">⬇️ Save</button>
</div>
${last
  ?`<button class="btn btn-p" onclick="submitForm()">Submit ✓</button>`
  :`<button class="btn btn-p" onclick="nextStep()">Continue →</button>`
}`;
}
function goStep(i){st.step=i;render();window.scrollTo(0,0);}
function nextStep(){if(st.step<STEPS.length-1){st.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(st.step>0){st.step--;render();}}
function submitForm(){st.submitted=true;render();}

// ── FILE HANDLING ───────────────────────────────────────────────────────────
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFile(inp){const f=inp.files[0];if(f)processFile(f);inp.value='';}
function clearSku(){st.skuFile='';st.skuCount=0;st.skus=[];st.productInsight='';st.colMap={};st.productFamilies='';save();render();}

function processFile(file){
  if(!/\.(xlsx|xls|csv)$/i.test(file.name)){alert('Please upload .xlsx, .xls, or .csv');return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showMsg('skuMsg','⚠️ File appears empty',1);return;}
      st.skus=json.map(row=>({id:uid(),...row}));
      st.skuFile=file.name;st.skuCount=json.length;
      // Auto-detect column mappings
      const keys=Object.keys(json[0]||{});
      const findCol=(patterns)=>keys.find(k=>patterns.some(p=>k.toLowerCase().includes(p)))||'';
      st.colMap={
        sku:findCol(['sku','code','id','product code']),
        name:findCol(['name','product name','description']),
        price:findCol(['price','list','msrp','rate']),
        uom:findCol(['uom','unit','measure']),
        family:findCol(['family','category','group','type']),
        type:findCol(['type','kind','class']),
      };
      save();render();
      analyseProducts();
    }catch(err){showMsg('skuMsg','⚠️ '+err.message,1);}
  };
  r.readAsArrayBuffer(file);
}

async function analyseProducts(){
  st.productInsightLoading=true;render();
  const familyCol=st.colMap.family||st.colMap.type||'';
  const families=familyCol?[...new Set(st.skus.map(s=>s[familyCol]).filter(Boolean))].slice(0,8):[];
  const sample=st.skus.slice(0,30).map(s=>Object.values(s).filter(v=>v&&v!=='id').slice(0,5).join(' | ')).join('\n');
  const sys=`You are a DealHub CPQ architect. Analyse this product catalog. Write 2-3 sentences: number of product families (list them by name if detectable), primary pricing model(s), billing types (one-time vs recurring). End with one specific sentence about what question group structure this suggests for DealHub. Plain prose only.`;
  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:sys,messages:[{role:'user',content:`${st.skuCount} SKUs. Detected families: ${families.join(', ')||'unclear'}.\n${sample}`}]})});
    const d=await res.json();
    if(!d.error){
      st.productInsight=d.content?.[0]?.text||'';
      // Auto-populate product families if empty
      if(!st.productFamilies&&families.length) st.productFamilies=families.join(', ');
      pushAI(`I've analysed your catalog — <strong>${st.skuCount} SKUs</strong> loaded. ${st.productInsight} Check the <em>product families</em> and <em>pricing model</em> fields below are accurate.`);
      save();

  st.productInsightLoading=false;render();

}

function renderDTChart(nodes){
  if(!nodes||nodes.length===0)return'';
  const W=680,BW=170,BH=40,GAP_Y=54,PAD_X=20,CX=W/2;
  const rows=[];
  let i=0;
  while(i<nodes.length){
    const n=nodes[i];
    if(n.type==='decision'){
      const yes=nodes[i+1]&&nodes[i+1].type==='yes'?nodes[i+1]:null;
      const noNode=yes?(nodes[i+2]&&nodes[i+2].type==='no'?nodes[i+2]:null):(nodes[i+1]&&nodes[i+1].type==='no'?nodes[i+1]:null);
      if(yes||noNode){rows.push({type:'decision',node:n});rows.push({type:'branches',yes,no:noNode});i+=1+(yes?1:0)+(noNode?1:0);continue;}
    }
    rows.push({type:'single',node:n});i++;
  }
  const totalH=PAD_X+rows.length*(BH+GAP_Y)+40;
  const typeCol={'entry':'#1a2c42','decision':'#1a2c42','yes':'#0a2818','no':'#2a0f0f','output':'#1a3d2e'};
  const typeBdr={'entry':'#0d1b2e','decision':'#1f3550','yes':'var(--primary)','no':'#f87171','output':'#00d4aa'};
  const typeTag={'entry':'ENTRY','decision':'DECISION','yes':'YES','no':'NO','output':'OUTPUT'};
  const tagCol={'entry':'#93c5fd','decision':'#94a3b8','yes':'#6ee7b7','no':'#fca5a5','output':'#6ee7b7'};

  function box(x,y,w,h,type,label){
    const lbl=(label||'').slice(0,24).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const col=typeCol[type]||'#1e293b',bdr=typeBdr[type]||'#475569';
    const tg=typeTag[type]||'NODE',tc=tagCol[type]||'#94a3b8';
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="7" fill="${col}" stroke="${bdr}" stroke-width="1.5"/>
<text x="${x+8}" y="${y+11}" font-size="7" font-weight="800" fill="${tc}" font-family="system-ui,sans-serif" opacity="0.9">${tg}</text>
<text x="${x+w/2}" y="${y+h/2+5}" text-anchor="middle" font-size="12" font-weight="600" fill="#fff" font-family="system-ui,sans-serif">${lbl||'…'}</text>`;
  }
  function arrow(x1,y1,x2,y2,col='#00b899'){
    const my=(y1+y2)/2;
    return `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" fill="none" stroke="${col}" stroke-width="1.5" stroke-opacity="0.7"/>
<polygon points="${x2},${y2} ${x2-4},${y2-7} ${x2+4},${y2-7}" fill="${col}" fill-opacity="0.7"/>`;
  }

  let svg=`<svg width="${W}" height="${totalH}" viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block"><rect width="${W}" height="${totalH}" fill="#0a1525"/>`;
  let prevCX=CX,prevBotY=PAD_X;

  rows.forEach((row,ri)=>{
    const topY=PAD_X+ri*(BH+GAP_Y);
    if(row.type==='single'||row.type==='decision'){
      svg+=box(CX-BW/2,topY,BW,BH,row.node.type,row.node.label);
      if(ri>0)svg+=arrow(prevCX,prevBotY,CX,topY);
      prevCX=CX;prevBotY=topY+BH;
    } else if(row.type==='branches'){
      const {yes,no}=row;
      const brW=BW*0.85,yesX=PAD_X+24,noX=W-PAD_X-24-brW;
      const yesCX=yesX+brW/2,noCX=noX+brW/2;
      if(yes){
        svg+=box(yesX,topY,brW,BH,'yes',yes.label);
        svg+=arrow(prevCX,prevBotY,yesCX,topY,'var(--primary)');
        const lx=(prevCX+yesCX)/2,ly=(prevBotY+topY)/2-4;
        svg+=`<text x="${lx-10}" y="${ly}" font-size="9" font-weight="800" fill="var(--primary)" font-family="system-ui,sans-serif">YES</text>`;
      }
      if(no){
        svg+=box(noX,topY,brW,BH,'no',no.label);
        svg+=arrow(prevCX,prevBotY,noCX,topY,'#dc2626');
        const lx=(prevCX+noCX)/2+4,ly=(prevBotY+topY)/2-4;
        svg+=`<text x="${lx}" y="${ly}" font-size="9" font-weight="800" fill="#dc2626" font-family="system-ui,sans-serif">NO</text>`;
      }
      if(yes&&no){
        const mergY=topY+BH+GAP_Y*0.35;
        svg+=`<line x1="${yesCX}" y1="${topY+BH}" x2="${CX}" y2="${mergY}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>`;
        svg+=`<line x1="${noCX}" y1="${topY+BH}" x2="${CX}" y2="${mergY}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>`;
      }
      prevCX=CX;prevBotY=topY+BH;
    }
  });
  return svg+`</svg>`;
}

function buildTreeSVG(){
  const co=st.co||'Company';
  const en=st.useCases.filter(u=>u.on).map(u=>u.n);
  const families=st.productFamilies?st.productFamilies.split(/[,;]/).map(f=>f.trim()).filter(Boolean).slice(0,5)
    :[...new Set(st.skus.map(s=>{const v=Object.values(s).filter(v=>v&&v!=='id');return v[2]||v[1]||'';}).filter(Boolean))].slice(0,4);
  const tree={label:co,children:[
    {label:'New Business',color:'#1d2d6b',children:[
      ...(families.length?families.map(f=>({label:f.slice(0,18),color:'#2563eb',children:[]})):[{label:'Products',color:'#2563eb',children:[]}]),
      ...en.filter(u=>['Multi-Year Contracts','Ramp-Up Pricing','Trials & Pilots'].includes(u)).slice(0,2).map(u=>({label:u.replace(' Contracts','').replace(' Pricing',''),color:'#3b82f6',children:[]})),
    ]},
    {label:'Existing Business',color:'#1d2d6b',children:[
      {label:'Renewals',color:'#374151',children:[]},{label:'Expansions',color:'#374151',children:[]},{label:'Amendments',color:'#374151',children:[]},
    ]},
    {label:'Approvals',color:'#1d2d6b',children:[
      {label:st.approvalRows.length?`${st.approvalRows.length} Tiers`:'Discount Matrix',color:'#374151',children:[]},
      {label:st.ruleRows.length?`${st.ruleRows.length} Rules`:'Rule Workflows',color:'#374151',children:[]},
    ]},
    {label:'Configuration',color:'#1d2d6b',children:[
      {label:'Question Groups',color:'#374151',children:[]},{label:'Billing & Terms',color:'#374151',children:[]},
      ...(st.multiCurrency?[{label:'Multi-Currency',color:'#374151',children:[]}]:[]),
    ]},
  ]};
  return renderTreeSVG(tree);
}

function renderTreeSVG(tree){
  const W=1100,PH=38,CH=32,HGAP=28,rootH=46;
  const co=tree.label;
  const rootW=Math.max(180,co.length*11+40);
  function nodeWidth(n){
    if(!n.children||!n.children.length)return Math.max(100,n.label.length*8+24);
    const tw=n.children.reduce((s,c)=>s+nodeWidth(c),0)+(n.children.length-1)*HGAP;
    return Math.max(Math.max(130,n.label.length*9+28),tw);
  }
  function assignX(node,startX){
    if(!node.children||!node.children.length){node.w=nodeWidth(node);node.cx=startX+node.w/2;return node.w;}
    let x=startX,tw=0;
    node.children.forEach(c=>{const cw=assignX(c,x);x+=cw+HGAP;tw+=cw+HGAP;});
    tw-=HGAP;node.w=Math.max(nodeWidth(node),tw);
    node.cx=(node.children[0].cx+node.children[node.children.length-1].cx)/2;
    return node.w;
  }
  const dY=[60,60+rootH+50,60+rootH+50+PH+55,60+rootH+50+PH+55+CH+45];
  function assignY(node,d){node.cy=dY[Math.min(d,dY.length-1)];if(node.children)node.children.forEach(c=>assignY(c,d+1));}
  assignX(tree,80);tree.cx=W/2;assignY(tree,0);
  let nodes=[],conns=[];
  function collect(node,parent,d){
    nodes.push({...node,depth:d});
    if(parent)conns.push({x1:parent.cx,y1:parent.cy+(d===1?rootH:PH)/2,x2:node.cx,y2:node.cy-CH/2,d});
    if(node.children)node.children.forEach(c=>collect(c,node,d+1));
  }
  collect(tree,null,0);
  const maxY=Math.max(...nodes.map(n=>n.cy))+50;
  let svg=`<svg width="${W}" height="${maxY+40}" viewBox="0 0 ${W} ${maxY+40}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block"><rect width="${W}" height="${maxY+40}" fill="#0a1525"/>`;
  conns.forEach(c=>{const my=(c.y1+c.y2)/2;svg+=`<path d="M${c.x1},${c.y1} C${c.x1},${my} ${c.x2},${my} ${c.x2},${c.y2}" fill="none" stroke="${c.d===1?'#1d4ed8':'#93c5fd'}" stroke-width="${c.d===1?2:1.5}" stroke-opacity="${c.d===1?0.8:0.6}"/>`;});
  nodes.forEach(n=>{
    const lbl=(n.label||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(n.depth===0){svg+=`<rect x="${n.cx-rootW/2}" y="${n.cy-rootH/2}" width="${rootW}" height="${rootH}" rx="10" fill="#2563eb"/><text x="${n.cx}" y="${n.cy+5}" text-anchor="middle" font-size="16" font-weight="800" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,22)}</text>`;}
    else if(n.depth===1){const nw=Math.max(130,n.label.length*9+28);svg+=`<rect x="${n.cx-nw/2}" y="${n.cy-PH/2}" width="${nw}" height="${PH}" rx="7" fill="#1d2d6b"/><text x="${n.cx}" y="${n.cy+5}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,20)}</text>`;}
    else if(n.depth===2){const nw=Math.max(90,n.label.length*8+20);svg+=`<rect x="${n.cx-nw/2}" y="${n.cy-CH/2}" width="${nw}" height="${CH}" rx="5" fill="${n.color||'#2563eb'}"/><text x="${n.cx}" y="${n.cy+4}" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" font-family="system-ui,sans-serif">${lbl.slice(0,18)}</text>`;}
    else{svg+=`<circle cx="${n.cx}" cy="${n.cy}" r="3" fill="#93c5fd"/><text x="${n.cx}" y="${n.cy+14}" text-anchor="middle" font-size="10" fill="#374151" font-family="system-ui,sans-serif">${lbl.slice(0,16)}</text>`;}
  });
  return svg+`</svg>`;
}

async function genProjectPlan(){
  st.planLoading=true;st.planError='';render();
  const en=st.useCases.filter(u=>u.on);
  const ctx=`Client: ${st.co||'unknown'} | Go-live: ${st.goLive||'TBD'} | CRM: ${st.crm} | Industry: ${st.industry||'unknown'}
Contract: ${st.contractLength||'12'}mo | Admin: ${st.adminName||'TBD'}
Products: ${st.skuCount} SKUs, families: ${st.productFamilies||'unknown'}, pricing: ${st.pricingModel||'unknown'}
Use cases: ${en.map(u=>u.n).join(', ')||'none'}
Approval tiers: ${st.approvalRows.length} | Rule workflows: ${st.ruleRows.length}
Decision tree: ${(st.decisionNodes||[]).length} nodes | Multi-currency: ${st.currencyMode||'none'} | DocuSign: ${en.some(u=>u.k==='docusign')?'Yes':'No'}`;

  const sys=`You are a DealHub implementation manager. Generate a project plan as a JSON array. Return ONLY a valid JSON array, no markdown.
Each row: {"phase":"string","task":"string","owner":"DH"|"Client"|"Both","start":"Week N","end":"Week N","priority":"High"|"Medium"|"Low","milestone":false}
Milestone rows: milestone:true, owner:"Both" — use for: Kickoff Complete, Design Sign-off, Config Complete, UAT Start, UAT Sign-off, Go-Live.
Phases in order: Discovery & Design → Integration Setup → Product Configuration → Approval Workflows → DealRoom & Documents → Testing & UAT → Training → Go-Live & Hypercare
Rules: 20-26 rows total. DH owns config/build tasks. Client owns: data provision, decisions/sign-off, UAT execution, training. Add feature-specific tasks based on enabled use cases (multi-year = add multi-year config task, DocuSign = add DocuSign setup). Week numbers start at 1. Be specific — reference actual product families and features from context.`;

  try{
    const res=await fetch(PX,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:sys,messages:[{role:'user',content:ctx}]})});
    const d=await res.json();
    if(d.error){st.planError=d.error.message;st.planLoading=false;render();return;}
    st.projectPlan=JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim());
    st.planLoading=false;save();render();
  }catch(e){st.planError='Could not generate — check connection.';st.planLoading=false;render();}
}

function exportPlanXlsx(){
  if(!st.projectPlan?.length){alert('Generate a plan first.');return;}
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(st.projectPlan.map(r=>({Phase:r.phase,Task:r.task,Owner:r.owner,Start:r.start,End:r.end,Priority:r.priority,Milestone:r.milestone?'Yes':''})));
  XLSX.utils.book_append_sheet(wb,ws,'Project Plan');
  XLSX.writeFile(wb,`DealHub_Plan_${(st.co||'Client').replace(/\s+/g,'_')}.xlsx`);
}

function showToast(msg='✓ Saved'){
  const t=document.getElementById('saveToast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function exportSave(){
  const data={st,version:3,ts:Date.now()};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`DealHub_Discovery_${(st.co||'Unnamed').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();showToast('✓ File downloaded');
}

function importSave(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.st){st={...freshSt(),...data.st};saveState();document.getElementById('coInp').value=st.co||'';render();showToast('✓ Progress loaded');}
      else alert('Invalid save file.');
    }catch(ex){alert('Could not read file: '+ex.message);}
  };
  r.readAsText(f);inp.value='';
}
