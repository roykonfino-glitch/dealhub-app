<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub Discovery — CSM Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#0a1525;--card:#132035;--card2:#1a2d47;
  --border:#1f3550;--border2:#243d5c;
  --primary:#00d4aa;--primary-dim:rgba(0,212,170,.1);--primary-glow:rgba(0,212,170,.2);
  --text:#f0f6ff;--text2:#c8d8f0;--muted:#6b8aaa;
  --danger:#f87171;--warn:#fbbf24;--success:#00d4aa;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Login screen ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 40%,rgba(0,212,170,.06) 0%,transparent 60%)}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:40px;width:360px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:28px}
.login-icon{width:36px;height:36px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#0a1525}
.login-name{font-size:18px;font-weight:800;color:var(--text)}
.login-name span{color:var(--primary)}
.login-title{font-size:20px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.pin-input{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:12px 16px;font-size:18px;font-weight:700;width:100%;text-align:center;letter-spacing:8px;outline:none;font-family:inherit;transition:border .15s}
.pin-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.login-btn{width:100%;margin-top:14px;background:var(--primary);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#0a1525;cursor:pointer;font-family:inherit;transition:all .15s}
.login-btn:hover{background:#00bfa0}
.login-err{color:var(--danger);font-size:12px;margin-top:10px;min-height:18px}

/* ── App shell ── */
#appShell{display:none}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-icon{width:30px;height:30px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#0a1525}
.hdr-title{font-size:15px;font-weight:800}
.hdr-title span{color:var(--primary)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-badge{font-size:10px;background:var(--primary-dim);color:var(--primary);border:1px solid rgba(0,212,170,.2);border-radius:20px;padding:3px 10px;font-weight:600}
.logout-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* ── Stats bar ── */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 28px;border-bottom:1px solid var(--border)}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-n{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px}
.stat.highlight{background:var(--primary-dim);border-color:rgba(0,212,170,.25)}
.stat.highlight .stat-n{color:var(--primary)}

/* ── Filters ── */
.filters{display:flex;align-items:center;gap:10px;padding:14px 28px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-inp{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:7px 12px;font-size:12px;outline:none;width:220px;font-family:inherit}
.search-inp:focus{border-color:var(--primary)}
.search-inp::placeholder{color:var(--muted)}
.filter-sel{background:var(--card);border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:7px 10px;font-size:12px;outline:none;cursor:pointer;font-family:inherit}
.filter-sel:focus{border-color:var(--primary)}
.refresh-btn{background:var(--card2);border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;margin-left:auto;transition:all .15s}
.refresh-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── Table ── */
.table-wrap{padding:20px 28px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
thead tr{background:var(--bg)}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
th.sort-asc::after{content:' ↑';color:var(--primary)}
th.sort-desc::after{content:' ↓';color:var(--primary)}
tbody tr{transition:background .15s;cursor:pointer}
tbody tr:hover{background:rgba(0,212,170,.04)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-submitted{background:rgba(0,212,170,.12);color:var(--primary);border:1px solid rgba(0,212,170,.25)}
.badge-inprogress{background:rgba(251,191,36,.1);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
.badge-new{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
.score-bar-wrap{display:flex;align-items:center;gap:7px}
.score-bar{height:5px;border-radius:3px;flex:1;max-width:80px;background:var(--border2)}
.score-bar-fill{height:100%;border-radius:3px}
.score-val{font-size:11px;font-weight:700;min-width:28px}

/* ── Detail panel ── */
#detailPanel{position:fixed;top:0;right:0;width:480px;height:100vh;background:var(--card);border-left:1px solid var(--border2);z-index:50;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;display:flex;flex-direction:column}
#detailPanel.open{transform:translateX(0)}
.panel-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:5}
.panel-co{font-size:18px;font-weight:800;margin-bottom:3px}
.panel-meta{font-size:11px;color:var(--muted)}
.close-btn{background:var(--card2);border:1px solid var(--border2);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;margin-left:12px}
.close-btn:hover{border-color:var(--danger);color:var(--danger)}
.panel-body{padding:20px 24px;flex:1}
.panel-section{margin-bottom:20px}
.panel-section-title{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(31,53,80,.5)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0;margin-right:12px}
.detail-val{font-size:11px;color:var(--text2);text-align:right;word-break:break-word}
.detail-val.highlight{color:var(--primary);font-weight:600}
.panel-actions{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;position:sticky;bottom:0;background:var(--card)}
.panel-btn{background:var(--card2);border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;flex:1;justify-content:center;display:flex;align-items:center;gap:5px;transition:all .15s;font-weight:500;text-decoration:none}
.panel-btn:hover{border-color:var(--primary);color:var(--primary)}
.panel-btn.primary{background:var(--primary);border-color:var(--primary);color:#0a1525;font-weight:700}
.panel-btn.primary:hover{background:#00bfa0;border-color:#00bfa0}
.tag{display:inline-block;background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--text2);margin:2px}

/* ── Overlay ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:none}
#overlay.show{display:block}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.empty-sub{font-size:12px}

/* ── Spin ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,212,170,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">d</div>
      <div class="login-name">dealhub <span>ai</span></div>
    </div>
    <div class="login-title">CSM Dashboard</div>
    <div class="login-sub">Enter your team PIN to access discovery submissions</div>
    <input class="pin-input" type="password" id="pinInput" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="login-btn" onclick="checkPin()">Access Dashboard</button>
    <div class="login-err" id="pinErr"></div>
  </div>
</div>

<!-- App -->
<div id="appShell">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">d</div>
      <div>
        <div class="hdr-title">dealhub <span>ai</span> — Discovery Dashboard</div>
        <div class="hdr-sub">CSM workspace · All client submissions</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="hdr-badge" id="liveTag">● Live</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Total discoveries</div></div>
    <div class="stat highlight"><div class="stat-n" id="statSubmitted">—</div><div class="stat-l">Submitted ✓</div></div>
    <div class="stat"><div class="stat-n" id="statInProgress">—</div><div class="stat-l">In progress</div></div>
    <div class="stat"><div class="stat-n" id="statAvgScore">—</div><div class="stat-l">Avg completion</div></div>
    <div class="stat"><div class="stat-n" id="statToday">—</div><div class="stat-l">Updated today</div></div>
  </div>

  <div class="filters">
    <input class="search-inp" id="searchInp" placeholder="Search by company, CSM, or industry…" oninput="filterRows()">
    <select class="filter-sel" id="statusFilter" onchange="filterRows()">
      <option value="">All statuses</option>
      <option value="submitted">Submitted</option>
      <option value="inprogress">In progress</option>
      <option value="new">New</option>
    </select>
    <select class="filter-sel" id="crmFilter" onchange="filterRows()">
      <option value="">All CRMs</option>
      <option value="Salesforce">Salesforce</option>
      <option value="HubSpot">HubSpot</option>
    </select>
    <select class="filter-sel" id="scoreFilter" onchange="filterRows()">
      <option value="">All scores</option>
      <option value="high">High (≥80%)</option>
      <option value="med">Medium (40–79%)</option>
      <option value="low">Low (&lt;40%)</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>

  <div class="table-wrap">
    <div id="tableArea">
      <div class="loading-wrap"><span class="spin"></span> Loading discoveries…</div>
    </div>
  </div>
</div>

<!-- Detail panel overlay -->
<div id="overlay" onclick="closePanel()"></div>
<div id="detailPanel">
  <div class="panel-hdr" id="panelHdr"></div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-actions" id="panelActions"></div>
</div>

<script>
const SB_URL='https://tyxyohfaybmtpjslnxqp.supabase.co';
const SB_KEY='sb_publishable_soHLH5As83Nu-XheMBnUOA_AczGwkQt';
const SB_H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const PIN='1234'; // Change this to your team PIN
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';

let allRows=[], sortCol='updated_at', sortDir='desc';

// ── Auth ────────────────────────────────────────────────────────────────────
function checkPin(){
  const v=document.getElementById('pinInput').value;
  if(v===PIN){
    sessionStorage.setItem('dash_auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    loadData();
  } else {
    document.getElementById('pinErr').textContent='Incorrect PIN — try again';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
  }
}
function logout(){sessionStorage.removeItem('dash_auth');location.reload();}

// Auto-login if session exists
if(sessionStorage.getItem('dash_auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('refreshIcon').textContent='↻';
  document.getElementById('tableArea').innerHTML=`<div class="loading-wrap"><span class="spin"></span> Loading…</div>`;
  try{
    const res=await fetch(`${SB_URL}/rest/v1/discoveries?select=*&order=updated_at.desc&limit=200`,{headers:SB_H});
    if(!res.ok)throw new Error('HTTP '+res.status);
    allRows=await res.json();
    renderStats();
    renderTable(allRows);
  }catch(e){
    document.getElementById('tableArea').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load data</div><div class="empty-sub">${esc(e.message)}</div></div>`;
  }
  document.getElementById('refreshIcon').textContent='↻';
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const total=allRows.length;
  const submitted=allRows.filter(r=>r.submitted).length;
  const inprog=allRows.filter(r=>!r.submitted&&r.step>0).length;
  const avgScore=total?Math.round(allRows.reduce((a,r)=>a+(r.score||0),0)/total):0;
  const today=allRows.filter(r=>r.updated_at&&new Date(r.updated_at).toDateString()===new Date().toDateString()).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statSubmitted').textContent=submitted;
  document.getElementById('statInProgress').textContent=inprog;
  document.getElementById('statAvgScore').textContent=avgScore+'%';
  document.getElementById('statToday').textContent=today;
}

// ── Table ─────────────────────────────────────────────────────────────────────
function filterRows(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  const status=document.getElementById('statusFilter').value;
  const crm=document.getElementById('crmFilter').value;
  const score=document.getElementById('scoreFilter').value;
  let rows=allRows.filter(r=>{
    if(q&&![(r.company||''),(r.csm||''),(r.industry||'')].join(' ').toLowerCase().includes(q))return false;
    if(status==='submitted'&&!r.submitted)return false;
    if(status==='inprogress'&&(r.submitted||!r.step))return false;
    if(status==='new'&&(r.submitted||r.step>0))return false;
    if(crm&&r.crm!==crm)return false;
    if(score==='high'&&(r.score||0)<80)return false;
    if(score==='med'&&((r.score||0)<40||(r.score||0)>=80))return false;
    if(score==='low'&&(r.score||0)>=40)return false;
    return true;
  });
  renderTable(rows);
}

function sortBy(col){
  if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='desc';}
  filterRows();
}

function renderTable(rows){
  // Sort
  rows=[...rows].sort((a,b)=>{
    const av=a[sortCol]||'',bv=b[sortCol]||'';
    const cmp=av<bv?-1:av>bv?1:0;
    return sortDir==='asc'?cmp:-cmp;
  });

  if(!rows.length){
    document.getElementById('tableArea').innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No discoveries found</div><div class="empty-sub">Try adjusting your filters</div></div>`;
    return;
  }

  const cols=['company','industry','crm','score','step','submitted','updated_at'];
  const labels={company:'Company',industry:'Industry',crm:'CRM',score:'Score',step:'Step',submitted:'Status',updated_at:'Last Updated'};

  const thead=`<thead><tr>${cols.map(c=>`<th onclick="sortBy('${c}')" class="${sortCol===c?'sort-'+sortDir:''}">${labels[c]}</th>`).join('')}<th>CSM</th></tr></thead>`;

  const tbody=`<tbody>${rows.map(r=>{
    const statusBadge=r.submitted
      ?`<span class="badge badge-submitted">✓ Submitted</span>`
      :r.step>0
        ?`<span class="badge badge-inprogress">In Progress</span>`
        :`<span class="badge badge-new">New</span>`;
    const sc=r.score||0;
    const scCol=sc>=80?'var(--primary)':sc>=40?'var(--warn)':'var(--danger)';
    const scoreCell=`<div class="score-bar-wrap"><div class="score-bar"><div class="score-bar-fill" style="width:${sc}%;background:${scCol}"></div></div><span class="score-val" style="color:${scCol}">${sc}%</span></div>`;
    const stepLabel=['About You','Products','How You Sell','Decision Tree','Approvals','Review','Project Plan'][r.step]||'—';
    return `<tr onclick="openPanel('${r.id}')">
      <td style="font-weight:600;color:var(--text)">${esc(r.company||'Unnamed')}</td>
      <td style="color:var(--muted)">${esc(r.industry||'—')}</td>
      <td>${r.crm?`<span class="tag">${esc(r.crm)}</span>`:'—'}</td>
      <td>${scoreCell}</td>
      <td style="color:var(--text2)">${esc(stepLabel)}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--muted);font-size:11px">${fmtDate(r.updated_at)}</td>
      <td style="color:var(--muted)">${esc(r.csm||'—')}</td>
    </tr>`;
  }).join('')}</tbody>`;

  document.getElementById('tableArea').innerHTML=`<table>${thead}${tbody}</table>`;
}

// ── Detail panel ────────────────────────────────────────────────────────────
function openPanel(id){
  const r=allRows.find(x=>x.id===id);if(!r)return;
  const s=r.state||{};
  const sc=r.score||0;
  const scCol=sc>=80?'var(--primary)':sc>=40?'var(--warn)':'var(--danger)';
  const en=(s.useCases||[]).filter(u=>u.on).map(u=>u.n);

  document.getElementById('panelHdr').innerHTML=`
<div>
  <div class="panel-co">${esc(r.company||'Unnamed')}</div>
  <div class="panel-meta">ID: ${r.id.slice(0,8)}… · Last updated: ${fmt(r.updated_at)}</div>
</div>
<button class="close-btn" onclick="closePanel()">✕ Close</button>`;

  document.getElementById('panelBody').innerHTML=`
<div class="panel-section">
  <div class="panel-section-title">Overview</div>
  ${row('Status', r.submitted?'<span class="badge badge-submitted">✓ Submitted</span>':'<span class="badge badge-inprogress">In Progress</span>')}
  ${row('Completion', `<span style="color:${scCol};font-weight:700">${sc}%</span>`)}
  ${row('Step', ['About You','Products','How You Sell','Decision Tree','Approvals','Review','Project Plan'][r.step]||'—')}
  ${row('Created', fmtDate(r.created_at))}
</div>

<div class="panel-section">
  <div class="panel-section-title">Project Details</div>
  ${row('Company', r.company||'—')}
  ${row('Industry', r.industry||'—')}
  ${row('CRM', (r.crm||'—')+(s.sfObject?' — '+s.sfObject:''))}
  ${row('Go-Live', s.goLive||'—')}
  ${row('Contract Length', s.contractLength?s.contractLength+' months':'—')}
  ${row('Admin', s.adminName?(s.adminName+(s.adminEmail?' — '+s.adminEmail:'')):'—')}
  ${row('DealHub CSM', r.csm||'—')}
</div>

<div class="panel-section">
  <div class="panel-section-title">Products</div>
  ${row('Catalog', s.skuFile&&s.skuFile!=='skip'?(s.skuFile+' ('+s.skuCount+' SKUs)'):'Not uploaded')}
  ${row('Pricing Model', (s.pricingModels&&s.pricingModels.length?s.pricingModels.join(', '):s.pricingModel)||'—')}
  ${row('Product Families', s.productFamilies||'—')}
  ${row('Currency', s.currencyMode||'Not set')}
</div>

<div class="panel-section">
  <div class="panel-section-title">Use Cases (${en.length})</div>
  <div style="margin-top:4px">${en.length?en.map(n=>`<span class="tag">${esc(n)}</span>`).join(''):'<span style="color:var(--muted);font-size:11px">None selected</span>'}</div>
</div>

${s.sellingFlow?`<div class="panel-section">
  <div class="panel-section-title">Quoting Flow</div>
  <div style="font-size:11px;color:var(--text2);line-height:1.7;background:var(--bg);border-radius:8px;padding:10px 12px;border:1px solid var(--border)">${esc(s.sellingFlow)}</div>
</div>`:''}

<div class="panel-section">
  <div class="panel-section-title">Approvals</div>
  ${row('Matrix rows', (s.approvalRows&&s.approvalRows.length)||'0')}
  ${row('Rule workflows', (s.ruleRows&&s.ruleRows.filter&&s.ruleRows.filter(r=>r.rule).length)||'0')}
  ${s.approvalRows&&s.approvalRows.length?`<div style="margin-top:8px">${s.approvalRows.map(r=>`<div style="font-size:10px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">${esc(r.role)}</span> → up to <span style="color:var(--primary);font-weight:700">${esc(r.max)}</span> → ${esc(r.approver)}</div>`).join('')}</div>`:''}
</div>

<div class="panel-section">
  <div class="panel-section-title">Decision Tree</div>
  ${row('Nodes', (s.decisionNodes&&s.decisionNodes.length)||'0')}
  ${s.diagramUrl?row('Diagram link', `<a href="${esc(s.diagramUrl)}" target="_blank" style="color:var(--primary)">Open ↗</a>`):''}
</div>

${s.projectPlan&&s.projectPlan.length?`<div class="panel-section">
  <div class="panel-section-title">Project Plan (${s.projectPlan.length} tasks)</div>
  <div style="font-size:11px;color:var(--muted);margin-top:4px">Generated — ${s.projectPlan.filter(t=>t.milestone).length} milestones</div>
</div>`:''}`;

  document.getElementById('panelActions').innerHTML=`
<a href="index.html?resume=${r.id}" target="_blank" class="panel-btn">↗ Open Discovery Form</a>
<button class="panel-btn" onclick="copyId('${r.id}')">📋 Copy ID</button>
<button class="panel-btn primary" onclick="exportRow('${r.id}')">⬇️ Export JSON</button>`;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function row(k,v){return `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`;}

function closePanel(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function copyId(id){navigator.clipboard.writeText(id);alert('ID copied: '+id);}

function exportRow(id){
  const r=allRows.find(x=>x.id===id);if(!r)return;
  const b=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`discovery_${(r.company||'unnamed').replace(/\s+/g,'_')}.json`;a.click();
}

// ── Init ─────────────────────────────────────────────────────────────────────
if(sessionStorage.getItem('dash_auth')==='1') loadData();
document.getElementById('pinInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});

// Auto-refresh every 60 seconds
setInterval(()=>{if(sessionStorage.getItem('dash_auth')==='1')loadData();},60000);
</script>
</body>
</html>
